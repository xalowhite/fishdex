<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FishDex — Angler's Field Guide to North America</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --bg:#0d1b24; --panel:#12252f; --panel2:#173039; --line:#244553;
    --ink:#e9f3f2; --muted:#8fa9b0; --accent:#37b6a0; --accent2:#5ad1bb;
    --warn:#e6a23c; --peak:#3ddc84; --good:#9bd95a; --slow:#5d7681;
    --chip:#1d3a44; --shadow:0 4px 18px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:linear-gradient(90deg,#0e2530,#12313d);
    border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:18px;margin:0;letter-spacing:.5px;font-weight:700}
  header h1 .fin{color:var(--accent2)}
  header .tag{font-size:12px;color:var(--muted);margin-left:2px}
  header .spacer{flex:1}
  .main{display:flex;flex:1;min-height:0}

  /* ---------- Rolodex (left) ---------- */
  .rolodex{width:38%;max-width:480px;min-width:300px;display:flex;flex-direction:column;
    background:var(--panel);border-right:1px solid var(--line)}
  .rolodex .search{padding:10px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .rolodex input[type=text]{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14px;outline:none}
  .rolodex input::placeholder{color:var(--muted)}
  .ctxbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);min-height:18px}
  .ctxbar b{color:var(--accent2)}
  .ctxbar button{margin-left:auto;background:var(--chip);border:1px solid var(--line);color:var(--ink);
    border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
  .grp{padding:8px 12px 3px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);
    position:sticky;top:0;background:var(--panel);z-index:1}
  .list{overflow-y:auto;flex:1;padding-bottom:24px}
  .card{margin:6px 10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);
    cursor:pointer;transition:border-color .15s,transform .05s}
  .card:hover{border-color:var(--accent)}
  .card.sel{border-color:var(--accent2);background:#16323c;box-shadow:var(--shadow)}
  .card.dim{opacity:.42}
  .card .row1{display:flex;align-items:center;gap:10px}
  .thumb{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:46px;height:30px;
    background:#0e222b;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:none}
  .card .nm{font-weight:600;font-size:15px}
  .card .sci{font-size:11px;color:var(--muted);font-style:italic}
  .card .meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
  .pill{font-size:10.5px;padding:2px 7px;border-radius:20px;background:var(--chip);color:var(--accent2);border:1px solid var(--line)}
  .pill.fight{color:#e9c96b;letter-spacing:1px}
  .bite{margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .bite.peak{background:#103a26;color:var(--peak);border:1px solid #1f6b46}
  .bite.good{background:#2e3a16;color:var(--good);border:1px solid #4d6b1f}
  .bite.slow{background:#23323a;color:var(--slow);border:1px solid var(--line)}
  .subs{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:none;flex-direction:column;gap:4px}
  .card.open .subs{display:flex}
  .sub{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:3px 6px;border-radius:6px;cursor:pointer}
  .sub:hover{background:#1b3540}
  .sub.sel{background:#16323c;color:var(--accent2)}
  .sub .sn{font-weight:600}
  .sub .ss{color:var(--muted);font-style:italic;font-size:10.5px}

  /* ---------- Right side ---------- */
  .right{flex:1;display:flex;flex-direction:column;min-width:0}
  .filters{flex:0 0 auto;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  .filters .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .switch{width:42px;height:23px;border-radius:20px;background:var(--line);position:relative;transition:.2s;flex:0 0 auto}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;
    background:#cfe;transition:.2s}
  .toggle.on .switch{background:var(--accent)}
  .toggle.on .switch::after{left:21px}
  .toggle .lbl{font-size:13px;font-weight:600}
  .toggle .sub{font-size:11px;color:var(--muted)}
  #nowBtn{background:var(--accent);border:none;color:#06231d;font-weight:700;border-radius:7px;
    padding:7px 12px;font-size:12.5px;cursor:pointer}
  #nowBtn:hover{background:var(--accent2)}
  .ghostbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;
    padding:7px 12px;font-size:12.5px;cursor:pointer}
  .ghostbtn.on{background:#23464f;border-color:var(--accent);color:var(--accent2);font-weight:700}
  .anglefilters{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px}
  .anglefilters.hide{display:none}
  .fgroup{display:flex;flex-direction:column;gap:5px}
  .fgroup .h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .seg{display:flex;flex-wrap:wrap;gap:4px}
  .seg button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;
    padding:4px 9px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#06231d;font-weight:700}
  select.mon{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:5px 8px;font-size:12px}
  .mapwrap{flex:1;position:relative;min-height:0}
  #map{position:absolute;inset:0;background:#0a141a}
  .legend{position:absolute;right:12px;bottom:18px;z-index:500;background:rgba(15,33,41,.92);
    border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:11.5px;line-height:1.7;color:var(--ink);box-shadow:var(--shadow)}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}
  .info{position:absolute;left:12px;top:12px;z-index:500;width:330px;max-width:calc(100% - 24px);background:rgba(15,33,41,.96);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);display:none;
    max-height:calc(100% - 24px);overflow:hidden auto}
  .info.show{display:block}
  .info .hero{width:100%;height:150px;object-fit:cover;display:none;background:#0e222b;border-bottom:1px solid var(--line)}
  .info .pad{padding:12px 14px}
  .info .ihead{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .info .iart{background:#0e222b;border:1px solid var(--line);border-radius:8px;padding:3px 5px;display:flex}
  .info h3{margin:0 0 2px;font-size:16px}
  .info h3 .subname{font-size:12px;color:var(--accent2);font-weight:600}
  .info .sci{font-size:11px;color:var(--muted);font-style:italic}
  .info .kv{font-size:12px;margin:4px 0;color:var(--muted);line-height:1.45}
  .info .kv b{color:var(--ink);font-weight:600}
  .info .stars{color:#e9c96b;letter-spacing:1px}
  .info .baits{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .info .reglink{display:inline-block;margin-top:8px;background:var(--accent);color:#06231d;font-weight:700;
    text-decoration:none;border-radius:7px;padding:7px 11px;font-size:12.5px}
  .info .reglink:hover{background:var(--accent2)}
  .info .disclaimer{font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.4}
  .info .speclist{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
  .info .speclist .pill{cursor:pointer}
  .info .credit{font-size:9.5px;color:#5d7681;margin-top:6px}
  .leaflet-tooltip.stt{background:#0e2530;border:1px solid var(--accent);color:var(--ink);font-weight:600}
  .leaflet-tooltip.eco{background:#241f12;border:1px solid #b78b3a;color:#f1e3c4;font-weight:600}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;z-index:600}
  @media (max-width:760px){
    .main{flex-direction:column}
    .rolodex{width:100%;max-width:none;height:42%;border-right:none;border-bottom:1px solid var(--line)}
    .right{height:58%}
    .info{width:240px}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎣 Fish<span class="fin">Dex</span></h1>
    <span class="tag">North American angler's field guide</span>
    <span class="spacer"></span>
    <span class="tag" id="count"></span>
  </header>
  <div class="main">
    <aside class="rolodex">
      <div class="search">
        <input id="q" type="text" placeholder="Search species, family, bait, diet…" autocomplete="off" />
        <div class="ctxbar" id="ctx"><span>Showing all North American game fish</span></div>
      </div>
      <div class="list" id="list"></div>
    </aside>
    <section class="right">
      <div class="filters">
        <div class="top">
          <label class="toggle" id="angleToggle">
            <span class="switch"></span>
            <span><span class="lbl">Angling mode</span><br><span class="sub">rank by season, month & time of day</span></span>
          </label>
          <button id="nowBtn">🎣 What's biting now</button>
          <button id="ecoBtn" class="ghostbtn">🗺️ Ecoregions: off</button>
          <div class="ctxbar" style="margin-left:auto" id="hint">Tip: click any state, province, or Mexican state to see what swims there.</div>
        </div>
        <div class="anglefilters hide" id="angleFilters">
          <div class="fgroup">
            <div class="h">Month</div>
            <select class="mon" id="month"><option value="">Any month</option></select>
          </div>
          <div class="fgroup"><div class="h">Time of day</div><div class="seg" id="tod"></div></div>
          <div class="fgroup"><div class="h">Water type</div><div class="seg" id="water"></div></div>
        </div>
      </div>
      <div class="mapwrap">
        <div id="map"></div>
        <div class="loading" id="loading">Loading North America…</div>
        <div class="info" id="info"></div>
        <div class="legend" id="legend"></div>
      </div>
    </section>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ============================================================
   FishDex data v2 — curated North American game fish
   Coverage: USA (incl. AK & HI), Canada (provinces/territories),
   Mexico (states). Ranges are approximate native+established
   distributions by state/province. Seasons/months/time reflect
   typical PEAK angling activity, not absolute presence.
   Educational starting set — edit & expand freely.

   Fields per fish:
     id, name, sci, family, emoji, shape (svg silhouette key)
     water[]    : habitat types (used as a hard filter)
     habitat    : one-line description
     states[]   : state/province/Mexican-state names (accent-insensitive match)
     bestMonths : 1-12 peak months
     tod[]      : peak times of day
     tempF      : preferred water temp band
     baits[]    : top producers
     diet       : primary forage
     fight      : 1-5 sportfighting rating
     record     : approx. IGFA all-tackle world record (lb)
     regs       : generic regulation reminder
     tide       : tide/solunar relevance note ("" if N/A)
     tip        : tactical note
     subs[]     : optional subspecies {n, s, states[]}
   ============================================================ */

// -------- Region presets (names match GeoJSON "name", accent-insensitive) --------
const REGION = {
  // USA
  PNW:        ["Washington","Oregon","Idaho"],
  CALIF:      ["California"],
  GREATBASIN: ["Nevada","Utah"],
  ROCKIES:    ["Montana","Wyoming","Colorado","Idaho","Utah"],
  SOUTHWEST:  ["Arizona","New Mexico"],
  PLAINS:     ["North Dakota","South Dakota","Nebraska","Kansas","Oklahoma"],
  MIDWEST:    ["Minnesota","Wisconsin","Iowa","Missouri","Illinois","Indiana","Michigan","Ohio"],
  GREATLAKES: ["Minnesota","Wisconsin","Michigan","Illinois","Indiana","Ohio","New York","Pennsylvania"],
  NORTHEAST:  ["New York","Pennsylvania","New Jersey","Connecticut","Rhode Island","Massachusetts",
               "Vermont","New Hampshire","Maine"],
  MIDATL:     ["Maryland","Delaware","Virginia","West Virginia","North Carolina"],
  SOUTHEAST:  ["Virginia","North Carolina","South Carolina","Georgia","Florida","Alabama",
               "Tennessee","Kentucky","Mississippi"],
  GULF:       ["Florida","Alabama","Mississippi","Louisiana","Texas"],
  SOUTHCENT:  ["Texas","Oklahoma","Arkansas","Louisiana","Missouri"],
  ATLANTIC:   ["Maine","New Hampshire","Massachusetts","Rhode Island","Connecticut","New York",
               "New Jersey","Delaware","Maryland","Virginia","North Carolina","South Carolina",
               "Georgia","Florida"],
  PACIFICUS:  ["California","Oregon","Washington","Alaska"],
  ALASKA:     ["Alaska"],
  HAWAII:     ["Hawaii"],
  // Canada
  CAN_BC:     ["British Columbia"],
  CAN_WEST:   ["British Columbia","Alberta","Yukon"],
  CAN_PRAIRIE:["Alberta","Saskatchewan","Manitoba"],
  CAN_CENT:   ["Ontario","Quebec"],
  CAN_ATL:    ["New Brunswick","Nova Scotia","Prince Edward Island","Newfoundland and Labrador"],
  CAN_NORTH:  ["Yukon","Northwest Territories","Nunavut"],
  CAN_ALL:    ["British Columbia","Alberta","Saskatchewan","Manitoba","Ontario","Quebec",
               "New Brunswick","Nova Scotia","Prince Edward Island","Newfoundland and Labrador",
               "Yukon","Northwest Territories","Nunavut"],
  // Mexico
  MX_BAJA:    ["Baja California","Baja California Sur"],
  MX_CORTEZ:  ["Baja California Sur","Sonora","Sinaloa"],
  MX_PACIFIC: ["Baja California","Baja California Sur","Sonora","Sinaloa","Nayarit","Jalisco",
               "Colima","Michoacán","Guerrero","Oaxaca","Chiapas"],
  MX_GULF:    ["Tamaulipas","Veracruz","Tabasco","Campeche"],
  MX_CARIB:   ["Quintana Roo","Yucatán"]
};
function union(){ const s=new Set(); for(const a of arguments){ (REGION[a]||a).forEach(x=>s.add(x)); } return [...s]; }

const FISH = [
  /* ===================== BLACK BASS ===================== */
  { id:"largemouth", name:"Largemouth Bass", sci:"Micropterus salmoides", family:"Black Bass", emoji:"🐟", shape:"bass",
    water:["lake","pond","reservoir","river"], habitat:"Weedy lakes, ponds & slow rivers; relates to cover.",
    states:union("SOUTHEAST","SOUTHCENT","MIDWEST","MIDATL","NORTHEAST","CALIF","SOUTHWEST",["Oregon","Washington"],"MX_GULF",["Tamaulipas"]),
    bestMonths:[4,5,6,9,10], tod:["dawn","dusk","morning","night"], tempF:"65–80°F",
    baits:["Plastic worms","Jigs","Spinnerbaits","Topwater frogs","Crankbaits"],
    diet:"Baitfish, crayfish, frogs", fight:4, record:22.25, regs:"Often 12–15\" minimum; check slot limits.", tide:"",
    tip:"Pre-spawn (spring) and fall feed-up are prime. Fish shallow cover early & late.",
    subs:[ {n:"Florida Largemouth", s:"M. s. floridanus", states:["Florida","Texas","California"]},
           {n:"Northern Largemouth", s:"M. s. salmoides", states:union("MIDWEST","NORTHEAST","SOUTHEAST")} ] },

  { id:"smallmouth", name:"Smallmouth Bass", sci:"Micropterus dolomieu", family:"Black Bass", emoji:"🐟", shape:"bass",
    water:["lake","river","stream","reservoir"], habitat:"Cool, clear rocky lakes & current-swept rivers.",
    states:union("GREATLAKES","NORTHEAST","MIDWEST","MIDATL",["Tennessee","Kentucky","Missouri","Arkansas","Oklahoma","Washington","Oregon","Idaho"],"CAN_CENT",["Manitoba"]),
    bestMonths:[5,6,7,9,10], tod:["dawn","dusk","morning"], tempF:"60–72°F",
    baits:["Tube jigs","Ned rigs","Crankbaits","Drop-shot","Jerkbaits"],
    diet:"Crayfish, minnows", fight:5, record:11.94, regs:"Check seasonal closures during spawn.", tide:"",
    tip:"Loves rocky points & current seams. Pound-for-pound the hardest-fighting bass." },

  { id:"spotted", name:"Spotted Bass", sci:"Micropterus punctulatus", family:"Black Bass", emoji:"🐟", shape:"bass",
    water:["reservoir","river","lake"], habitat:"Clear reservoirs & rocky rivers of the South-Central US.",
    states:union("SOUTHCENT",["Georgia","Alabama","Tennessee","Kentucky","Mississippi","North Carolina","South Carolina","Kansas"]),
    bestMonths:[4,5,6,10], tod:["dawn","morning","dusk"], tempF:"63–78°F",
    baits:["Finesse jigs","Drop-shot","Spoons","Crankbaits"],
    diet:"Shad, crayfish", fight:4, record:10.5, regs:"Often grouped with bass limits.", tide:"",
    tip:"Holds deeper than largemouth; chase suspended fish over points & bluffs." },

  /* ===================== TEMPERATE BASS ===================== */
  { id:"striper", name:"Striped Bass", sci:"Morone saxatilis", family:"Temperate Bass", emoji:"🐠", shape:"striper",
    water:["saltwater","brackish","river","reservoir"], habitat:"Coastal migrations + landlocked reservoirs.",
    states:union("ATLANTIC",["California","Tennessee","Texas","Oklahoma","Arkansas","Alabama","Georgia"],"CAN_ATL",["Quebec"]),
    bestMonths:[4,5,6,10,11], tod:["dawn","dusk","night"], tempF:"55–68°F",
    baits:["Bunker/menhaden","Bucktail jigs","Topwater plugs","Live shad","Swimbaits"],
    diet:"Menhaden, herring, shad", fight:5, record:81.88, regs:"Strict slot & seasons on the coast — verify.", tide:"Tide-driven; fish moving water around dawn/dusk.",
    tip:"Follow the bait. Spring/fall coastal runs and reservoir schooling produce blitzes." },

  { id:"whitebass", name:"White Bass", sci:"Morone chrysops", family:"Temperate Bass", emoji:"🐠", shape:"striper",
    water:["reservoir","river","lake"], habitat:"Open-water schools in big reservoirs & tributaries.",
    states:union("MIDWEST","SOUTHCENT","PLAINS",["Tennessee","Kentucky","Ohio","Pennsylvania"]),
    bestMonths:[4,5,6], tod:["morning","midday","dusk"], tempF:"58–68°F",
    baits:["Inline spinners","Small jigs","Spoons","Live minnows"],
    diet:"Shad, insects", fight:3, record:6.81, regs:"Generous limits in most states.", tide:"",
    tip:"Spring spawning runs up rivers create fast, frenzied light-tackle action." },

  /* ===================== TROUT ===================== */
  { id:"rainbow", name:"Rainbow Trout", sci:"Oncorhynchus mykiss", family:"Trout", emoji:"🌈", shape:"trout",
    water:["stream","river","lake"], habitat:"Cold, oxygen-rich streams, tailwaters & stocked lakes.",
    states:union("PNW","ROCKIES","CALIF","NORTHEAST","GREATLAKES",["North Carolina","Tennessee","Georgia","Virginia","West Virginia","Arizona","New Mexico"],"CAN_WEST",["Ontario"]),
    bestMonths:[3,4,5,6,9,10], tod:["dawn","morning","dusk"], tempF:"50–62°F",
    baits:["Dry flies","Nymphs","Spinners","PowerBait","Salmon eggs"],
    diet:"Insects, eggs, baitfish", fight:4, record:48, regs:"Check stocking schedules & creel limits.", tide:"",
    tip:"Match the hatch on rivers; still-fish stocked lakes after spring stocking.",
    subs:[ {n:"Steelhead (sea-run)", s:"O. m. irideus", states:union("PNW","CALIF","GREATLAKES","CAN_BC",["Alaska"])},
           {n:"Redband Trout", s:"O. m. gairdneri", states:["Oregon","Idaho","Washington","Nevada","California"]} ] },

  { id:"brown", name:"Brown Trout", sci:"Salmo trutta", family:"Trout", emoji:"🐟", shape:"trout",
    water:["river","stream","lake"], habitat:"Bigger, warmer water than brookies; wary & predatory.",
    states:union("ROCKIES","NORTHEAST","GREATLAKES","PNW","CALIF",["North Carolina","Tennessee","Virginia","Arkansas","Missouri","Wisconsin"],["Ontario"]),
    bestMonths:[4,5,6,9,10,11], tod:["dusk","night","dawn"], tempF:"48–65°F",
    baits:["Streamers","Nymphs","Jerkbaits","Nightcrawlers","Spinners"],
    diet:"Insects, baitfish, mice", fight:4, record:44.3, regs:"Fall spawn closures common.", tide:"",
    tip:"Trophy browns feed hard at dusk and after dark, especially fall pre-spawn." },

  { id:"brook", name:"Brook Trout", sci:"Salvelinus fontinalis", family:"Trout", emoji:"🐟", shape:"trout",
    water:["stream","river","lake"], habitat:"Small, cold, pristine headwaters & northern ponds.",
    states:union("NORTHEAST","ROCKIES",["Michigan","Wisconsin","Minnesota","North Carolina","Tennessee","Virginia","West Virginia","Georgia"],"CAN_ATL","CAN_CENT",["Manitoba"]),
    bestMonths:[5,6,7,9], tod:["morning","dusk"], tempF:"45–58°F",
    baits:["Dry flies","Small spinners","Worms","Nymphs"],
    diet:"Insects, small baitfish", fight:3, record:14.5, regs:"Low creel limits protect natives.", tide:"",
    tip:"A true cold-water char. Tiny brookies hammer dry flies in mountain creeks." },

  { id:"cutthroat", name:"Cutthroat Trout", sci:"Oncorhynchus clarkii", family:"Trout", emoji:"🐟", shape:"trout",
    water:["stream","river","lake"], habitat:"Cold western streams & high-mountain lakes.",
    states:union("ROCKIES","PNW",["Nevada","California","Alaska","New Mexico"],"CAN_BC",["Alberta"]),
    bestMonths:[6,7,8,9], tod:["morning","midday","dusk"], tempF:"48–60°F",
    baits:["Attractor dry flies","Nymphs","Small spinners"],
    diet:"Insects, crustaceans", fight:3, record:41, regs:"Many waters catch-and-release for natives.", tide:"",
    tip:"Eager surface feeders once snowmelt clears. Many subspecies by drainage.",
    subs:[ {n:"Yellowstone Cutthroat", s:"O. c. bouvieri", states:["Wyoming","Montana","Idaho"]},
           {n:"Lahontan Cutthroat", s:"O. c. henshawi", states:["Nevada","California"]},
           {n:"Westslope Cutthroat", s:"O. c. lewisi", states:["Montana","Idaho","Washington","British Columbia","Alberta"]},
           {n:"Coastal Cutthroat", s:"O. c. clarkii", states:["Washington","Oregon","Alaska","California","British Columbia"]} ] },

  walleye: EU("NORTHWOODS","NORTHEAST","GREATLAKES_PLAIN","CORNBELT","PLAINS","APPALACHIA","INTERIOR","ROCKIES"),
  sauger: EU("PLAINS","CORNBELT","INTERIOR","OZARK","GREATLAKES_PLAIN",["Middle Rockies"]),
  yellowperch: EU("NORTHWOODS","NORTHEAST","GREATLAKES_PLAIN","CORNBELT","PLAINS","APPALACHIA"),
  // ----- Sunfish / Panfish -----
  bluegill: EU("SOUTHEAST","ATLANTIC_CP","FLORIDA","TEXAS","CORNBELT","OZARK","INTERIOR","GREATLAKES_PLAIN","PLAINS","CALVALLEY","DESERT","PNW","NORTHEAST"),
  redear: EU("SOUTHEAST","FLORIDA","TEXAS","ATLANTIC_CP","CALVALLEY","DESERT"),
  rockbass: EU("APPALACHIA","NORTHEAST","NORTHWOODS","GREATLAKES_PLAIN","OZARK","INTERIOR"),
  blackcrappie: EU("SOUTHEAST","ATLANTIC_CP","FLORIDA","TEXAS","CORNBELT","OZARK","INTERIOR","GREATLAKES_PLAIN","PLAINS","NORTHEAST","CALVALLEY"),
  whitecrappie: EU("SOUTHEAST","TEXAS","CORNBELT","OZARK","INTERIOR","PLAINS","GREATLAKES_PLAIN"),
  // ----- Catfish -----
  channelcat: EU("SOUTHEAST","ATLANTIC_CP","FLORIDA","TEXAS","CORNBELT","OZARK","INTERIOR","GREATLAKES_PLAIN","PLAINS","CALVALLEY","DESERT","NORTHEAST"),
  flathead: EU("OZARK","INTERIOR","SOUTHEAST","TEXAS","CORNBELT","PLAINS","APPALACHIA"),
  bluecat: EU("OZARK","INTERIOR","SOUTHEAST","TEXAS","CORNBELT","PLAINS","ATLANTIC_CP"),
  // ----- Sturgeon -----
  whitesturgeon: ["Columbia Plateau","Cascades","Coast Range","Willamette Valley","Snake River Plain","Central California Valley","Klamath Mountains/California High North Coast Range"],
  lakesturgeon: EU("NORTHWOODS","GREATLAKES_PLAIN","NORTHEAST","CORNBELT","INTERIOR"),
  // ----- Other Freshwater -----
  carp: EU("SOUTHEAST","ATLANTIC_CP","FLORIDA","TEXAS","CORNBELT","OZARK","INTERIOR","GREATLAKES_PLAIN","PLAINS","CALVALLEY","DESERT","NORTHEAST","PNW"),
  freshdrum: EU("CORNBELT","INTERIOR","OZARK","SOUTHEAST","TEXAS","PLAINS","GREATLAKES_PLAIN"),
  bowfin: EU("SOUTHEAST","ATLANTIC_CP","FLORIDA","NORTHWOODS","GREATLAKES_PLAIN","NORTHEAST"),
  alligatorgar: EU("SOUTHEAST","TEXAS")
};

</script>
<script>
/* ============================================================
   FishDex app logic v2
   ============================================================ */

// Runtime polygon sources (browser fetch; falls back in order).
const GEO_SOURCES = [
  { key:"us", urls:[
      "https://cdn.jsdelivr.net/gh/PublicaMundi/MappingAPI@master/data/geojson/us-states.json",
      "https://raw.githubusercontent.com/python-visualization/folium/main/examples/data/us-states.json",
      "https://cdn.jsdelivr.net/gh/codeforgermany/click_that_hood@main/public/data/united-states.geojson"
  ]},
  { key:"ca", urls:[
      "https://cdn.jsdelivr.net/gh/codeforgermany/click_that_hood@main/public/data/canada.geojson",
      "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/canada.geojson"
  ]},
  { key:"mx", urls:[
      "https://cdn.jsdelivr.net/gh/codeforgermany/click_that_hood@main/public/data/mexico.geojson",
      "https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/mexico.geojson"
  ]}
];

const state = {
  angling:false, month:"", tod:new Set(), water:new Set(),
  selectedFish:null, selectedSub:null, selectedState:null, selectedEco:null, query:""
};

let map, stateLayers={}, normIndex={};  // normIndex: normalized name -> display name

// Contiguous-US states: when a fish has ecoregion data, these are shown via
// ecoregion polygons instead of whole-state fills (AK/HI/Canada/Mexico stay state-level).
const LOWER48 = new Set(["Alabama","Arizona","Arkansas","California","Colorado","Connecticut","Delaware",
  "Florida","Georgia","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine",
  "Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada",
  "New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma",
  "Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah",
  "Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"].map(s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase()));

/* ---------- name normalization (accent/case-insensitive) ---------- */
function norm(s){ return (s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase()
  .replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim(); }

function fishById(id){ return FISH.find(f=>f.id===id); }
function fishStates(f, subIdx){
  if(subIdx!=null && f.subs && f.subs[subIdx]) return f.subs[subIdx].states;
  return f.states;
}
function fishStatesNorm(f, subIdx){ return new Set(fishStates(f,subIdx).map(norm)); }

/* ---------- ecoregion range helpers (US freshwater sharpening) ---------- */
// usesEco requires ecoData to be loaded; until then a fish falls back to whole-state display.
function usesEco(f, subIdx){ return subIdx==null && !!ecoData && typeof ECO_RANGE!=="undefined" && !!ECO_RANGE[f.id]; }
function fishEco(f, subIdx){ return usesEco(f,subIdx) ? ECO_RANGE[f.id] : []; }
function fishEcoNorm(f, subIdx){ return new Set(fishEco(f,subIdx).map(norm)); }
// states to highlight for a fish: if it has eco, drop lower-48 (shown as ecoregions) but keep AK/HI/Canada/Mexico
function fishHighlightStates(f, subIdx){
  const sts=fishStates(f,subIdx);
  return usesEco(f,subIdx) ? sts.filter(s=>!LOWER48.has(norm(s))) : sts;
}

/* ---------- bite score (blend month + time of day) ---------- */
function monthScore(f){
  if(state.month==="") return null;
  const m=+state.month;
  let best=99;
  for(const bm of f.bestMonths){ let d=Math.abs(bm-m); d=Math.min(d,12-d); best=Math.min(best,d); }
  if(best===0) return 1; if(best===1) return 0.6; if(best===2) return 0.3; return 0.1;
}
function todScore(f){
  if(state.tod.size===0) return null;
  return f.tod.some(t=>state.tod.has(t)) ? 1 : 0.2;
}
function evalFish(f){
  if(state.water.size && !f.water.some(w=>state.water.has(w))) return {visible:false};
  if(!state.angling) return {visible:true, rating:null, pct:null};
  const parts=[monthScore(f),todScore(f)].filter(x=>x!==null);
  if(parts.length===0) return {visible:true, rating:"good", pct:65};
  const avg=parts.reduce((a,b)=>a+b,0)/parts.length;
  const pct=Math.round(avg*100);
  const rating = avg>=0.75?"peak":avg>=0.42?"good":"slow";
  return {visible:true, rating, pct};
}

/* ---------- fish silhouettes (inline SVG) ---------- */
function fishSVG(shape, color, w){
  w=w||44; const h=Math.round(w*0.6);
  const c=color||"#5bbf9b", dk="rgba(0,0,0,.35)";
  let body;
  switch(shape){
    case "pike": case "gar":
      body=`<path d="M2 30 C20 16,55 16,78 27 L96 19 L90 30 L96 41 L78 33 C55 44,20 44,2 30 Z" fill="${c}"/>
            <circle cx="20" cy="28" r="2.4" fill="${dk}"/>`; break;
    case "flounder":
      body=`<ellipse cx="46" cy="30" rx="42" ry="20" fill="${c}"/>
            <path d="M88 30 l8 -6 v12 z" fill="${c}"/><circle cx="30" cy="24" r="2.6" fill="${dk}"/>`; break;
    case "marlin":
      body=`<path d="M30 30 C45 16,78 16,92 28 L98 22 L94 30 L98 38 L92 32 C78 44,45 44,30 30 Z" fill="${c}"/>
            <path d="M30 30 L0 22 L26 30 L0 38 Z" fill="${c}"/>
            <path d="M52 17 C56 9,64 8,70 12" stroke="${c}" stroke-width="3" fill="none"/>
            <circle cx="78" cy="27" r="2.4" fill="${dk}"/>`; break;
    case "tuna":
      body=`<path d="M6 30 C22 14,64 14,82 27 L98 16 L92 30 L98 44 L82 33 C64 46,22 46,6 30 Z" fill="${c}"/>
            <path d="M40 16 l5 -7 l3 8 z" fill="${c}"/><circle cx="22" cy="27" r="2.6" fill="${dk}"/>`; break;
    case "catfish":
      body=`<path d="M4 30 C22 18,58 18,80 28 L96 20 L90 30 L96 40 L80 32 C58 42,22 42,4 30 Z" fill="${c}"/>
            <circle cx="22" cy="27" r="2.4" fill="${dk}"/>
            <path d="M14 30 q-8 4 -14 2 M14 31 q-8 7 -15 8" stroke="${c}" stroke-width="1.6" fill="none"/>`; break;
    case "sturgeon":
      body=`<path d="M0 31 C24 22,60 22,86 28 L98 24 L94 31 L98 38 L86 34 C60 40,24 40,0 31 Z" fill="${c}"/>
            <path d="M10 24 L86 27" stroke="${dk}" stroke-width="1" opacity=".5"/>
            <circle cx="20" cy="29" r="2" fill="${dk}"/>`; break;
    default: // generic rounded gamefish
      body=`<path d="M4 30 C20 14,60 14,80 26 L98 16 L92 30 L98 44 L80 34 C60 46,20 46,4 30 Z" fill="${c}"/>
            <path d="M80 26 L98 16 L92 30 Z" fill="${c}"/>
            <circle cx="22" cy="27" r="2.6" fill="${dk}"/>
            <path d="M44 18 C50 24,50 36,44 42" stroke="${dk}" stroke-width="1" fill="none" opacity=".35"/>`;
  }
  return `<svg viewBox="0 0 100 60" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}
function stars(n){ return "★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n); }

/* ---------- rolodex render ---------- */
function renderList(){
  const list=document.getElementById("list"); const q=norm(state.query);
  const selStateNorm = state.selectedState?norm(state.selectedState):null;
  const selEcoNorm = state.selectedEco?norm(state.selectedEco):null;

  let items=FISH.filter(f=>{
    if(selEcoNorm && !fishEcoNorm(f).has(selEcoNorm)) return false;
    if(selStateNorm && !fishStatesNorm(f).has(selStateNorm)) return false;
    if(q){
      const hay=norm(f.name+" "+f.sci+" "+f.family+" "+f.baits.join(" ")+" "+(f.diet||"")+" "+
        (f.subs?f.subs.map(s=>s.n).join(" "):""));
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  const groups={}; items.forEach(f=>{ (groups[f.family]=groups[f.family]||[]).push(f); });
  list.innerHTML=""; let shown=0;

  Object.keys(groups).forEach(fam=>{
    // pre-eval to know if group has any visible
    const vis=groups[fam].map(f=>({f,ev:evalFish(f)})).filter(x=>x.ev.visible);
    if(!vis.length) return;
    const g=document.createElement("div"); g.className="grp";
    g.innerHTML=`<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${FAMILY_COLOR[fam]||'#5bbf9b'};margin-right:6px"></span>${fam} <span style="opacity:.6">(${vis.length})</span>`;
    list.appendChild(g);

    // sort by bite pct when angling
    if(state.angling) vis.sort((a,b)=>(b.ev.pct||0)-(a.ev.pct||0));

    vis.forEach(({f,ev})=>{
      shown++;
      const card=document.createElement("div");
      card.className="card"+(state.selectedFish===f.id?" sel":"")+(ev.rating==="slow"?" dim":"")+
        (state.selectedFish===f.id && f.subs?" open":"");
      card.dataset.id=f.id;

      let bite="";
      if(state.angling && ev.rating){
        const lbl=ev.rating==="peak"?`● Biting ${ev.pct}%`:ev.rating==="good"?`◐ Active ${ev.pct}%`:`○ Slow ${ev.pct}%`;
        bite=`<span class="bite ${ev.rating}">${lbl}</span>`;
      }
      const waterPills=f.water.slice(0,3).map(w=>`<span class="pill">${WATER_LABEL[w]||w}</span>`).join("");
      let subsHtml="";
      if(f.subs){ subsHtml=`<div class="subs">`+f.subs.map((s,i)=>
        `<div class="sub ${state.selectedFish===f.id&&state.selectedSub===i?'sel':''}" data-sub="${i}">
           <span class="sn">${s.n}</span><span class="ss">${s.s}</span></div>`).join("")+`</div>`; }

      card.innerHTML=`
        <div class="row1">
          <span class="thumb">${fishSVG(f.shape, FAMILY_COLOR[f.family])}</span>
          <div style="min-width:0;flex:1">
            <div class="nm">${f.name}</div>
            <div class="sci">${f.sci}</div>
          </div>
          ${bite}
        </div>
        <div class="meta">${waterPills}<span class="pill fight">${stars(f.fight)}</span>${f.subs?`<span class="pill">${f.subs.length} subsp.</span>`:""}</div>
        ${subsHtml}`;
      list.appendChild(card);
    });
  });

  if(shown===0){
    const where=state.selectedEco||state.selectedState;
    list.innerHTML=`<div style="padding:30px 16px;color:var(--muted);text-align:center">
      No fish match these filters.${where?`<br>Try clearing the <b>${where}</b> location.`:""}</div>`;
  }
  document.getElementById("count").textContent=shown+" / "+FISH.length+" species";
}

/* ---------- context bar ---------- */
function renderCtx(){
  const ctx=document.getElementById("ctx");
  if(state.selectedEco){
    ctx.innerHTML=`<span>Fish in the <b>${state.selectedEco}</b> ecoregion</span><button id="clearEco">Clear</button>`;
    document.getElementById("clearEco").onclick=()=>setSelectedEco(null);
  } else if(state.selectedState){
    ctx.innerHTML=`<span>Fish found in <b>${state.selectedState}</b></span><button id="clearState">Clear location</button>`;
    document.getElementById("clearState").onclick=()=>setSelectedState(null);
  } else if(state.selectedFish){
    const f=fishById(state.selectedFish);
    const sub=state.selectedSub!=null&&f.subs?" — "+f.subs[state.selectedSub].n:"";
    ctx.innerHTML=`<span>Range shown for <b>${f.name}${sub}</b></span><button id="clearFish">Show all</button>`;
    document.getElementById("clearFish").onclick=()=>selectFish(null);
  } else {
    ctx.innerHTML=`<span>Showing all North American game fish</span>`;
  }
}

/* ---------- map ---------- */
const HILITE={weight:1.2, color:"#0c2a22", fillColor:"#37b6a0", fillOpacity:.82};
const DIM={weight:.5, color:"#21404c", fillColor:"#11242c", fillOpacity:.32};
function styleState(name){
  const nn=norm(name);
  const base={weight:.8, color:"#2b4d59", fillColor:"#16323c", fillOpacity:.5};
  if(state.selectedFish){
    const f=fishById(state.selectedFish);
    const sts=new Set(fishHighlightStates(f, state.selectedSub).map(norm));
    return sts.has(nn) ? HILITE : DIM;
  }
  if(state.selectedEco) return DIM; // dim states so the ecoregion reads clearly
  if(state.selectedState && norm(state.selectedState)===nn)
    return {weight:2, color:"#5ad1bb", fillColor:"#26566b", fillOpacity:.85};
  return base;
}
function restyle(){
  for(const k in stateLayers) stateLayers[k].setStyle(styleState(stateLayers[k]._fdName));
  if(ecoLayer) ecoLayer.setStyle(styleEcoFeature);
}

function onEachState(feature, layer){
  const name=feature.properties.name || feature.properties.NAME || "—";
  layer._fdName=name;
  stateLayers[norm(name)]=layer; normIndex[norm(name)]=name;
  layer.bindTooltip(name,{className:"stt",sticky:true});
  layer.on({
    mouseover:e=>{ const s=styleState(name); e.target.setStyle({weight:2.2,color:"#5ad1bb",fillOpacity:Math.min(.95,s.fillOpacity+.15)}); e.target.bringToFront(); },
    mouseout:e=>e.target.setStyle(styleState(name)),
    click:()=>setSelectedState(name)
  });
}

function initMap(){
  map=L.map("map",{minZoom:2,maxZoom:8,zoomControl:true,worldCopyJump:true}).setView([44,-96],3);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; OpenStreetMap, &copy; CARTO • boundaries: click_that_hood', subdomains:"abcd", maxZoom:8
  }).addTo(map);
  let loaded=0;
  GEO_SOURCES.forEach(src=>loadGeo(src.urls,0,()=>{ loaded++; if(loaded>=GEO_SOURCES.length){ document.getElementById("loading").style.display="none"; restyle(); }}));
}
function loadGeo(urls, i, done){
  if(i>=urls.length){ console.warn("FishDex: all sources failed for",urls[0]); done(); return; }
  fetch(urls[i]).then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(geo=>{ L.geoJSON(geo,{style:f=>styleState(f.properties.name||f.properties.NAME),onEachFeature:onEachState}).addTo(map); done(); })
    .catch(()=>loadGeo(urls,i+1,done));
}

/* ---------- ecoregion layer (EPA Level III) ----------
   ecoData : parsed FeatureCollection (loaded once)
   ecoMode : toggle — interactive ecoregion filtering + colored overview
   The layer is shown when: ecoMode, or an ecoregion is selected, or a
   selected fish has ecoregion data. Interactive only in ecoMode, so
   state click-to-filter still works underneath otherwise. */
let ecoData=null, ecoLayer=null, ecoMode=false, ecoLoading=false;
const ECO_PALETTE=["#caa24a","#6fae54","#5aa9d6","#cf8f6f","#9b7fd1","#5ec2a0","#d6a05a","#88909e","#c77f9e","#7bb25e","#bf6f6f","#5a86d6"];
const ECO_L1_COLOR={};
function ecoColor(name){ name=name||"—"; if(!(name in ECO_L1_COLOR)) ECO_L1_COLOR[name]=ECO_PALETTE[Object.keys(ECO_L1_COLOR).length%ECO_PALETTE.length]; return ECO_L1_COLOR[name]; }
function ecoBandStyle(f){ const c=ecoColor(f&&f.properties&&f.properties.NA_L1NAME); return {color:c,weight:.5,fillColor:c,fillOpacity:.18}; }
const ECO_HIDE={color:"#000",weight:0,fillColor:"#000",fillOpacity:0};
function styleEcoFeature(f){
  const nn=norm(f&&f.properties&&f.properties.US_L3NAME);
  if(state.selectedFish){
    const fish=fishById(state.selectedFish);
    if(usesEco(fish,state.selectedSub)){
      return fishEcoNorm(fish,state.selectedSub).has(nn)
        ? {color:"#0c2a22",weight:.8,fillColor:"#37b6a0",fillOpacity:.8}
        : (ecoMode?ecoBandStyle(f):ECO_HIDE);
    }
    return ecoMode?ecoBandStyle(f):ECO_HIDE;
  }
  if(state.selectedEco){
    return norm(state.selectedEco)===nn
      ? {color:"#5ad1bb",weight:1.6,fillColor:"#37b6a0",fillOpacity:.72}
      : (ecoMode?ecoBandStyle(f):ECO_HIDE);
  }
  return ecoMode?ecoBandStyle(f):ECO_HIDE;
}
function onEachEco(feature, layer){
  const nm=feature.properties&&feature.properties.US_L3NAME;
  layer.bindTooltip(nm||"Ecoregion",{className:"eco",sticky:true});
  layer.on("click",()=>setSelectedEco(nm));
}
function buildEcoLayer(){
  if(!ecoData) return;
  ecoLayer=L.geoJSON(ecoData,{interactive:ecoMode, style:styleEcoFeature, onEachFeature: ecoMode?onEachEco:undefined});
}
// decide presence + (re)build the eco layer to match current selection/mode
function refreshEco(){
  const show = ecoMode || state.selectedEco || (state.selectedFish && usesEco(fishById(state.selectedFish), state.selectedSub));
  if(ecoLayer){ map.removeLayer(ecoLayer); ecoLayer=null; }
  if(show && ecoData){ buildEcoLayer(); ecoLayer.addTo(map); ecoLayer.bringToFront(); }
}
function loadEcoData(urls,i,cb){
  if(i>=urls.length){ cb(false); return; }
  fetch(urls[i]).then(r=>r.ok?r.json():Promise.reject()).then(geo=>{ ecoData=geo; cb(true); }).catch(()=>loadEcoData(urls,i+1,cb));
}
function preloadEco(){ if(!ecoData && !ecoLoading){ ecoLoading=true; loadEcoData(ECOREGION_SOURCES,0,(ok)=>{ ecoLoading=false; if(ok){ refreshEco(); restyle(); } }); } }
function toggleEcoMode(){
  const btn=document.getElementById("ecoBtn");
  const setBtn=(on,txt)=>{ btn.classList.toggle("on",on); btn.textContent="🗺️ "+(txt||("Ecoregions: "+(on?"on":"off"))); };
  const hint=document.getElementById("hint");
  if(!ecoData){
    setBtn(false,"Ecoregions: loading…");
    loadEcoData(ECOREGION_SOURCES,0,(ok)=>{ if(ok){ ecoMode=true; setBtn(true); hint.textContent="Ecoregion mode: click an ecoregion to see its fish."; refreshEco(); restyle(); }
      else { setBtn(false,"Ecoregions: unavailable"); setTimeout(()=>setBtn(false),2600); } });
    return;
  }
  ecoMode=!ecoMode; setBtn(ecoMode);
  hint.textContent = ecoMode ? "Ecoregion mode: click an ecoregion to see its fish."
                             : "Tip: click any state, province, or Mexican state to see what swims there.";
  refreshEco(); restyle();
}

/* ---------- info card ---------- */
const photoCache={};
function loadPhoto(f, imgEl, creditEl){
  const title=(typeof WIKI!=="undefined")?WIKI[f.id]:null; if(!title||!imgEl) return;
  const apply=(o)=>{ if(!o||!o.src) return; imgEl.onload=()=>{imgEl.style.display="block";}; imgEl.src=o.src; if(creditEl&&o.credit) creditEl.textContent=o.credit; };
  if(photoCache[f.id]!==undefined){ apply(photoCache[f.id]); return; }
  fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title))
    .then(r=>r.ok?r.json():Promise.reject())
    .then(d=>{
      let src=(d.thumbnail&&d.thumbnail.source)||(d.originalimage&&d.originalimage.source)||null;
      if(src) src=src.replace(/\/\d+px-/,"/500px-");
      const o = src?{src,credit:"Photo: Wikipedia / "+(d.title||title)}:null;
      photoCache[f.id]=o; apply(o);
    }).catch(()=>{ photoCache[f.id]=null; });
}
function renderInfo(){
  const box=document.getElementById("info");
  if(state.selectedFish){ renderFishInfo(box); box.classList.add("show"); return; }
  if(state.selectedEco){ renderEcoInfo(box); box.classList.add("show"); return; }
  if(state.selectedState){ renderStateInfo(box); box.classList.add("show"); return; }
  box.classList.remove("show");
}
function renderEcoInfo(box){
  const name=state.selectedEco;
  const here=FISH.filter(f=>fishEcoNorm(f).has(norm(name)));
  let l1="";
  if(ecoData){ const ft=ecoData.features.find(f=>norm(f.properties.US_L3NAME)===norm(name)); if(ft) l1=(ft.properties.NA_L1NAME||"").toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }
  const pills=here.map(f=>`<span class="pill" data-fid="${f.id}">${f.name}</span>`).join("")
    ||'<span style="color:var(--muted);font-size:12px">No freshwater species tagged here yet.</span>';
  box.innerHTML=`<div class="pad">
    <div class="ihead"><span style="font-size:22px">🗺️</span><div><h3>${name}</h3>
      <div class="sci">EPA Level III ecoregion${l1?" · "+l1:""}</div></div></div>
    <div class="kv">${here.length} freshwater species tagged to this ecoregion.</div>
    <div class="kv" style="margin-top:8px"><b>Species here</b> <span style="color:var(--muted)">(tap to view range)</span></div>
    <div class="speclist">${pills}</div>
    <div class="disclaimer">Ecoregion ranges are curated approximations for freshwater fish. Marine species and Alaska/Hawaii/Canada/Mexico stay state-level.</div>
  </div>`;
  box.querySelectorAll(".speclist .pill[data-fid]").forEach(p=>p.onclick=()=>selectFish(p.dataset.fid));
}
function renderFishInfo(box){
  const f=fishById(state.selectedFish);
  const sub=state.selectedSub!=null&&f.subs?f.subs[state.selectedSub]:null;
  const months=f.bestMonths.map(m=>MONTHS[m-1].slice(0,3)).join(", ");
  const tod=f.tod.map(t=>TOD_LABEL[t]).join(", ");
  box.innerHTML=`
    <img class="hero" alt="${f.name}">
    <div class="pad">
      <div class="ihead">
        <span class="iart">${fishSVG(f.shape,FAMILY_COLOR[f.family],60)}</span>
        <div><h3>${f.name}${sub?` <span class="subname">(${sub.n})</span>`:""}</h3>
        <div class="sci">${sub?sub.s:f.sci}</div></div>
      </div>
      <div class="kv"><b>Family:</b> ${f.family} &nbsp;·&nbsp; <b>Fight:</b> <span class="stars">${stars(f.fight)}</span></div>
      <div class="kv"><b>Habitat:</b> ${f.habitat}</div>
      <div class="kv"><b>Diet:</b> ${f.diet}</div>
      <div class="kv"><b>Best months:</b> ${months} &nbsp;·&nbsp; <b>Time:</b> ${tod}</div>
      <div class="kv"><b>Water temp:</b> ${f.tempF} &nbsp;·&nbsp; <b>World record:</b> ${f.record} lb</div>
      ${f.tide?`<div class="kv"><b>Tide / solunar:</b> ${f.tide}</div>`:""}
      <div class="kv"><b>Regs:</b> <span style="color:var(--warn)">${f.regs}</span> <span style="color:var(--muted)">— click a state for official limits.</span></div>
      <div class="kv"><b>Tip:</b> ${f.tip}</div>
      <div class="kv" style="margin-top:6px"><b>What they're biting:</b></div>
      <div class="baits">${f.baits.map(b=>`<span class="pill">${b}</span>`).join("")}</div>
      <div class="credit"></div>
    </div>`;
  loadPhoto(f, box.querySelector(".hero"), box.querySelector(".credit"));
}
function renderStateInfo(box){
  const name=state.selectedState;
  const here=FISH.filter(f=>fishStatesNorm(f).has(norm(name)));
  const reg = STATE_REGS[name] || (typeof MX_STATES!=="undefined"&&MX_STATES.has(name)?MX_REGS:null);
  const pills=here.slice(0,48).map(f=>`<span class="pill" data-fid="${f.id}">${f.name}</span>`).join("")
    ||'<span style="color:var(--muted);font-size:12px">No species in this guide yet for here.</span>';
  box.innerHTML=`<div class="pad">
    <div class="ihead"><span style="font-size:22px">📍</span><div><h3>${name}</h3>
      <div class="sci">${here.length} game species in this guide</div></div></div>
    ${reg?`<div class="kv"><b>Official source:</b> ${reg.agency}</div>
      <a class="reglink" href="${reg.url}" target="_blank" rel="noopener noreferrer">📋 Regulations & licenses ↗</a>
      <div class="disclaimer">Bag, size & season limits change yearly and vary by waterbody — always confirm current rules on the official site before you fish.</div>`
     :`<div class="kv" style="color:var(--muted)">No official-source link on file for this region yet.</div>`}
    <div class="kv" style="margin-top:10px"><b>Species found here</b> <span style="color:var(--muted)">(tap to view range)</span></div>
    <div class="speclist">${pills}</div>
  </div>`;
  box.querySelectorAll(".speclist .pill[data-fid]").forEach(p=>p.onclick=()=>selectFish(p.dataset.fid));
}

/* ---------- selection ---------- */
function selectFish(id, subIdx=null){
  if(state.selectedFish===id && state.selectedSub===subIdx && id!==null){ state.selectedFish=null; state.selectedSub=null; }
  else { state.selectedFish=id; state.selectedSub=subIdx; if(id){ state.selectedState=null; state.selectedEco=null; } }
  refreshEco(); restyle(); renderInfo(); renderList(); renderCtx();
  if(id){
    const f=fishById(id); const b=L.latLngBounds([]);
    fishHighlightStates(f,subIdx).map(norm).forEach(n=>{ const ly=stateLayers[n]; if(ly){ try{ b.extend(ly.getBounds()); }catch(e){} } });
    if(usesEco(f,subIdx) && ecoLayer){ const set=fishEcoNorm(f,subIdx); ecoLayer.eachLayer(l=>{ if(l.feature && set.has(norm(l.feature.properties.US_L3NAME))){ try{ b.extend(l.getBounds()); }catch(e){} } }); }
    if(b.isValid()){ try{ map.fitBounds(b.pad(0.12),{maxZoom:6,animate:true}); }catch(e){} }
  }
}
function setSelectedState(name){
  state.selectedState=(state.selectedState===name)?null:name;
  if(state.selectedState){ state.selectedFish=null; state.selectedSub=null; state.selectedEco=null; }
  refreshEco(); renderInfo(); restyle(); renderList(); renderCtx();
}
function setSelectedEco(name){
  state.selectedEco=(state.selectedEco===name)?null:name;
  if(state.selectedEco){ state.selectedFish=null; state.selectedSub=null; state.selectedState=null; }
  refreshEco(); renderInfo(); restyle(); renderList(); renderCtx();
  if(state.selectedEco && ecoLayer){
    let lyr=null; ecoLayer.eachLayer(l=>{ if(l.feature && norm(l.feature.properties.US_L3NAME)===norm(state.selectedEco)) lyr=l; });
    if(lyr){ try{ map.fitBounds(lyr.getBounds().pad(0.25),{maxZoom:6,animate:true}); }catch(e){} }
  }
}

/* ---------- filters UI ---------- */
function buildFilterUI(){
  const monthSel=document.getElementById("month");
  MONTHS.forEach((m,i)=>{ const o=document.createElement("option"); o.value=i+1; o.textContent=m; monthSel.appendChild(o); });
  monthSel.onchange=()=>{ state.month=monthSel.value; renderList(); };

  document.getElementById("nowBtn").onclick=()=>{
    const m=new Date().getMonth()+1; state.month=String(m); monthSel.value=m;
    const hr=new Date().getHours();
    const t = hr<7?"dawn":hr<11?"morning":hr<14?"midday":hr<17?"afternoon":hr<20?"dusk":"night";
    state.tod=new Set([t]);
    document.querySelectorAll('#tod button').forEach(b=>b.classList.toggle("on",b.dataset.k===t));
    if(!state.angling) document.getElementById("angleToggle").click();
    renderList();
  };

  const todBox=document.getElementById("tod");
  TOD_ORDER.forEach(t=>{ const b=document.createElement("button"); b.textContent=TOD_LABEL[t]; b.dataset.k=t;
    b.onclick=()=>{ b.classList.toggle("on"); state.tod.has(t)?state.tod.delete(t):state.tod.add(t); renderList(); }; todBox.appendChild(b); });

  const waterBox=document.getElementById("water");
  Object.keys(WATER_LABEL).forEach(w=>{ const b=document.createElement("button"); b.textContent=WATER_LABEL[w]; b.dataset.k=w;
    b.onclick=()=>{ b.classList.toggle("on"); state.water.has(w)?state.water.delete(w):state.water.add(w); renderList(); }; waterBox.appendChild(b); });

  document.getElementById("ecoBtn").onclick=toggleEcoMode;

  const tgl=document.getElementById("angleToggle");
  tgl.onclick=()=>{ state.angling=!state.angling; tgl.classList.toggle("on",state.angling);
    document.getElementById("angleFilters").classList.toggle("hide",!state.angling);
    document.getElementById("hint").textContent=state.angling?"Set month & time to rank what's biting now.":"Tip: click any state, province, or Mexican state to see what swims there.";
    renderList(); };
}
function renderLegend(){
  document.getElementById("legend").innerHTML=`
    <div><i style="background:#37b6a0"></i>Selected range (state or ecoregion)</div>
    <div><i style="background:#26566b"></i>Clicked location</div>
    <div><i style="background:#16323c"></i>Other states / provinces</div>
    <div style="margin-top:3px;font-size:10px;opacity:.7">US freshwater fish show ecoregion ranges</div>`;
}

/* ---------- events ---------- */
function wireList(){
  document.getElementById("list").addEventListener("click",e=>{
    const subEl=e.target.closest(".sub"); const card=e.target.closest(".card");
    if(subEl&&card){ selectFish(card.dataset.id,+subEl.dataset.sub); return; }
    if(card) selectFish(card.dataset.id);
  });
  const q=document.getElementById("q"); q.addEventListener("input",()=>{ state.query=q.value; renderList(); });
}

window.addEventListener("DOMContentLoaded",()=>{
  buildFilterUI(); wireList(); renderLegend(); renderList(); renderCtx(); initMap();
  setTimeout(preloadEco, 1200); // warm the ecoregion data so fish ranges render instantly
});

</script>
</body>
</html>
