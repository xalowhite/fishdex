  { name:"Lake Taneycomo", region:"Missouri", type:"tailwater", lat:36.643, lon:-93.225,

    best:"Year-round; brown bite peaks Nov–Feb. Fish low water early.", how:"Drift scuds, jigs & micro-jigs on light line; wade the upper end on low generation, troll/drift below.", size:"~2,000 ac tailwater · Branson",
    intel:"Low generation is prime: #14–18 scuds, sow bugs & zebra/thread midges under a yarn indicator; 9' 5wt, 5–6X fluoro, a #6–8 split shot. Gear anglers: 1/16 oz marabou jigs & Trout Magnets on 2–4 lb line, dead-drifted. Bait (PowerBait, night crawlers) is allowed only below the trophy/artificial area — check signs.",
    access:[{name:"Below Table Rock Dam / Lilleys'",lat:36.643,lon:-93.225},{name:"Fall Creek",lat:36.625,lon:-93.205},{name:"Cooper Creek",lat:36.612,lon:-93.185},{name:"Trophy Run (upper)",lat:36.645,lon:-93.230}] },
  { name:"Roaring River (State Park)", region:"Missouri", type:"troutpark", lat:36.581, lon:-93.832,
    species:["rainbow"], note:"Spring-fed put-and-take trout park near Cassville.", best:"C&K season Mar 1–Oct 31; opening day is a tradition.", how:"Daily stocked rainbows; flies in the fly zone, dough bait/spinners elsewhere. Bank & wade.", size:"Spring branch · Cassville",
    intel:"Three zones (check posted signs): Zone 1 from the hatchery down — artificials/soft plastics/flies only; Zone 3 below the old dam at Campground 3 opens up natural & scented baits. Daily limit 4, browns must be 15\"+. Tight, fast pocket water in the upper park — high-stick #14–16 eggs, San Juans & glo-balls; micro-jigs (1/32 oz) in the deeper pools. Winter C&R season (2nd Fri Nov–2nd Mon Feb, Fri–Mon only) is flies-only and far less crowded. Below the park boundary, 4 miles of White Ribbon water runs toward Table Rock — bigger water, fewer people." },
  { name:"Bennett Spring (State Park)", region:"Missouri", type:"troutpark", lat:37.717, lon:-92.853,
    species:["rainbow"], note:"One of MO's busiest trout parks near Lebanon.", best:"Mar–Oct season; winter C&R weekends.", how:"Heavy stocking; flies-only zone up top, bait/spinners below. Wade & bank.", size:"Niangua headwater · Lebanon",
    intel:"Zones run downstream from the hatchery: Zone 1 flies only, Zone 2 (hatchery dam to the whistle bridge) flies & artificial lures, Zone 3 (whistle bridge to the Niangua) natural/soft/scented baits ONLY — no lures or flies there, even tipped. Daily limit 4 (one brown 15\"+), possession 8, one pole. The famous local patterns: cracklebacks, Bennett Spring Specials (a yellow marabou), and white/olive woolly buggers swung through the riffles. The spring branch dumps into the Niangua — fish follow it out, so the river below the park holds escapees year-round." },
  { name:"Montauk (State Park)", region:"Missouri", type:"troutpark", lat:37.452, lon:-91.693,
    species:["rainbow","brown"], note:"Headwaters of the Current River.", best:"Mar–Oct; wild-trout water downstream fishes year-round.", how:"Stocked park up top; nymphs & small streamers in the wild section below. Wade.", size:"Current R. headwater · Salem",
    intel:"Montauk's springs join Pigeon Creek to birth the Current River. Three zones: flies-only from the Mill Dam up to the springs; a C&R flies-only stretch around Montauk Lake/spillway; artificial-and-natural-bait water below the Mill Pool Dam to the park boundary. Daily limit 4, browns 15\"+. Winter C&R (Fri–Mon, 8–4) is flies only. The real sleeper: walk DOWNSTREAM out of the park — the Current's Blue Ribbon wild section (Montauk to Cedargrove) holds wild rainbows that see far fewer flies. Crowds thin midweek; the Mill Dam pools get hammered." },
  { name:"Maramec Spring Park", region:"Missouri", type:"troutpark", lat:37.954, lon:-91.531,
    species:["rainbow"], note:"Privately-run trout park fed by MO's 5th-largest spring.", best:"Mar–Oct C&K season.", how:"Stocked rainbows on flies, spinners or dough bait. Bank & wade.", size:"Spring branch · St. James",
    intel:"Run by the James Foundation (small daily entrance fee) with MDC stocking the spring branch daily in season — all baits legal in the fishing zone below the fish sanctuary, daily limit 4, browns 15\"+. Winter C&R season here runs SEVEN days a week (8–4, flies only), unlike Montauk/Bennett. The spring branch is short and dumps straight into the Meramec — the Meramec's Red Ribbon trout water below the park (artificials only, 2 trout 15\"+) is the escape hatch when the branch is elbow-to-elbow, and it grows genuinely large browns." },
  { name:"North Fork of the White River", region:"Missouri", type:"troutstream", lat:36.78, lon:-92.13,
    species:["rainbow","brown"], note:"Blue-ribbon wild trout water — self-sustaining rainbows and big browns.", best:"Spring & fall; sulphur hatch in May.", how:"Spring-creek tactics — small nymphs, dry-dropper; float-and-wade. Canoe access.", size:"~10 mi trophy section · West Plains",
    intel:"Rainbow Spring and a string of smaller springs keep the trout water cold. Blue Ribbon rules through the wild section: flies/artificials only, one fish 18\"+ — functionally C&R. Wild rainbows dominate the riffles (scuds, sowbugs, #16–18 pheasant tails); the browns are fewer, bigger and nocturnal — big articulated streamers at dusk or mouse patterns after dark move them. This is float-to-fish water: the wade spots near access points get pressure, the water between them doesn't. Summer canoe hatches make weekend mornings the only sane window." },
  { name:"Crane Creek", region:"Missouri", type:"troutstream", lat:36.90, lon:-93.57,
    species:["rainbow"], note:"Tiny stream holding rare wild McCloud-strain rainbows.", best:"Cool months; very low/clear in summer.", how:"Stealth, fine tippet, tiny flies; strictly catch-and-release. Walk-in.", size:"Small creek · Crane",
    intel:"These are believed to be the only pure-strain McCloud River (California) rainbows left anywhere — unstocked since 1967, self-sustaining ever since. Blue Ribbon regs (flies/artificials, one fish 18\"+ — treat it as pure C&R). They survived a century by spooking first and asking questions later: one bad cast empties a pool. Crawl, stay off the skyline, fish 6–7X and #18–22 — zebra midges, micro pheasant tails, tiny ants/beetles in summer. Access at Wire Road CA and the Crane city park. A 10-incher here is a trophy; photograph fast and wet your hands." },
  { name:"Little Piney Creek", region:"Missouri", type:"troutstream", lat:37.88, lon:-91.83,
    species:["rainbow"], note:"Ozark wild-trout creek with naturally reproducing rainbows.", best:"Spring & fall; low summer flows.", how:"Light tackle, nymphs & small spinners; wade. Walk-in access points.", size:"Small Ozark creek · Newburg",
    intel:"Lane, Piney and Yancy Mill springs hold over 1,000 wild rainbows per mile around Lane Spring — one of MO's densest wild-trout populations. The upper ~10 miles (incl. Piney & Lane spring branches) down to Milldam Hollow is Blue Ribbon (artificials only, one 18\"+); below Milldam Hollow ~4 miles is White Ribbon stocked water. Pocket-water fishing: #16 caddis & cracklebacks on top in spring, scuds/PTs otherwise. The USFS Lane Spring Rec Area off Hwy 63 south of Rolla is the classic walk-in. Summer flows get skinny — fish early, tread lightly." },
  { name:"Blue Springs Creek", region:"Missouri", type:"troutstream", lat:38.18, lon:-91.18,
    species:["rainbow"], note:"Cold spring-fed wild rainbow stream feeding the Meramec.", best:"Year-round; best in cooler water.", how:"Small dries & nymphs; catch-and-release ethic. Wade/walk-in.", size:"Small creek · Bourbon",
    intel:"Wild rainbows descended from early-1900s hatchery fish that went feral — naturally reproducing ever since. The Blue Ribbon area runs ~4 miles from Blue Spring to the Meramec, mostly on Blue Springs Creek CA (Hwy N south of Bourbon, an hour from St. Louis). The creek is 5–20 FEET wide with brush crowding every cast: this is bow-and-arrow and roll-cast country. Short 3wt, 6X, #16–20 — zebra midges, micro scuds, beetles & hoppers tight to the grass in summer. Artificials only, one fish 18\"+ (i.e., release everything). Avoid wading gravel in fall/winter — redds." },
  { name:"Roubidoux Creek", region:"Missouri", type:"troutstream", lat:37.83, lon:-92.20,
    species:["rainbow"], note:"Stocked + holdover rainbows through Waynesville.", best:"Winter C&R Nov–Feb; stocked in season.", how:"Spinners, small jigs and flies; easy bank & wade access in town.", size:"Town creek · Waynesville",
    intel:"Roubidoux Spring boils up just above downtown Waynesville; the ~3 miles below it to the Gasconade is White Ribbon water (all baits, 4 daily, browns 15\"+) — and the short town stretch through the city park is one of the most heavily stocked White Ribbon reaches in the state. Easy bank fishing makes it a perfect first-trout or kids' water: marabou jigs, inline spinners, PowerBait under a float. Trout slide downstream toward the Gasconade as summer warms the lower creek — winter concentrates them right at the spring. Check MDC for the current special-management zone above town." },
  { name:"Eleven Point River (MO)", region:"Missouri", type:"troutstream", lat:36.78, lon:-91.30,
    species:["rainbow","smallmouth","rockbass"], note:"Scenic Ozark float — trout up high (Greer Spring), smallmouth lower.", best:"Spring & fall floats; summer for smallmouth.", how:"Canoe float; flies/spinners for trout, soft plastics for smallmouth.", size:"Wild & Scenic river · Alton",
    intel:"Greer Spring (one of the world's biggest) doubles the river and instantly turns it cold: the 5.5 miles from Greer to Turner Mill is Blue Ribbon trout water (artificials only, one rainbow 18\"+, ~8,000 trout stocked yearly into wild-reproducing water); Turner Mill to Riverton (Hwy 160) is 14 miles of White Ribbon with ~16,000 stockers. Access is sparse — Hwy 19 at Greer, USFS gravel to Turner Mill N/S, Whitten, Riverton — so a canoe opens water wade anglers never touch. Trout: scuds, woolly buggers, spoons in the deep emerald runs. Below Riverton it grades into quality smallmouth float water." },
  // ---- Smallmouth (Ozark) rivers ----
  { name:"Current River (lower)", region:"Missouri", type:"smbriver", lat:37.18, lon:-91.18,
    species:["smallmouth","rockbass","walleye"], note:"Classic Ozark float — smallmouth, goggle-eye and river walleye.", best:"Apr–Jun & Sep–Oct; dawn/dusk.", how:"Tube jigs, topwater & crankbaits along bluff pools; canoe/kayak float.", size:"NPS Riverways · Van Buren",
    intel:"Smallmouth special-management stretches reward a release ethic. Green-pumpkin tubes & Ned rigs on 1/16 oz heads, suspending jerkbaits in cool water, and walk-the-dog/poppers at dawn over bluff pools. River walleye hold in deep runs at dusk — jig a minnow. Goggle-eye (rock bass) eat small crankbaits along the rock.",
    access:[{name:"Akers Ferry",lat:37.378,lon:-91.553},{name:"Pulltite",lat:37.310,lon:-91.470},{name:"Round Spring",lat:37.283,lon:-91.408},{name:"Two Rivers (Jacks Fork)",lat:37.150,lon:-91.150}] },
  { name:"Jacks Fork River", region:"Missouri", type:"smbriver", lat:37.18, lon:-91.36,
    species:["smallmouth","rockbass"], note:"Clear, spring-fed tributary of the Current.", best:"Late spring–summer when floatable.", how:"Wade or float; small tubes, Ned rigs, poppers. Upper section seasonal.", size:"Spring-fed float · Eminence",
    intel:"Smallmouth special-management water: 15\" minimum, one smallmouth daily — the goggle-eye fishing fills the cooler instead. Alley Spring (MO's 7th-largest) to the Eminence bridge is the classic float; Rhymers to Alley is 15 miles of the best numbers-and-size water. The upper Jacks Fork above Alley is spring-fed, gin-clear and only floatable in spring — that early window is when the biggest smallmouth eat suspending jerkbaits before the canoe armada arrives. Summer: tubes and Neds through bluff pools at dawn, poppers in the shade lines, then surrender the river to swimmers by 11am." },
  { name:"Big River", region:"Missouri", type:"smbriver", lat:38.05, lon:-90.62,
    species:["smallmouth","rockbass","largemouth"], note:"Eastern-Ozark smallmouth with C&R special-management stretches.", best:"Apr–Jun & fall.", how:"Wade or kayak; jerkbaits, tubes, crawfish colors on gravel runs.", size:"~140 mi · Potosi/De Soto",
    intel:"A smallmouth special-management river (15\" minimum, one daily within the SMA) less than an hour from St. Louis — the closest legit trophy-smallmouth float to the metro. Slower and warmer than the spring-fed Ozark rivers, so largemouth mix in on the wood and the smallmouth run chunky. Crawfish-pattern squarebills and 3\" tubes through the rock gardens, spinnerbaits on the wood, buzzbaits in low light. Old lead-belt legacy: some stretches carry fish-consumption advisories — release fish here anyway. St. Francois State Park and Washington State Park reaches give easy wade/kayak access." },
  { name:"Meramec River", region:"Missouri", type:"smbriver", lat:38.24, lon:-91.10,
    species:["smallmouth","walleye","channelcat","rockbass","largemouth","flathead"], note:"Big float river — smallmouth up top, walleye & cats lower.", best:"Spring smallmouth; winter walleye below.", how:"Crankbaits & tubes for smb; jigs/minnows for walleye. Many access points.", size:"~218 mi · Sullivan/St. Clair",
    intel:"The SMA from the Hwy 8 bridge down to Bird's Nest carries the 15\"/one-smallmouth rule — that stretch (Meramec State Park, Campbell Bridge, Sappington Bridge) is the trophy water. Below Maramec Spring the river runs cold enough for the Red Ribbon trout zone, then warms into classic smallmouth water: jerkbaits in spring, tubes and topwater through summer, and a genuinely underrated WINTER fishery — river walleye stack in the deep holes from Sullivan downstream (jig-and-minnow, slow) and big smallmouth eat a slowly-worked hair jig. Watch clarity: it muddies after rain faster than the spring-fed rivers and takes days to clear." },
  { name:"Gasconade River", region:"Missouri", type:"smbriver", lat:37.95, lon:-91.95,
    species:["smallmouth","walleye","channelcat","rockbass","flathead"], note:"Longest river entirely within MO.", best:"Apr–Jun smb; spring walleye run.", how:"Float and fish wood/gravel; tubes, jerkbaits, jig-and-minnow.", size:"~280 mi · Waynesville/Vienna",
    intel:"The Phelps/Pulaski SMA section around the Jerome access (Route D bridge) fishes well year-round — MDC notes the smallmouth bite is best in the WINTER months here, when fish pod up in the deep bluff holes and eat a slow jerkbait or hair jig. Goggle-eye are consistent all season around root wads. Big, slow pools between riffles mean more paddling than the Current — pick shorter floats (Jerome, Boiling Spring, Riddle Bridge). A real spring walleye run pushes upriver from the lower Gasconade — jig-and-minnow the hole tails in March–April. Channel cats on every flat in summer." },
  { name:"Big Piney River", region:"Missouri", type:"smbriver", lat:37.55, lon:-92.00,
    species:["smallmouth","rockbass"], note:"Gasconade tributary; quality smallmouth on a quieter float.", best:"Spring & early summer.", how:"Wade/float; small crankbaits & soft plastics on rocky runs.", size:"Ozark float · Houston",
    intel:"The 15 miles from Slabtown to Ross Access is the special-management stretch (15\" min, one smallmouth) and probably the best smallmouth water on the river — good numbers plus legitimate 18\"+ fish. It's the classic overnight float: two days, one gravel-bar camp. Far less canoe traffic than the Current/Jacks Fork. Crawfish-color cranks and tubes in the rocky runs, big topwater (Whopper Ploppers, buzzbaits) over the bluff pools in low light, hellgrammite-imitating plastics dead-drifted when it's tough. USFS Slabtown and Ross accesses are gravel — fine for kayaks and jets." },
  { name:"Elk River", region:"Missouri", type:"smbriver", lat:36.63, lon:-94.48,
    species:["smallmouth","rockbass","spotted"], note:"Far-SW Missouri smallmouth float.", best:"Summer wade-and-paddle.", how:"Light tackle; tubes, grubs, topwater at dawn. Outfitter floats.", size:"SW Ozark float · Noel",
    intel:"Arguably the best trophy-smallmouth river in southwest Missouri, and MDC protects it accordingly: 15\" minimum on smallmouth with a reduced daily limit — check the current Elk River SMA rules. Formed where Big Sugar and Little Sugar join near Pineville, then west past Noel to Oklahoma. Summer tuber traffic is heavy on weekends — fish dawn or float weekdays. The bigger fish hold on the deeper bluff banks and root wads: 3.5\" tubes, Ned rigs, and a spinnerbait when a summer storm stains the water. Outfitters at Noel/Pineville run 4–8 mile floats." },
  { name:"St. Francis River", region:"Missouri", type:"smbriver", lat:37.30, lon:-90.50,
    species:["smallmouth","rockbass","largemouth"], note:"Rocky shut-in stretches in the St. Francois Mountains.", best:"Spring (also whitewater season).", how:"Wade the shut-ins; tubes & small jerkbaits in pocket water.", size:"Shut-ins reach · Fredericktown",
    intel:"Missouri's only whitewater river up top, and that igneous pocket water is the smallmouth structure. Best wading: Sam A. Baker State Park, where the warmer, slightly stained St. Francis meets cool, clear Big Creek — fish BOTH (Big Creek wades like a mountain stream and holds surprising smallmouth), plus the Madison Co. Hwy 9 bridge area upstream. Tubes and small jerkbaits in the boulder pockets, topwater in the tailouts at dusk. Spring whitewater releases own the upper gorge (Millstream Gardens/Silver Mines) — fish it at summer low water instead, hopping pool to pool." },
  { name:"Black River", region:"Missouri", type:"smbriver", lat:37.30, lon:-90.78,
    species:["smallmouth","rockbass","largemouth","walleye"], note:"Clear Ozark river above Clearwater Lake.", best:"Late spring–summer.", how:"Float/wade; tubes, spinnerbaits and topwater on gravel bars.", size:"Ozark float · Lesterville",
    intel:"The three forks join near Lesterville under Taum Sauk Mountain, and the main stem from Mill Creek down to Clearwater Lake is the smallmouth water — exceptionally clear, spring-fed enough to fish all summer, best from a boat (wadeable in spots). Access at Mill Creek, the CC bridge and the Hwy K bridge. Tubes and grubs in the gravel runs, spinnerbaits where feeder creeks add color, topwater over the long evening pools. Weekends bring heavy float traffic out of Lesterville — go midweek or launch at dawn. Largemouth thicken up in the slower water near the lake." },
  { name:"Huzzah Creek", region:"Missouri", type:"smbriver", lat:37.92, lon:-91.18,
    species:["smallmouth","rockbass","largemouth"], note:"Spring-influenced Meramec tributary, popular summer float near Steelville.", best:"May–Sep when floatable; dawn & dusk.", how:"Kayak/canoe float or wade; small soft plastics, tubes & poppers.", size:"Clear Ozark creek · Steelville",
    intel:"Gin-clear, gravel-bottomed Ozark creek that feeds the Meramec — smallmouth and goggle-eye (rock bass) are the draw, with largemouth in the slower lower pools. Green-pumpkin tubes & Ned rigs on 1/16 oz heads through the gravel runs and around root wads, small crawfish-color cranks, and walk-the-dog/poppers at first light. The water is so clear the fish spook — approach pools from downstream, cast up-current, and downsize. Best as a summer float when there's enough water; the upper reaches go skinny in late summer.",
    access:[
      {name:"Huzzah Conservation Area (MDC)",lat:38.030,lon:-91.150,info:"WADE/FLOAT: MDC area near the Meramec confluence — gravel access, primitive camping, and walk-in wade access plus a canoe put-in to the lower creek."},
      {name:"Hwy 8 access (Davisville)",lat:37.880,lon:-91.180,info:"WADE/FLOAT: upstream gravel access near Davisville — wade the runs or launch for the upper float."},
      {name:"Scotia / lower access",lat:37.980,lon:-91.160,info:"FLOAT: lower-creek gravel-bar take-out; outfitter floats run this stretch in summer."}] },
  { name:"Courtois Creek", region:"Missouri", type:"smbriver", lat:37.92, lon:-91.10,
    species:["smallmouth","rockbass"], note:"Scenic Meramec-basin float stream.", best:"Late spring–summer.", how:"Wade/float; tubes & grubs in the pools.", size:"Clear creek · Steelville",
    intel:"Huzzah's twin — they join before entering the Meramec and fish nearly identically, but Courtois (locals say 'Codaway') is a touch smaller, rockier and quieter. Same playbook: 1/16 oz tubes and Neds up the gravel runs, micro-cranks for goggle-eye on the rock, poppers at dawn. The Berryman-area upper creek is wade water; the lower creek from Hwy 8 down floats in normal flows. Gets the Huzzah's overflow crowd on summer Saturdays but stays fishable. Spooky clear — long casts upstream, stay low, downsize when the sun's high." },
  { name:"Bourbeuse River", region:"Missouri", type:"smbriver", lat:38.30, lon:-91.10,
    species:["smallmouth","largemouth","channelcat","rockbass","flathead"], note:"Slow, winding Meramec tributary.", best:"Spring & fall.", how:"Float; spinnerbaits & plastics around wood; cats on cut bait.", size:"Meandering river · Union",
    intel:"The un-Ozark Ozark stream: slow, warm and wood-dominated rather than spring-fed and rocky — so it fishes more like a southern lowland river. Smallmouth and goggle-eye in the upper/middle reaches (above Union); below Union it turns into channel-cat and largemouth water that bass anglers mostly ignore. Spinnerbaits, chatterbaits and Texas-rigged craws around laydowns — clarity is forgiving, so you can fish heavier line and bigger profiles than on the Huzzah/Courtois. Long pools mean slow floats: pick stretches with the USGS Union gauge up. Underrated flathead water at night near log jams." },
  { name:"Sac River", region:"Missouri", type:"smbriver", lat:37.55, lon:-93.70,
    species:["smallmouth","largemouth","whitebass","walleye","channelcat"], note:"Feeds Stockton Lake; smallmouth above, white bass run below dam.", best:"Spring white-bass run; summer smb.", how:"Inline spinners & jigs in the run; tubes upstream.", size:"Stockton feeder · Greenfield",
    intel:"Two fisheries in one: above Stockton Lake, a modest prairie-Ozark smallmouth stream (tubes/grubs in the rocky runs near Greenfield); below Stockton Dam, a tailwater where April–May white bass and walleye push up from Truman's backwaters — white/chartreuse inline spinners, curly-tail jigs and small spoons in the current seams. The tailwater also gives up walleye on jig-and-minnow right at the outflow when they're generating. Flows swing with dam releases; the smallmouth water upstream gets thin by late summer." },
  { name:"Big Sugar Creek", region:"Missouri", type:"smbriver", lat:36.60, lon:-94.30,
    species:["smallmouth","rockbass"], note:"Elk River headwater with feisty smallmouth.", best:"Summer.", how:"Wade; small tubes, grubs, topwater early.", size:"SW Ozark creek · Pineville",
    intel:"The prettier, skinnier half of the Elk system — gravel-bottomed, fast and clear through Big Sugar Creek State Park country east of Pineville. Wade water more than float water most of the year. The smallmouth average smaller than the Elk proper but they're aggressive: 2.75\" tubes, micro-Neds, Rebel Craws and a popper at first light cover it. Same protective SMA mindset as the Elk — release the good ones. Summer weekends bring swimmers to every deep hole; hit it at dawn or walk upstream from the parking areas until the people noise fades." },
  // ---- Reservoirs ----
  { name:"Lake of the Ozarks", region:"Missouri", type:"reservoir", lat:38.13, lon:-92.66,
    species:["largemouth","spotted","whitecrappie","blackcrappie","whitebass","channelcat","bluecat","flathead","bluegill","carp"], note:"MO's signature reservoir.", best:"Mar–May crappie & bass spawn; summer night bite; fall white bass.", how:"Docks & brush for crappie/bass; cut bait in the channel for cats. Many ramps.", size:"~54,000 ac · Osage Beach",
    intel:"Docks ARE the lake — over 70,000 of them. Bass: pitch jigs/plastics to dock cables and brush in spring, then follow fish to deep dock ends and channel-swing brush in summer; night fishing with big spinnerbaits and 10\" worms beats the boat traffic Jun–Aug. Crappie: shoot docks with 1/16 oz jigs year-round; the back of the Niangua and Glaize arms hold the spring spawners. Giant blue cats live in the river channel — drift cut shad across the flats adjacent to it. Fall white bass/hybrid surface melee around the 10–40 mile markers. Weekday fishing is a different (better) lake." },
  { name:"Table Rock Lake", region:"Missouri", type:"reservoir", lat:36.60, lon:-93.31,
    species:["largemouth","smallmouth","spotted","whitebass","blackcrappie","channelcat","flathead","bluegill"], note:"Clear highland reservoir, bass capital.", best:"Spring & fall for bass; summer deep.", how:"Finesse — drop-shot, Ned rig, jerkbaits on bluffs/points.", size:"~43,000 ac · Branson/Kimberling City",
    intel:"The Ned rig was invented for this lake's chunk-rock, and it still rules: 1/16–1/8 oz Ned, drop-shot and shaky head on 6–8 lb fluoro catch all three bass species year-round. Feb–Mar suspending jerkbaits (long pauses) over 45° banks and bluff ends is the trophy pattern; May brings the famous shad-spawn topwater at first light on main-lake points. Summer fish suspend 20–35 ft over deeper water — spoons, drop-shot, night cranking. Each arm differs: James R. = stained/largemouth, Kings & Long Creek = clear/smallmouth-spotted. Crappie on deep brush near Kimberling. Watch the wind on the big water." },
  { name:"Truman Lake", region:"Missouri", type:"reservoir", lat:38.27, lon:-93.41,
    species:["blackcrappie","whitecrappie","whitebass","channelcat","flathead","bluecat","walleye","largemouth","bluegill"], note:"Flooded-timber crappie & catfish factory.", best:"Apr–May crappie spawn; summer cats.", how:"Jigs/minnows in timber; trotlines & cut bait for cats. Ramps at Warsaw.", size:"~55,600 ac · Warsaw",
    intel:"Thousands of acres of standing timber = vertical crappie city. Spring (water 55–65°F): minnows/jigs a foot off every cedar and hedge tree in 3–8 ft up the Osage, Pomme de Terre and Grand arms. Summer: slide out to 15–25 ft channel-edge timber and fish straight down. White bass run the river arms in April (inline spinners at the mouths of feeder creeks). Flatheads here are giants — live sunfish on limb lines and rod-and-reel against the timber at night. Stained water: chartreuse/orange jigs, glitter minnows, sound-heavy baits for bass (spinnerbaits, squarebills banged off wood)." },
  { name:"Stockton Lake", region:"Missouri", type:"reservoir", lat:37.65, lon:-93.78,
    species:["walleye","smallmouth","whitebass","blackcrappie","largemouth","channelcat","bluegill"], note:"Deep, clear — MO's top walleye bite.", best:"Spring walleye; summer smallmouth deep.", how:"Crawler harnesses & jigs for walleye; tubes for smb on points. Windy — a sailing lake.", size:"~24,900 ac · Stockton",
    intel:"Missouri's walleye lake: March jerkbaits and jigs on windblown gravel points and the dam riprap for pre-spawners, then crawler harnesses / bottom bouncers across 12–25 ft flats and humps May–Sep. The wind everyone curses positions the fish — fish the blown side. Smallmouth are the co-headliner: Ned rigs and tubes on main-lake chunk rock, topwater over points at dawn, deep drop-shot in summer; 18\"+ fish are realistic. White bass school the Sac and Little Sac arms. Clear water, light line, long casts. The state-record-class walleye rumors start here every spring for a reason." },
  { name:"Pomme de Terre Lake", region:"Missouri", type:"reservoir", lat:37.90, lon:-93.32,
    species:["muskie","walleye","blackcrappie","whitecrappie","largemouth","whitebass","channelcat","bluegill"], note:"Missouri's premier muskie lake (stocked).", best:"Muskie fall & spring; crappie in spring.", how:"Big bucktails/glides for muskie; jigs for crappie. Ramps at Hermitage.", size:"~7,800 ac · Hermitage",
    intel:"MDC has stocked muskies here since 1966 — the longest-running program in the state, backed by an active Muskies Inc. chapter at the lake. Prime windows are June and Sep–Oct with water 60–70°F: big bucktails and plugs over shallow humps and points, glide baits along the timberlines, and always finish with a figure-8 at the boat. Overcast, choppy days outfish bluebird ones. The crappie and largemouth fishing is solid spring staples (jigs on brush, plastics on points) — but you're here because a 40\"+ fish might eat. 36\" minimum on muskie; most release everything." },
  { name:"Mark Twain Lake", region:"Missouri", type:"reservoir", lat:39.53, lon:-91.63,
    species:["blackcrappie","channelcat","flathead","walleye","largemouth","whitebass","bluegill"], note:"NE Missouri's big-water crappie & catfish lake.", best:"Apr–May crappie; summer catfish.", how:"Spider-rig jigs/minnows; cut bait on flats. Ramps near Monroe City.", size:"~18,600 ac · Monroe City",
    intel:"Stained, timber-filled Salt River impoundment that fishes like a northern Truman. Crappie are the engine: spider-rig or single-pole jigs/minnows over submerged timber and brush in the creek arms Apr–May, then chase them to the deeper channel-edge piles in summer. Catfishing is outstanding and old-school — trotlines and limb lines in the back of coves in 3–4 ft with cut bait and leeches produce channels all summer; the flats hold blues. Walleye get stocked and show up on crawler harnesses along the dam riprap. Wind and stain mean bright jig colors (chartreuse/orange) rule." },
  { name:"Smithville Lake", region:"Missouri", type:"reservoir", lat:39.42, lon:-94.57,
    species:["walleye","blackcrappie","whitecrappie","channelcat","largemouth","whitebass","bluegill"], note:"KC-area lake known for walleye, crappie & white bass.", best:"Spring walleye & crappie; summer white bass.", how:"Crawler rigs & jigs for walleye; jig the brush for crappie. Ramps in the park.", size:"~7,200 ac · Smithville",
    intel:"KC's crappie lake — and the tightened crappie regulation has visibly improved the size structure, so expect quality slabs on the hundreds of MDC-marked brush piles and around dock edges (jig + minnow, or shoot docks with 1/16 oz). Walleye are the second act: March wind-blown riprap and points with jerkbaits, then crawler harnesses and bottom bouncers on the flats into June, again in fall. White bass school open water in summer — watch for surface busts. NO muskie here (old stocking program ended; they're gone) — the toothy-fish rumors are decades stale." },
  { name:"Bull Shoals Lake (MO arm)", region:"Missouri", type:"reservoir", lat:36.55, lon:-92.86,
    species:["largemouth","smallmouth","spotted","whitebass","walleye","channelcat","bluegill"], note:"Deep, clear MO/AR border lake.", best:"Spring & fall bass; summer deep.", how:"Jerkbaits, jigs, drop-shot on bluffs; troll for walleye.", size:"~45,000 ac · Theodosia",
    intel:"The Missouri arms (Theodosia, Pontiac, around the K dock country) are the quiet end of Bull Shoals — less developed than the Arkansas side, same gin-clear White River water. Winter/early-spring suspending jerkbaits over 45° chunk-rock banks is the signature big-fish pattern; summer pushes bass to 25–35 ft (drop-shot, spoons, deep crank the channel swings at night). Smallmouth bias increases up the tributary arms. Walleye run the river arms in late winter and troll up along the old channel in summer. Pack light line — 6–8 lb fluoro is standard in this clarity." },
  { name:"Lake Wappapello", region:"Missouri", type:"reservoir", lat:36.93, lon:-90.32,
    species:["blackcrappie","whitecrappie","channelcat","flathead","largemouth","bluegill"], note:"SE Missouri crappie & catfish lake.", best:"Spring crappie; summer cats & bream.", how:"Jigs/minnows on brush; cut bait on the flats.", size:"~8,400 ac · Williamsville",
    intel:"Shallow, stained, timber-and-stump-filled St. Francis River impoundment — a true crappie factory where numbers come easy and the regs are angler-friendly. Spring: jigs/minnows on every visible stump and laydown in 2–6 ft. Summer/winter: crappie slide to channel-edge brush in 10–18 ft. The SPILLWAY below the dam is the local secret — when the Corps pulls water, crappie, cats and white bass stack in the outflow and the bank fishing at the Spillway Rec Area is as good as the boat fishing. Bank access is unusually good all around (state park, Corps areas). Bring bug spray and bright jigs." },
  { name:"Clearwater Lake", region:"Missouri", type:"reservoir", lat:37.14, lon:-90.78,
    species:["largemouth","blackcrappie","channelcat","bluegill","whitebass"], note:"Clear Ozark lake on the Black River.", best:"Spring spawn; summer evenings.", how:"Plastics on points, crappie on brush, cats below the dam.", size:"~1,630 ac · Piedmont",
    intel:"Small, deep, clear flood-control lake on the upper Black — an intimate alternative to the giant reservoirs, with mountain scenery and modest pressure outside summer weekends. Largemouth on the steep rocky points and bluff ends (wacky worms, jigs); crappie on the MDC brush piles and standing timber in the river arm; bluegill everywhere on the gravel in May–June. The Black River below the dam fishes like a cool tailwater for bass, goggle-eye and stocked-area fish when generation is light. Watch for big flood-pool swings — the Corps yo-yos this lake hard after rains, relocating everything." },
  { name:"Thomas Hill Reservoir", region:"Missouri", type:"reservoir", lat:39.57, lon:-92.65,
    species:["largemouth","blackcrappie","channelcat","whitebass","bluegill"], note:"Warm-water cooling lake — bass bite all winter.", best:"Year-round; great cold-season bass.", how:"Fish the warm discharge in winter; crankbaits & jigs.", size:"~4,950 ac · Macon",
    intel:"Power-plant cooling reservoir — the discharge keeps a warm-water plume open all winter, so December–February fishes like April: bass chase crankbaits and chatterbaits in the warm arm while every other lake in north Missouri is iced or dormant. Crappie and white bass also stack the thermal gradient edges in cold months. Summer flips the script (the warm side gets TOO warm — fish the cool end and fish early). Hot-water outlet areas have posted boundaries; respect them. Channel cats love the warm flats on cut bait year-round." },
  { name:"Long Branch Lake", region:"Missouri", type:"reservoir", lat:39.78, lon:-92.55,
    species:["largemouth","blackcrappie","channelcat","whitebass","bluegill"], note:"NE Missouri lake near Macon.", best:"Spring crappie & bass.", how:"Jigs on brush; spinnerbaits in the spring.", size:"~2,400 ac · Macon",
    intel:"Quiet Corps lake on the East Fork Little Chariton — the low-pressure counterpart to nearby Mark Twain. Stained prairie water: spinnerbaits, squarebills and black/blue jigs around laydowns and riprap for largemouth; crappie on the marked brush piles and bridge pilings (minnows outproduce plastics here when it's murky). White bass run wind-blown points in May. Good bank access along the state-park side. It's a numbers lake more than a trophy lake — bring the kids, fill a livewell of crappie, and have the place nearly to yourself midweek." },
  { name:"Fellows Lake", region:"Missouri", type:"reservoir", lat:37.30, lon:-93.25,
    species:["walleye","largemouth","blackcrappie","muskie","bluegill"], note:"Springfield water-supply lake, stocked walleye & muskie.", best:"Spring walleye; muskie cool months.", how:"Jigs/crawlers for walleye; no-wake, electric-friendly. Marina ramp.", size:"~820 ac · Springfield",
    intel:"Springfield's water-supply lake and the state's OTHER muskie program: MDC stocks yearly, and recent surveys ran ~44% of muskie over the 36\" minimum with fish to 48\"/34 lb — serious odds for an 820-acre lake. Cast big spinners/bucktails or troll cranks along the channel, humps and points on overcast days under 70°F (fall & early spring). Walleye are the bread-and-butter: ~a third of surveyed fish over 20\". Jig/crawler the points at dusk Apr–Jun. No-wake and largely electric/small-motor — it fishes calm even when the wind blows. Marina rents boats." },
  { name:"Lake Jacomo", region:"Missouri", type:"reservoir", lat:38.94, lon:-94.38,
    species:["largemouth","blackcrappie","walleye","channelcat","bluegill"], note:"Kansas City metro lake in Fleming Park.", best:"Spring spawn; summer mornings.", how:"Plastics & jigs around docks; rental boats available.", size:"~970 ac · Blue Springs",
    intel:"Jackson County's flagship park lake — horsepower-restricted, so it's kayak/jon-boat friendly water 20 minutes from downtown KC. Crappie around the marina docks, fishing jetties and sunken brush (the county sinks cedars yearly — look for marker buoys); largemouth on the riprap and weed edges with wacky rigs and finesse jigs; stocked walleye picked up by accident on crawler rigs along the dam. Heavy bank infrastructure: jetties, ADA piers, mowed shoreline. It gets pounded, so downsize and fish off-hours — the morning-only crowd misses the evening crappie flurry at the lights." },
  { name:"Montrose Lake", region:"Missouri", type:"reservoir", lat:38.27, lon:-94.00,
    species:["largemouth","blackcrappie","channelcat","bluegill"], note:"Warm-water power-plant lake — winter bass.", best:"Cold months for active bass.", how:"Fish the warm-water area; crankbaits & plastics.", size:"~1,500 ac · Clinton",
    intel:"West-central Missouri's winter cheat code: the power-plant discharge keeps water open and bass metabolisms running when everything else is locked up. December–March, fish the warm plume and its edges — lipless cranks, chatterbaits, swim jigs — and expect crappie and channel cats on the same gradient. The surrounding Montrose CA wetlands make it a waterfowl area too: check seasonal area closures before driving out in fall/winter. Summer is ordinary; this lake's identity is January largemouth with steam coming off the water." },
  // ---- Big rivers ----
  { name:"Missouri River (Boonville reach)", region:"Missouri", type:"bigriver", lat:38.98, lon:-92.74,
    species:["bluecat","flathead","channelcat","sauger","freshdrum","carp"], note:"Trophy blue & flathead catfish.", best:"Summer cats; winter sauger.", how:"Anchor wing-dikes with fresh cut shad; jigs for sauger. Ramps along the river.", size:"Lower Missouri R. · Boonville",
    intel:"Wing-dike water: blues hold on the current breaks off dike tips and notches and along revetted banks with swift current; evenings they slide onto the shallow flats BETWEEN dikes and onto submerged sandbars on inside bends — that's the trophy window. Fresh cut Asian carp and shad are the baits (catching bait is half the trip); fish 60–90 lb are reported every year. Anchor up-current of the spot, Santee-rig 8/0 circles on 40–80 lb. Winter sauger stack below dike tips and at tributary mouths — 1/4–3/8 oz jig + minnow, slow. Respect the river: big water, fast current, wear the kill switch." },
  { name:"Missouri River (Kansas City)", region:"Missouri", type:"bigriver", lat:39.12, lon:-94.58,
    species:["bluecat","flathead","channelcat","sauger","freshdrum","carp"], note:"Urban big-river trophy blue cat run.", best:"Late summer & fall for big blues.", how:"Cut bait on dike fields & holes; heavy gear.", size:"Lower Missouri R. · Kansas City",
    intel:"The KC reach is dike-field catfishing with skyline views — MDC rates it among the best trophy-blue water in the state. Same playbook as Boonville: anchor above dike tips and scour holes, fresh cut shad/carp on heavy circle-hook rigs, move every 30–45 min without a bite. Flatheads at night on LIVE bluegill/goldfish tight to log jams and revetment. Urban access is real (La Benite, Kaw Point, Riverfront Park ramps) but bank spots are limited — a boat multiplies this reach. Summer evening shallow-flat bite between dikes is the sleeper. Commercial fishing pressure exists; release the giants." },
  { name:"Mississippi River (Cape Girardeau)", region:"Missouri", type:"bigriver", lat:37.31, lon:-89.52,
    species:["bluecat","flathead","channelcat","sauger","freshdrum","carp"], note:"Big-river trophy blue cats.", best:"Fall–winter for giant blues.", how:"Anchor scour holes & current seams with fresh cut shad/skipjack.", size:"Middle Mississippi · Cape Girardeau",
    intel:"The middle Mississippi (open river, no locks) is arguably Missouri's best shot at a 100 lb-class blue cat. Late fall through winter, the giants gang up in deep scour holes below dike tips and on the channel edges — fresh skipjack herring is the premium bait (castnet them below dams or buy frozen as backup), cut shad/carp otherwise. Heavy gear is non-negotiable: 80+ lb braid, 8–10/0 circles, 8–16 oz of lead in that current. Summer fish spread across the dike fields like the Missouri R. Sauger winter at tributary mouths (Apple Creek, etc.). Barge wakes + cold water = wear the PFD, always." },
  { name:"Mississippi River (St. Louis area)", region:"Missouri", type:"bigriver", lat:38.80, lon:-90.18,
    species:["bluecat","flathead","channelcat","whitebass","sauger","freshdrum","carp"], note:"Tailwater & wing-dike catfishing near the confluence.", best:"Summer & fall.", how:"Cut bait below the dams; white bass on spoons in spring.", size:"Mississippi/Missouri confluence · St. Louis",
    intel:"Two giant rivers meet here, and the catfish know it: the confluence at Columbia Bottom and the Chain of Rocks area are blue-cat magnets, while the Melvin Price (Alton) tailwater upstream concentrates everything — blues, flatheads, white bass, drum — when they're pulling water. Cut shad below the dam on the seams; spring white bass smash spoons and curly-tails in the same swirls. Bank options are better than most big-river reaches (Columbia Bottom CA, North Riverfront). DON'T boat the Chain of Rocks low-water dam line — it's a killer. Asian carp are everywhere; free fresh bait if you can net them." },
  { name:"Osage River (below Bagnell Dam)", region:"Missouri", type:"bigriver", lat:38.20, lon:-92.62,
    species:["whitebass","blackcrappie","channelcat","flathead","bluecat","freshdrum"], note:"Tailwater below Lake of the Ozarks.", best:"Spring white-bass run; summer cats.", how:"Jigs & spoons in the run; cut bait in the holes. Bank & boat below the dam.", size:"Osage tailwater · Lake Ozark",
    intel:"Bagnell Dam's tailwater is the Ozarks' great mixed bag: when Ameren generates, current turns the bite ON — white bass and hybrids on spoons/curly-tails in the seams (Mar–May is the run), crappie tight to the rocky eddies, blues and flatheads in the scour holes on cut and live bait. Public bank access below the dam makes this one of MO's best no-boat big-fish spots. Generation schedule is everything: rising water = feeding window, but it comes up FAST — bank anglers watch the horns and the water line. Paddlefish snagging seasons also center on the Osage (separate regs)." }

  { name:"Pensacola Beach surf (Gulf)", region:"Florida", type:"nearshore", depth:"surf–15 ft", lat:30.33, lon:-87.13,

  // ---- Trophy trout tailwaters & streams ----
  { name:"White River (below Bull Shoals Dam)", region:"Arkansas", type:"tailwater", lat:36.37, lon:-92.56,
    species:["brown","rainbow","cutthroat","brook"], note:"World-class trophy-brown tailwater — and one of the rare waters with all four trout.", best:"Browns peak Oct–Feb; year-round rainbows.", how:"Drift sowbugs/eggs & strip streamers; wade low water, drift-boat high water. Watch generation horns.", size:"~100 mi tailwater · Cotter/Mountain Home",
    intel:"All four trout swim here — rainbows everywhere, trophy browns (40 lb-class), plus stocked cutthroat & brook. Low generation: #14–18 scuds, sowbugs & zebra midges under a yarn indicator, 6X fluoro & a micro split shot. High water: drift sowbug/egg rigs or strip sculpin streamers from a boat. ALWAYS check the dam generation schedule before wading.",
    access:[{name:"Bull Shoals Dam / White Hole",lat:36.367,lon:-92.576},{name:"Cotter Access",lat:36.281,lon:-92.527},{name:"Wildcat Shoals",lat:36.330,lon:-92.486},{name:"Rim Shoals",lat:36.300,lon:-92.410}] },
  { name:"Norfork Tailwater", region:"Arkansas", type:"tailwater", lat:36.25, lon:-92.24,
    species:["rainbow","brown","cutthroat","brook"], note:"Short, super-fertile tailwater that once gave up a world-record brown.", best:"Fall–winter browns; sulphur/midge hatches.", how:"Technical low-water nymphing — midges, scuds, sowbugs. Wade on minimal generation.", size:"~5 mi tailwater · Norfork/Salesville",
    intel:"Tiny, fertile, technical. Low water: midges (#20–24), scuds & sowbugs on 6–7X; sight-fish the flats above the White confluence. Cutthroat & brook are stocked bonuses alongside the rainbows and big browns. Generation comes up fast — know the schedule.",
    access:[{name:"Norfork Dam Access",lat:36.252,lon:-92.236},{name:"Ackerman Access",lat:36.232,lon:-92.232},{name:"White River confluence",lat:36.210,lon:-92.160}] },
  { name:"Little Red River (below Greers Ferry)", region:"Arkansas", type:"tailwater", lat:35.52, lon:-91.97,
    species:["brown","rainbow"], note:"Produced a former world-record brown (40 lb 4 oz).", best:"Fall–winter browns.", how:"Sowbugs & scuds dead-drifted; wade low water near Heber Springs. Check generation.", size:"Tailwater · Heber Springs",
    intel:"The JFK Catch-&-Release area (100 yds below Greers Ferry Dam to the hatchery outfall) is artificials-only, all fish released — and it's where the sowbug drift is thickest. Cow Shoals is the famous walk-in wade (no ramp — drift boats launch at JFK or Lobo). Rip Collins' 40 lb 4 oz world-record brown came from this river in 1992; today it's sowbugs (#14–16), midges and soft hackles on low water, big streamers when they generate. Watch the horn — water comes up fast." },
  { name:"Spring River (Mammoth Spring)", region:"Arkansas", type:"tailwater", lat:36.40, lon:-91.50,
    species:["rainbow","brown"], note:"Cold, spring-fed river flowing year-round.", best:"Year-round; summer floatable.", how:"Float-and-wade; spinners, flies, and smallmouth lower down. Outfitter floats.", size:"Spring-fed river · Mammoth Spring",
    intel:"Mammoth Spring pours ~9 million gallons an hour at a constant ~58°F, so the Spring is Arkansas' most reliable YEAR-ROUND trout water — no dam, no generation schedule. AGFC trout water runs from below Dam 1 at the state park to Myatt Creek (~12 miles, 134,000+ rainbows stocked yearly at nine accesses); daily limit 5, only one over 14\". Dam 3 and the Bayou access falls are the storied holes: olive woolly buggers, Y2Ks and inline spinners. Summer weekends = canoe hatch; fish before 10am." },
  { name:"Beaver Tailwater", region:"Arkansas", type:"tailwater", lat:36.42, lon:-93.85,
    species:["rainbow","brown"], note:"Cold tailwater below Beaver Dam near Eureka Springs.", best:"Year-round; browns in fall.", how:"Nymphs & streamers; wade on low generation, drift on high.", size:"Tailwater · Eureka Springs",
    intel:"The special-regulation area (0.5 mi below Beaver Dam down to 100 yds above Parker Bend) is artificials/flies only — midges, scuds and micro-jigs for rainbows with a real shot at a holdover brown. Below Parker Bend it's bait-friendly stocker water. Short tailwater (~7 fishable miles), so generation turns it on/off fast: low water wades beautifully at Parker Bend and Bertrand, high water is a drift game. Winter is the quality-fish window." },
  { name:"Little Missouri River (below Greeson)", region:"Arkansas", type:"tailwater", lat:34.15, lon:-93.72,
    species:["rainbow","brown"], note:"Scenic Ouachita Mountains trout tailwater below Narrows Dam.", best:"Cool months; generation-dependent.", how:"Nymphs & small streamers; wade on low water. Albert Pike area.", size:"Tailwater · Murfreesboro",
    intel:"Narrows Dam releases cold water down a gorgeous ~6-mile wade fishery — Arkansas' most intimate tailwater, stocked Nov–Apr (it warms in summer; trout are seasonal here). Small spinners, micro-jigs and egg patterns at the spillway hole and the Hwy 27 riffles. Upstream of Lake Greeson, the Albert Pike reach is a separate, warm-water smallmouth stream. Check AGFC generation/stocking before driving — this one's flow-dependent." },
  { name:"Sylamore Creek", region:"Arkansas", type:"troutstream", lat:35.92, lon:-92.16,
    species:["rainbow"], note:"Ozark creek with stocked & holdover rainbows near the White.", best:"Cooler months.", how:"Small spinners & flies; wade/walk-in. Blanchard Springs area.", size:"Ozark creek · Mountain View",
    intel:"North Sylamore Creek runs clear through Ozark NF sandstone country to the White River at Allison. The trout story is really at Blanchard Springs' Mirror Lake (stocked monthly, family-easy) and the cold lower creek; the upper creek is a wild swimming-hole stream. Walk in at Blanchard Springs, Gunner Pool or the Allison confluence; bring light spinning gear or a 3wt with caddis and small streamers." },
  // ---- Ozark smallmouth streams ----
  { name:"Crooked Creek", region:"Arkansas", type:"smbriver", lat:36.23, lon:-92.55,
    species:["smallmouth","rockbass"], note:"Arkansas's blue-ribbon smallmouth stream — among the best in the country.", best:"Apr–Jun & fall.", how:"Wade or float; tubes, jerkbaits, crawfish colors on gravel. Access points near Yellville.", size:"Ozark stream · Yellville",
    intel:"Smallmouth turn on around 55°F (often March) and stay good into late October. Green-pumpkin-red tubes & Ned rigs on 1/32–1/16 oz heads, small swimbaits and crawfish cranks; poppers & walk-the-dog at dawn. Minnows & crayfish are the natural forage. Approach pools from downstream and cast up-current — the water's gin-clear.",
    access:[{name:"Kelly's Slab (Yellville)",lat:36.250,lon:-92.620},{name:"Fred Berry Conservation Area",lat:36.180,lon:-92.500},{name:"George's Cove / Hwy 14",lat:36.230,lon:-92.680},{name:"Snow / lower access",lat:36.200,lon:-92.550}] },
  { name:"Buffalo National River", region:"Arkansas", type:"smbriver", lat:36.03, lon:-92.75,
    species:["smallmouth","rockbass"], note:"America's first National River.", best:"Spring–early summer floats.", how:"Float; soft plastics & topwater; goggle-eye on the side. Outfitter shuttles.", size:"~135 mi · Jasper/Buffalo City",
    intel:"America's first National River — undammed, so it fishes by season: spring floats the upper canyon (Ponca–Kyles), summer concentrates smallmouth in the deep middle/lower pools (Tyler Bend, Buffalo Point), and low water means wading gravel between them. Smallmouth eat crawfish-color tubes, Whopper Ploppers at dawn, and hellgrammite plastics in the bluff pools. Goggle-eye on every root wad. NPS regs apply (no AGFC trout here — it's a warmwater river)." },
  { name:"Kings River", region:"Arkansas", type:"smbriver", lat:36.30, lon:-93.72,
    species:["smallmouth","rockbass"], note:"Remote NW Arkansas float feeding Table Rock.", best:"Late spring–summer.", how:"Float; tubes & grubs in the pools.", size:"Float river · Berryville",
    intel:"Arguably Arkansas' best trophy-smallmouth float — a quieter Ozark river where 18–20\" fish are a real possibility. Trigger Gap to the Hwy 62 bridge is the marquee day float: jerkbaits in spring, big topwater over the long pools in summer, jigs through the winter holes. Catch-and-release culture runs strong here; the river's reputation depends on it." },
  { name:"Mulberry River", region:"Arkansas", type:"smbriver", lat:35.55, lon:-93.85,
    species:["smallmouth","rockbass"], note:"Whitewater float in the Ozark NF.", best:"Spring (also whitewater season).", how:"Wade pockets; small jerkbaits & tubes.", size:"Ozark NF float · Oark/Turner Bend",
    intel:"Whitewater canoe river in spring (Class II–III above Turner Bend), smallmouth river the rest of the year. Turner Bend store is the hub — access, shuttles, river levels. Wolf Pen and Redding (USFS) bracket the best fishing floats; at summer low water, wade-hop the bluff pools with tubes and poppers. The Mulberry's fish run smaller than the Buffalo's but hit twice as hard for their size." },
  { name:"War Eagle Creek", region:"Arkansas", type:"smbriver", lat:36.25, lon:-93.78,
    species:["smallmouth","rockbass"], note:"Beaver Lake tributary with clear smallmouth water.", best:"Spring–summer.", how:"Wade/float; grubs & topwater early.", size:"Beaver feeder · Huntsville",
    intel:"War Eagle Creek winds past the historic War Eagle Mill into the Beaver Lake arm — a pastoral smallmouth float/wade with goggle-eye in every rocky run. Withrow Springs State Park is the easy access; spring high water floats, summer wades. White bass push up from Beaver Lake in March–April — the creek mouth arm is a local tradition." },
  { name:"Strawberry River", region:"Arkansas", type:"smbriver", lat:36.10, lon:-91.50,
    species:["smallmouth","rockbass"], note:"Quiet northeastern-Ozark smallmouth float.", best:"Late spring–summer.", how:"Float; soft plastics on the gravel runs.", size:"Ozark border river · Evening Shade",
    intel:"A sleeper: the Strawberry drains quiet Ozark foothills and holds quality smallmouth that see almost no pressure. Bridge-crossing access (Hwy 167 at Evening Shade and county roads) and farm-country floats; tubes, small cranks and buzzbaits around the bluff pools and root wads. AGFC manages part as a smallmouth stream — release the good ones." },
  { name:"Saline River", region:"Arkansas", type:"smbriver", lat:34.55, lon:-92.60,
    species:["smallmouth","spotted","largemouth"], note:"Ouachita-foothills river south of Little Rock.", best:"Spring & fall.", how:"Float/wade; plastics & spinnerbaits around wood.", size:"Foothills river · Benton",
    intel:"The Saline is the last major undammed Ouachita-drainage river — smallmouth and spotted bass in the rocky upper forks, largemouth and big flatheads in the slow lower river. Through Benton, Peeler Bend and the city parks give easy canoe/wade access. Summer pattern: topwater at dawn over the shoals, then Texas-rigged craws in the deep bends. An hour from Little Rock and rarely crowded." },
  { name:"Cossatot River", region:"Arkansas", type:"smbriver", lat:34.40, lon:-94.20,
    species:["smallmouth","spotted"], note:"Rugged 'skull crusher' whitewater river in the Ouachitas.", best:"Spring.", how:"Wade pockets between rapids; tubes & small jerkbaits.", size:"Ouachita NF · Wickes",
    intel:"A National Wild & Scenic whitewater gem — the famous Cossatot Falls section is kayak (not fishing) water, but the pools above and below hold wiry smallmouth and spotted bass that live in plunge-pool pocket water. Fish it at summer low flow, hopping ledge to ledge with small tubes and inline spinners. Cossatot River State Park-Natural Area maps the access; river shoes required, flip-flops fatal." },
  { name:"Eleven Point River (AR)", region:"Arkansas", type:"smbriver", lat:36.30, lon:-91.10,
    species:["smallmouth","rockbass","channelcat"], note:"Lower, warmwater Eleven Point in Arkansas.", best:"Spring–summer.", how:"Float; plastics for smb, cut bait for cats.", size:"Float river · Pocahontas",
    intel:"The Eleven Point keeps its spring-fed cool into Arkansas — smallmouth, goggle-eye and channel cats in a gentle pastoral float down to the Spring River confluence near Pocahontas. Less famous than the Missouri reach upstream, which is exactly the appeal: bridge accesses, easy gravel-bar camps, and bass that haven't been educated. Tubes, small spinnerbaits, live crawfish where legal." },
  { name:"Illinois River (NW Arkansas)", region:"Arkansas", type:"smbriver", lat:36.05, lon:-94.45,
    species:["smallmouth","largemouth","channelcat"], note:"NW-Arkansas float through farm country.", best:"Spring–summer.", how:"Kayak/canoe; spinnerbaits & plastics.", size:"NW float · Siloam Springs",
    intel:"The Illinois gathers NW Arkansas' spring creeks and heads for Oklahoma — smallmouth and largemouth around gravel and wood, with the Siloam Springs Kayak Park as the modern access hub (play waves AND fish access). Nutrient-rich water means fast-growing, chunky fish; summer algae and weekend paddlers mean dawn patrol. Watershed groups have fought hard for this river — pack out line and trash." },
  // ---- Reservoirs ----
  { name:"Bull Shoals Lake", region:"Arkansas", type:"reservoir", lat:36.45, lon:-92.85,
    species:["largemouth","smallmouth","spotted","whitebass","walleye","channelcat","bluegill"], note:"Deep, clear White-River impoundment.", best:"Spring & fall bass; summer deep.", how:"Jerkbaits, jigs, drop-shot on bluffs; troll for walleye & stripers.", size:"~45,000 ac · Bull Shoals/Lakeview",
    intel:"The Arkansas end holds the dam, the deepest water and the biggest walleye: troll the old river channel off Dam Site and Lakeview in summer, jerkbait the gravel points in Feb–Mar. Bass fishing mirrors the MO arm — jerkbaits on 45° banks, then 25–35 ft finesse all summer. The tailwater below the dam (the White River) is a different universe — see that entry." },
  { name:"Beaver Lake", region:"Arkansas", type:"reservoir", lat:36.42, lon:-93.82,
    species:["striper","largemouth","smallmouth","whitebass","walleye","blackcrappie","channelcat"], note:"NW Arkansas trophy-striper lake.", best:"Stripers spring & summer; spring bass/crappie.", how:"Live shad for stripers; finesse for bass; brush for crappie.", size:"~28,000 ac · Rogers/Eureka Springs",
    intel:"Trophy stripers run on live shad: 8–10\" gizzard shad on down-lines 40–80 ft over winter schools — find the shad, find the fish (Jan–Feb is slowest but biggest). Summer: downriggers & umbrella rigs to reach deep, thermocline fish. Bass on drop-shot & jerkbaits along the gin-clear bluffs." },
  { name:"Norfork Lake", region:"Arkansas", type:"reservoir", lat:36.42, lon:-92.20,
    species:["striper","largemouth","smallmouth","blackcrappie","channelcat"], note:"Clear highland reservoir famed for big stripers.", best:"Stripers year-round; spring crappie.", how:"Down-line live bait for stripers; brush for crappie & bass.", size:"~22,000 ac · Mountain Home",
    intel:"Norfork is the striper/hybrid lake of the White River chain — open-water fish that follow shad: downlines and freelined live bait at dawn off the points June–Sep, surface blitzes in October. Smallmouth on the bluff ends and chunk rock (Ned/drop-shot), crappie on the brush, and walleye up the Bennett's Bayou arm in late winter. Robinson Point and Quarry/Dam Site are the workhorse Corps ramps." },
  { name:"Lake Ouachita", region:"Arkansas", type:"reservoir", lat:34.57, lon:-93.40,
    species:["striper","largemouth","spotted","blackcrappie","channelcat","bluecat"], note:"Arkansas's largest lake — exceptionally clear.", best:"Spring & fall; summer stripers deep.", how:"Live bait for stripers; finesse for bass; big cats in the timber.", size:"~40,000 ac · Hot Springs/Mount Ida",
    intel:"Arkansas' biggest lake and its striper flagship — clear, deep, island-studded Ouachita NF water. Stripers: live shad downlined over the channel and humps at first light, back of the creeks in early March, deep trolling midsummer; Mad Dog-style guides run it year-round. World-class largemouth/spotted bass on the brush and points, big walleye deep, and a famous (true) story of giant stripers crashing topwater in February. No closed striper season." },
  { name:"Greers Ferry Lake", region:"Arkansas", type:"reservoir", lat:35.57, lon:-92.00,
    species:["walleye","whitebass","largemouth","smallmouth","blackcrappie"], note:"Top Arkansas walleye lake.", best:"Spring walleye run up the Little Red; summer hybrids.", how:"Crawler harnesses & jigs for walleye; spoons for white/hybrid bass.", size:"~31,500 ac · Heber Springs/Fairfield Bay",
    intel:"Greers Ferry is hybrid-striper heaven (the 27 lb 5 oz world-record hybrid came from here) plus a serious walleye lake — the spring walleye run up the Devil's Fork and Middle Fork arms is an Arkansas tradition. Hybrids school on shad over the flats and humps (spoons, swimbaits, live shad downlines); crappie on the brush; bass finesse on the clear rock. Then the dam releases all of it into the Little Red trout water below." },
  { name:"Lake Hamilton (Hot Springs)", region:"Arkansas", type:"reservoir", lat:34.45, lon:-93.10,
    species:["striper","largemouth","blackcrappie","channelcat"], note:"Hot Springs resort lake stocked with stripers.", best:"Year-round warm-water bite.", how:"Live bait for stripers; docks for crappie & bass.", size:"~7,200 ac · Hot Springs",
    intel:"A busy resort lake that still fishes: stripers and hybrids cruise the lit boat-dock walls and the upper river arm at night (live shad, big flukes), largemouth work the seawalls and brush at dawn before the wakeboats launch. Winter is the secret — the lake empties of traffic and the striper bite under the birds can be outstanding. Andrew Hulsey hatchery ramp and Hill Wheatley downtown are the public ins." },
  { name:"Lake Dardanelle (Arkansas River)", region:"Arkansas", type:"reservoir", lat:35.32, lon:-93.18,
    species:["largemouth","blackcrappie","whitecrappie","bluecat","flathead","channelcat","whitebass"], note:"Sprawling river-reservoir & bass-tournament staple.", best:"Spring spawn & crappie; summer cats.", how:"Flip backwaters for bass; jig brush for crappie; cut bait for blues.", size:"~34,000 ac · Russellville",
    intel:"A national tournament staple on the Arkansas River — shallow, stained, current-influenced grass-and-wood largemouth water (frogs over the grass mats, squarebills on riprap, jigs in the buckbrush). Lake Dardanelle State Park's tournament-grade ramps host everything from BFLs to Bassmaster Elites. Bonus river fare: big blues and flatheads in the channel, white bass and stripers below the upstream dams when they're pulling water." },
  { name:"DeGray Lake", region:"Arkansas", type:"reservoir", lat:34.25, lon:-93.15,
    species:["striper","spotted","largemouth","blackcrappie","walleye"], note:"Clear Ouachita-foothills lake with stripers & spotted bass.", best:"Spring & fall; summer stripers.", how:"Live bait for stripers; jigs & drop-shot for spots. State-park ramps.", size:"~13,400 ac · Bismarck",
    intel:"DeGray is the hybrid-striper showcase of the Ouachita chain — surface-busting schools over the timberline flats at dawn (walk-the-dog topwater, spoons), plus quality spotted bass on the deep brush and a sneaky-good walleye population. Clear water: fish light line, follow the birds in winter. Iron Mountain and the State Park marina are the main ramps; the resort park makes it the easiest family base camp in the region." },
  { name:"Lake Greeson", region:"Arkansas", type:"reservoir", lat:34.18, lon:-93.72,
    species:["largemouth","spotted","blackcrappie","walleye","channelcat"], note:"Clear Little Missouri impoundment in the Ouachitas.", best:"Spring spawn; trout in the tailwater below.", how:"Finesse for bass; jigs for crappie; troll for walleye.", size:"~7,000 ac · Murfreesboro",
    intel:"Deep, clear, quiet — Greeson is the Ouachitas in miniature: spotted/largemouth bass on bluff ends and brush, crappie deep on the planted piles, walleye trolled along the channel, and seasonal trout in the Little Missouri tailwater below Narrows Dam. Self Creek and Kirby Landing (Corps) are the main ramps. It's the overlooked one of the diamond-country lakes, which keeps it honest." },
  { name:"Lake Maumelle", region:"Arkansas", type:"reservoir", lat:34.85, lon:-92.55,
    species:["largemouth","blackcrappie","channelcat","bluegill"], note:"Little Rock water-supply lake (no-gas limits).", best:"Spring spawn & crappie.", how:"Plastics on points; jig the brush; electric/idle areas. Public ramps.", size:"~8,900 ac · Little Rock",
    intel:"Little Rock's drinking-water lake — no gas outboards over 25hp wakes (check CAW rules), no swimming, and consequently calm, clear water with genuinely big largemouth that rarely see a spinnerbait. Fish the standing timber edges and points with finesse plastics; crappie school deep on the channel. Jolly Roger's Marina and the Hwy 10 ramps are the access; this is the metro's quality-over-chaos option." },
  { name:"Lake Catherine", region:"Arkansas", type:"reservoir", lat:34.42, lon:-92.95,
    species:["largemouth","blackcrappie","channelcat","whitebass","rainbow"], note:"Narrow Ouachita-River lake below Lake Hamilton.", best:"Spring & summer.", how:"Docks & bluff points for bass; cut bait for cats. State-park ramp.", size:"~1,900 ac · Hot Springs",
    intel:"The small, deep lake between Hamilton and the Ouachita River — Carpenter Dam's cold releases feed it, and AGFC stocks rainbow trout in winter right below the dam (a genuine trout-by-the-Interstate oddity). Otherwise: largemouth on the steep rocky banks, crappie and white bass at the upper end when Carpenter Dam generates. Lake Catherine State Park ramp is the easy in." },
  { name:"Nimrod Lake", region:"Arkansas", type:"reservoir", lat:34.95, lon:-93.17,
    species:["blackcrappie","whitecrappie","largemouth","channelcat","bluegill"], note:"Shallow Fourche LaFave crappie & catfish lake.", best:"Spring crappie; summer cats.", how:"Jig the brush & stake beds; cut bait on the flats.", size:"~3,500 ac · Plainview",
    intel:"Nimrod is a shallow, stained, stump-filled crappie machine — number 12 in the country by some rankings, though it grows numbers more than slabs. Spider-rig the flats and creek-channel stumps with minnows/jigs in 4–10 ft; the bite barely stops in winter. Quarry Cove and Sunlight Bay (Corps) put you on the best timber. Bring bright jigs — visibility is a rumor here." },
  { name:"Lake Conway", region:"Arkansas", type:"reservoir", lat:35.05, lon:-92.35,
    species:["blackcrappie","largemouth","bluegill","redear","channelcat","flathead"], note:"Country's largest state-built lake — a crappie & bream factory.", best:"Spring crappie & bream.", how:"Jig the cypress & stumps; crickets for bream. Many ramps.", size:"~6,700 ac · Mayflower",
    intel:"Conway is the great Arkansas everyman lake: a shallow, cypress-studded AGFC impoundment famous for crappie around the trees, REAL redear (shellcracker) fishing on the spawning flats in April–May, bream by the bucket and flatheads at night. Jig the cypress knees, fish red worms on bottom for the shellcrackers. Lawrence Landing and the Hwy 89 ramps spread the pressure. Watch for timber just under the surface — idle speed pays." },
  { name:"Millwood Lake", region:"Arkansas", type:"reservoir", lat:33.68, lon:-93.96,
    species:["largemouth","blackcrappie","whitecrappie","channelcat","alligatorgar"], note:"Shallow, fertile SW lake — trophy bass & gar.", best:"Spring bass & crappie; summer gar.", how:"Flip cypress/grass for bass; big cut bait for alligator gar.", size:"~29,000 ac · Ashdown",
    intel:"Millwood is south-Arkansas swamp-bass water: 29,000 shallow acres of standing timber, lily pads and oxbow sloughs on the Little River — Florida-strain largemouth genetics, frogs and swim jigs in the pads, and a genuinely wild cast of extras: alligator gar to 200+ lb, bowfin, big crappie on the timber, and one of the state's densest actual-alligator populations (keep dogs out of the water). Millwood State Park and the Corps landings (Cottonshed, Okay) are the ramps. Buddy-boat if you're new — the boat roads matter." },
  { name:"Lake Chicot", region:"Arkansas", type:"reservoir", lat:33.35, lon:-91.20,
    species:["largemouth","blackcrappie","bluegill","channelcat","bowfin"], note:"Largest natural oxbow lake in the U.S.", best:"Spring crappie & bass.", how:"Cypress & docks for bass/crappie; cut bait for cats. State-park ramps.", size:"~5,300 ac · Lake Village",
    intel:"North America's largest oxbow — a 20-mile crescent of old Mississippi River channel under the levee at Lake Village. Classic Delta fishing: slab crappie on the cypress and planted tops (the winter trolling bite is famous), bream in summer, bass in the pads, channel cats everywhere. Lake Chicot State Park anchors the north end with ramps and cabins. Muddy after big river events, glassy and green by summer." },
  // ---- Big rivers & Delta ----
  { name:"Arkansas River (Little Rock pools)", region:"Arkansas", type:"bigriver", lat:34.75, lon:-92.30,
    species:["bluecat","flathead","channelcat","whitebass","sauger","freshdrum"], note:"Navigation-pool tailwaters below the dams.", best:"Summer cats; winter sauger; spring white bass.", how:"Anchor below the dams with cut bait; jig for sauger. Ramps in the pools.", size:"Arkansas R. pools · Little Rock",
    intel:"The McClellan-Kerr pools at Little Rock are a working river that fishes way better than it looks: blues and flatheads on the wing dikes and revetment (cut skipjack/shad), white bass and hybrids below Murray Lock & Dam when the gates run, sauger in winter on the same seams, and largemouth in every backwater chute. Murray Park's ramps put you on it in five minutes from downtown. Current is the bite switch — pulling water = feeding water." },
  { name:"Mississippi River (Helena)", region:"Arkansas", type:"bigriver", lat:34.53, lon:-90.59,
    species:["bluecat","flathead","channelcat","alligatorgar","freshdrum"], note:"Big-river trophy blue cats & flatheads.", best:"Fall–winter for big blues.", how:"Anchor scour holes with fresh cut shad/skipjack; heavy gear.", size:"Lower Mississippi · Helena",
    intel:"The Helena reach is serious trophy-cat water — the river is unleveed wildness here, with dike fields and 60-ft scour holes holding blues that top 80 lb. Fresh skipjack is king; anchor heavy or bumping-rig the holes. Alligator gar prowl the connected backwaters. Launch at Helena's harbor ramp and respect the tows — their wheel wash moves sandbars." },
  { name:"Delta oxbows (lower White / Arkansas)", region:"Arkansas", type:"bigriver", lat:34.30, lon:-91.30,
    species:["alligatorgar","bowfin","bluecat","blackcrappie"], note:"Backwater oxbows & sloughs of the Delta.", best:"Summer gar; spring crappie.", how:"Big cut bait & wire for gar; jigs in the timber for crappie.", size:"Delta oxbows · Clarendon/St. Charles",
    intel:"The lower White's necklace of oxbows (Dale Bumpers White River NWR) is the Arkansas Delta at its purest: tupelo-cypress lakes loaded with crappie, bream, bass, bowfin and gar — alligator gar restoration is centered here. Fish the cypress lines with jigs under corks; many lakes are trolling-motor-only and seasonal (flood-dependent). The refuge access map is essential homework — that's the adventure." },
  { name:"White River (lower, warmwater)", region:"Arkansas", type:"bigriver", lat:34.70, lon:-91.30,
    species:["bluecat","flathead","channelcat","blackcrappie","largemouth"], note:"Lower White below the trout zone — catfish & crappie.", best:"Summer cats; spring crappie.", how:"Cut/live bait in the holes; jig the woody backwaters.", size:"Lower White R. · Augusta/Clarendon",
    intel:"The lower White is a slow, sandy big river braided with chutes and oxbow mouths — blues and flatheads in the outside-bend holes, channel cats everywhere, crappie stacked in every connected slough in spring. Set hooks and limb lines are the regional religion. City ramps at Clarendon, Augusta and DeValls Bluff keep runs short. Flow drives access: the river breathes with the Mississippi's stage." },
  { name:"Ouachita River", region:"Arkansas", type:"bigriver", lat:33.60, lon:-92.82,
    species:["bluecat","flathead","channelcat","largemouth","spotted"], note:"South-Arkansas lowland river.", best:"Summer & fall.", how:"Cut bait in the bends for cats; plastics on the banks for bass.", size:"South AR river · Camden",
    intel:"The Ouachita south of the mountains turns into a deep, slow coastal-plain river — largemouth and spotted bass around laydowns, crappie in the river-lake sections, and quality blues/flatheads in the bends (the Camden Sandy Beach ramp is the hub; Calion Lock & Dam concentrates fish downstream). It's barge-quiet, pressure-light water where a jon boat and cut bait still rule." },
  { name:"Red River (SW Arkansas)", region:"Arkansas", type:"bigriver", lat:33.60, lon:-93.80,
    species:["bluecat","alligatorgar","flathead","channelcat","largemouth"], note:"Muddy SW-Arkansas river with big cats & gar.", best:"Summer.", how:"Heavy cut bait on the bottom; backwaters for bass & gar.", size:"Red R. · Fulton/Garland City",
    intel:"Red-dirt river catfishing: the Red carries the most color and maybe the most underrated big blues in the state — fish the revetment seams and sandbar holes with fresh cut shad. Alligator gar are a legitimate trophy pursuit here (AGFC manages them tightly — check tags/seasons). Access is thin (Garland City AGFC ramp is the dependable one), which is exactly why the fish are big." }
