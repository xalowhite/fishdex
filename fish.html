    tagline:"America's catfish — a sleek, hard-pulling, scent-hunting omnivore that lives in nearly every river, lake and farm pond on the continent and bites day or night.",
    sections:[
      { h:"Identification",
        body:"Ictalurus punctatus. A smooth, scaleless catfish with a <b>deeply forked tail</b>, a small rounded head, and (on younger fish) a scatter of <b>dark spots</b> along slate-blue-to-olive sides — fading on big adults, and breeding males turning dark and thick-headed. The forked tail separates it from the flat-tailed bullheads; the <b>rounded anal fin with 24–29 rays</b> separates it from the blue catfish (straight-edged anal fin, 30–36 rays). Eight whisker-like <b>barbels</b> ring the mouth — chemical sensors, not stingers. The pectoral and dorsal spines, however, can deliver a nasty jab, so handle with care." },
      { h:"Biology & life history",
        body:"Channel cats are <b>cavity nesters</b>: in early summer, as water passes about <b>70–75°F</b>, the male finds a dark, enclosed spot — an undercut bank, hollow log, muskrat hole or sunken can — and the female lays a gelatinous egg mass there, which the <b>male then guards and fans</b> until the fry disperse. They're long-lived (commonly 10–15+ years, occasionally much older) and grow large where forage and water allow; most rod-and-reel fish run 1–8 lb, but trophy 'channels' exceed 20 lb. They tolerate a huge range of temperature, current and water quality, which is why they're so nearly universal." },
      { h:"Behavior & seasonal patterns",
        body:"The channel cat is a <b>scent-and-taste hunter</b> — its whole body, and especially the barbels, is covered in taste buds, so it locates food by smell in dark or muddy water where sight feeders fail. They're most active in <b>warm water and low light</b>: summer nights are prime, and a rising, stained river after rain triggers a strong feed as the current carries scent. They roam, following food along channel edges, holes, current seams and the downstream side of cover. Cold winter water slows them to a deep, sluggish bite in the river's deepest holes." },
      { h:"Diet & forage",
        body:"A true <b>omnivore and opportunist</b> — fish (live and dead), crayfish, insects, mollusks, worms, and plenty of plant matter and decaying material. That broad, scent-driven diet is why catfish bites span the spectrum: <b>fresh cut bait and live baitfish</b> for the biggest fish, <b>nightcrawlers and chicken liver</b> for numbers, and pungent <b>'stinkbaits' / prepared dough and dip baits</b> that exploit their incredible sense of smell. The smellier and bloodier, the better in muddy water." },
      { h:"How to catch them",
        body:"Keep it on or near the bottom. A simple <b>slip-sinker (Carolina) rig or three-way rig</b> with cut shad, a gob of crawlers, liver or a dip bait, fished in current seams, holes and below dams, accounts for most channel cats. Fish <b>after dark in summer</b> and during rising, off-color water for the best action. They fight hard and dirty toward cover, so don't under-gun them — and watch those pectoral/dorsal spines when you unhook one." }
    ],
    regions:[
      { name:"Missouri (rivers, reservoirs & a stocked-pond staple)",
        body:"Channel cats are everywhere in Missouri — the <b>Missouri and Mississippi rivers</b> and their tributaries, every major reservoir, and thousands of MDC community lakes and farm ponds that the department <b>stocks specifically with channel catfish</b> for easy, family-friendly fishing. Summer nights below the big-river wing dams and in reservoir coves are prime; rising, muddy water after a rain turns the bite on." },
      { name:"Arkansas (catfish country, top to bottom)",
        body:"Arkansas is serious catfish water. The <b>Arkansas, White and Mississippi rivers</b> and the Delta's bayous and oxbows grow channel cats in huge numbers alongside trophy blues and flatheads, and the AGFC stocks channels into family and city ponds across the state. Drifting and bottom-fishing cut bait in river holes and below the navigation dams is the classic approach." },
      { name:"North Carolina (piedmont rivers & reservoirs)",
        body:"From the <b>Cape Fear, Neuse and Roanoke</b> rivers to piedmont reservoirs like <b>Jordan, Falls and High Rock</b>, channel catfish are abundant and widely stocked, including in NCWRC community fishing ponds. The coastal-plain rivers and their warm, fertile flows produce steady summer-night fishing on cut bait and crawlers." },
      { name:"Illinois & the heartland",
        body:"In Illinois the channel cat is arguably the most-caught sportfish — the <b>Mississippi, Illinois, Rock and Kaskaskia</b> rivers and their backwaters, plus reservoirs and a statewide network of stocked ponds, all teem with them. Tailwaters below the lock-and-dams concentrate fish in current, and the post-rain rising-water bite is a Midwest summer tradition." }
    ],
    conservation:"Channel cats are abundant, productive and stocked for harvest, so keeping a few for the table is well within good management — they're one of the best 'eat what you catch' fisheries in the country. Handle them carefully (the spines, not the barbels, are the hazard), and consider releasing the rare trophy-class fish, which are decades old. Never move live catfish between waters.",
    refs:[
      {t:"Channel catfish — Wikipedia", u:"https://en.wikipedia.org/wiki/Channel_catfish"},
      {t:"Catfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/catfish/"},
      {t:"Channel catfish — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/channel-catfish"},
      {t:"Channel vs. blue catfish ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/telling-channel-catfish-and-blue-catfish-apart/"}
    ]
  },
  bluegill:{
    extra:[
      { h:"Season &amp; weather playbook — small &amp; natural",
        body:`<p>Bluegill orient to cover and the warm shallows, and they eat small invertebrates — so the rule all year is <b>go small and natural</b>. The spawn is the headline, but they bite something nearly every day they're warm.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep, schooled near brush &amp; basins; the big bulls feed slowly (good ice fishing)</td><td>Tiny tungsten jig or teardrop with a waxworm/spike, fished slow &amp; vertical</td></tr>
        <tr><td class="s">Spring (pre-spawn)</td><td>Moving into warming shallows &amp; weed edges as water climbs</td><td>Small jig or a worm/cricket under a tiny float around cover</td></tr>
        <tr><td class="s">Spawn<br><span style="font-weight:400;color:#90a8af">67–80°F, all summer</span></td><td>Colonial beds in 1–4 ft (the visible "honeycomb"); they spawn repeatedly through the warm months</td><td>Worm or cricket under a bobber, 1/32 oz jig, small popper or wet fly — nonstop action on a bed</td></tr>
        <tr><td class="s">Summer–Fall</td><td>Big "bulls" slide to deeper weed lines &amp; brush; small fish stay shallow</td><td>Small jig or fly worked a little deeper on the outside weed edges for the bigger fish</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Bluegill feed best in the <b>warm hours of warm, stable, sunny days</b> — exactly when many gamefish slow down, which makes them the perfect midday and beginner fish. The bedding shallows fire on calm, warm afternoons. The one nuance: the genuine trophy <b>"bull" bluegill are wary</b> — they hold a little deeper, off the obvious beds, and spook in clear water, so catching the biggest ones takes finesse and a quiet approach rather than just dropping a worm on the colony.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Ultralight — the whole point</h3><p style="margin:4px 0">A 5'–6'6" ultralight spinning rod (or a simple cane/crappie pole) with a 500–1000 reel and <b>2–4 lb</b> line, small hooks (#6–#10) and tiny jigs (1/32–1/64 oz). A worm or cricket under a small float is the timeless rig; a micro tube or grub on a light jighead is deadlier on the bigger fish.</p></div>
        <div class="gearbox"><h3>🐟 Fly — pure fun</h3><p style="margin:4px 0">Bluegill may be the best fly-rod quarry there is: a 3–4wt with a small <b>foam popper</b>, sponge spider or wet fly draws explosive little takes, and it's how a lot of fly anglers learn. For the deep bulls, a small weighted nymph or micro-jig under an indicator.</p></div>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — but pound-for-pound a brawler.</b></div>
        <p>On the 1–5 scale a bluegill is a 2 by size alone, but few fish <b>punch above their weight</b> like a big bull: hooked, it turns its deep, flat body sideways to the line and uses it like a sail, fighting in stubborn circles that feel far bigger than the fish. On honest ultralight or a 3wt, a hand-sized 'gill is genuinely sporting — which is exactly why they're so beloved.</p>` },
      { h:"Variants — the coppernose &amp; hybrids",
        body:`<p>The wide-ranging northern bluegill has a distinct southern cousin, the <b>coppernose bluegill</b> (a Florida subspecies, <i>Lepomis macrochirus purpurescens</i>), recognizable by the coppery bar across the head of breeding males. Coppernose are popular for stocking warm southern ponds because they grow fast and large in a long season — a big reason Florida and the Deep South produce such heavy 'gills. Bluegill also <b>hybridize readily</b> with other sunfish; the "hybrid bluegill" (usually bluegill × green sunfish) is widely stocked in ponds because it grows quickly, fights hard, and reproduces less — reducing the stunting that plagues pure bluegill in small waters. <span class="src">Don't confuse bluegill with the redear ("shellcracker"), which has a red-edged ear flap and eats snails — see the Species ID guide.</span></p>` }
    ],
    tagline:"The fish that taught America to fish — a scrappy, beautiful, nearly universal sunfish that fits in a child's hand and a master angler's respect alike.",
    sections:[
      { h:"Identification",
        body:"Lepomis macrochirus. A deep, round, hand-sized sunfish with a tiny mouth, marked by a <b>solid black ear-flap</b> (no red or pale margin, unlike the redear/shellcracker), a <b>dark blotch at the rear base of the dorsal fin</b>, and 5–9 faint vertical bars. Breeding males blaze with orange-and-blue color and a coppery breast. The small mouth is the functional key — it tells you to fish <b>small</b>. Bluegill hybridize readily with other sunfish, which can muddy the field marks, but the black ear-flap and dorsal blotch are the anchors." },
      { h:"Biology & life history",
        body:"Bluegill are <b>colonial bed-spawners</b>: from late spring through summer, whenever water sits around <b>67–80°F</b>, males sweep clusters of saucer-shaped nests in 1–4 ft of water — the unmistakable 'honeycomb' of beds in the shallows — and the dominant 'bull' bluegills guard them. They spawn <b>repeatedly through the warm months</b>, which makes them astonishingly prolific and prone to <b>overpopulating and stunting</b> in waters without enough predators. They're short-lived (most 4–6 years) and slow to reach real size; a true 'bull' bluegill near a pound is a genuine trophy that took years to grow." },
      { h:"Behavior & seasonal patterns",
        body:"Bluegill orient to <b>cover and the warm shallows</b> — weed edges, docks, brush, laydowns. The spawn is the headline event: through the warm months waves of fish bed in the shallows, and a visible bed is nonstop action. In summer's heat and in winter the bigger fish slide to <b>deeper weed lines and brush</b>, suspending off structure, while the small ones stay shallow. They feed all day but best in the warm hours, and the <b>biggest, oldest bulls are surprisingly wary</b> — they hold a little deeper and spook easily, which is why monster bluegill are a specialist's quarry, not just a kid's." },
      { h:"Diet & forage",
        body:"Bluegill are <b>invertebrate feeders</b> — aquatic insects and larvae, tiny crustaceans, snails, worms, and the occasional small minnow or fish egg, sipped through that small mouth. They're a cornerstone of the food web, the primary forage that grows big largemouth bass. For anglers the lesson is to <b>go small and natural</b>: a piece of worm or a cricket, a tiny jig, a small popper or wet fly. Oversize baits just get pecked." },
      { h:"How to catch them",
        body:"The most welcoming fishing there is, and a real craft when you chase big ones. The timeless rig is a <b>worm or cricket under a small bobber</b>; a <b>1/32–1/64 oz jig or a tiny tube/grub</b> on light line is deadlier still. Fly anglers love them — a small <b>popping bug or wet fly</b> on a bedding colony is pure fun. For the wary 'bulls,' fish the deeper outside weed edges and brush with a slow, small presentation. Everything about bluegill rewards <b>light line, small hooks, and finesse</b>." }
    ],
    regions:[
      { name:"Florida (native giants & the coppernose)",
        body:"Florida is a <b>big-bluegill paradise</b> — the warm, year-round growing season and the native <b>coppernose</b> subspecies produce huge bream. <b>Lake Okeechobee</b>, the <b>Kissimmee chain</b> and countless lakes and canals give up plate-size bluegill and redear, and Floridians chase the bedding 'bream' on light tackle and flies through a long spring and summer. The same warmth that grows giant bass grows giant panfish." },
      { name:"Missouri & Illinois (the farm-pond heartland)",
        body:"In the Midwest the bluegill is the backbone of <b>farm-pond and community-lake fishing</b> — the MDC and IDNR stock the bluegill-bass combination into thousands of small waters precisely because bluegill feed the bass and provide easy, abundant fishing. Well-managed ponds and lakes like Missouri's MDC community lakes and Illinois' park and strip-mine lakes grow surprisingly big bulls; the trick is enough bass predation to keep the bluegill from stunting." },
      { name:"Arkansas & North Carolina (bream culture)",
        body:"Across Arkansas and North Carolina, 'bream' fishing is a deep tradition — farm ponds, oxbows, the fertile lowland lakes and slow rivers all teem with bluegill and their redear cousins. The warm southern summers stretch the bedding season for months, and light-tackle and fly anglers work the shallow beds and shaded banks from spring well into fall." }
    ],
    conservation:"Counter-intuitively, bluegill often need <b>harvest</b>: in small lakes and ponds they over-reproduce and stunt, so keeping plenty of the small-to-medium fish is good management and good eating. The one thing to protect is the <b>big bull bluegill</b> — they're old, rare, and the prime spawners; releasing the genuine 9-inch-plus fish helps keep a panfish fishery producing quality. A healthy bass population is the best bluegill-management tool there is.",
    refs:[
      {t:"Bluegill — Wikipedia", u:"https://en.wikipedia.org/wiki/Bluegill"},
      {t:"Bluegill / sunfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/bluegill/"},
      {t:"Bluegill — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/bluegill"},
      {t:"Managing bluegill in ponds — pond management extension guidance", u:"https://www.takemefishing.org/how-to-fish/fishing-fish-species/bluegill/"}
    ]
  },
yellowperch:{
    tagline:"A handsome, schooling cool-water panfish of the northern tier — modest on the rod, but a backbone of the Great Lakes fishery and one of the very best fish on the plate.",
    sections:[
      { h:"Identification",
        body:"<i>Perca flavescens</i>, a true perch and close cousin of the walleye and sauger. Golden-yellow flanks crossed by <b>6–8 dark vertical bars</b>, with orange-to-red lower fins that flare bright on spawning males. Two distinct dorsal fins — a spiny front and a soft rear — mark it as a perch, not a sunfish. No canine teeth (unlike its walleye cousin). Most fish run a modest 6–12 inches; a 'jumbo' perch over a pound is a prize." },
      { h:"Biology &amp; life history",
        body:"Yellow perch are very early spring spawners, dropping distinctive <b>gelatinous, accordion-folded egg strands</b> over weeds and brush as water warms past about 45–55°F, with no parental care afterward. They school tightly by size and year-class, grow slowly, and — like other panfish — can <b>overpopulate and stunt</b> in waters without enough predators. They're a cool-water fish, most abundant across the northern states and Canada and scarce in the warm South." },
      { h:"Behavior &amp; seasonal patterns",
        body:"Perch travel in roaming schools near the bottom over sand, gravel and weed edges, relating to drop-offs, humps and the first break. Unlike the night-feeding walleye, perch are <b>daytime feeders</b> that rest at night — a useful quirk. They follow bait and move constantly, so locating an active school is the whole game; once you catch one, more usually follow. They feed through the cold months and are a marquee <b>ice-fishing</b> target up north." },
      { h:"Diet &amp; forage",
        body:"Invertebrates dominate — insect larvae, small crustaceans, snails — alongside small minnows, fish eggs and young crayfish; juveniles start on zooplankton. The takeaway for anglers is to fish <b>small</b>: a minnow, a piece of crawler, a tiny jig or spoon tipped with a grub. Perch key on bite-size, bottom-oriented forage." }
    ],
    regions:[
      { name:"Illinois &amp; the Great Lakes (the heartland)",
        body:"Among FishDex's covered states, Illinois is perch country: <b>Lake Michigan</b> has a storied (and tightly regulated) yellow-perch fishery, and the northern natural lakes — the <b>Fox Chain O'Lakes</b> — plus the Mississippi River backwaters hold good numbers. The upper Midwest at large (Wisconsin, Minnesota, the Dakotas) is the perch capital, where 'perch jerking' through the ice and the summer fish-fry are institutions." },
      { name:"The South (uncommon)",
        body:"Yellow perch are a northern, cool-water fish, so they thin out fast heading south — only a few northern Missouri waters hold them, and they're essentially absent from the warm lowlands of Arkansas and Florida and uncommon in North Carolina. Southern anglers rarely encounter them; this is a fish of the cold-water tier." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — find the school",
        body:`<p>Perch are schooling bottom feeders that bite in daylight, so cover water until you contact a school, then work it. Keep baits small and near the bottom.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep, tightly schooled basins &amp; structure — a top ice-fishing species</td><td>Small tungsten jig or spoon tipped with a minnow head, spike or waxworm; drop-shot through the ice</td></tr>
        <tr><td class="s">Spring</td><td>Shallowing over weeds &amp; brush to spawn early; then weed edges</td><td>Small jig, minnow under a float, perch rig (two dropper hooks) with minnows</td></tr>
        <tr><td class="s">Summer</td><td>Weed edges, drop-offs &amp; humps, sliding a bit deeper as it warms</td><td>1/16–1/8 oz jig + plastic or minnow, drop-shot, worm on a bottom rig</td></tr>
        <tr><td class="s">Fall</td><td>Feeding up in schools — often the year's best jumbo-perch action</td><td>Jig + minnow, small blade bait, spoon — vertical over the school</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Because perch feed by sight in daylight, they often bite best in <b>bright midday conditions</b> — the opposite of walleye — though low light and stable weather help. Cold fronts push schools deeper and slow them. The cardinal rule is mobility: perch schools roam, so if the bites stop, the school has moved — go find them rather than waiting.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Ultralight spinning &amp; ice gear</h3><p style="margin:4px 0">A 5'–7' light or ultralight spinning rod with a 1000–2500 reel and <b>2–6 lb</b> line, small hooks and 1/16–1/8 oz jigs. A classic two-hook 'perch rig' (or crappie rig) tipped with minnows covers the bottom efficiently. In winter, a sensitive ice rod with tiny tungsten jigs and spoons.</p><div class="pick"><b>Baits:</b> minnows, pieces of crawler, small soft plastics, spikes/waxworms; spoons (Kastmaster, Swedish Pimple) for ice.</div></div>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — modest, but they come by the bucket.</b></div>
        <p>A yellow perch gives a light, tapping tug and a short pull — nobody hooks a perch for the battle. The appeal is two-fold: they school thick, so a good spot means fast, steady action that's perfect for kids and ice anglers, and the firm white fillets are widely rated <b>among the finest-eating freshwater fish there is</b>.</p>` },
      { h:"Relatives — the perch family",
        body:`<p>The yellow perch anchors the <b>Percidae</b> family alongside its larger predatory cousins the <b>walleye</b> and <b>sauger</b> (and their saugeye hybrid), plus the tiny darters. It's sometimes called the 'American', 'ringed' or 'lake' perch, and shouldn't be confused with the unrelated European perch or with 'white perch' (a temperate bass) or the 'silver/speckled perch' names southerners use for crappie. <span class="src">See the walleye profile for the predatory side of the perch family.</span></p>` }
    ],
    conservation:"Prolific schooling panfish that handle and often benefit from harvest of mid-size fish, which thins stunting year-classes. The exception is the big-water stocks — Great Lakes perch have seen sharp ups and downs and are regulated with bag limits and seasons to protect them; respect those. Few fish reward a full creel at the table like perch.",
    refs:[
      {t:"Yellow perch — Wikipedia", u:"https://en.wikipedia.org/wiki/Yellow_perch"},
      {t:"Yellow perch fishing — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/yellow-perch/"},
      {t:"Yellow perch — Illinois DNR", u:"https://dnr.illinois.gov/"},
      {t:"Perch tactics — In-Fisherman", u:"https://www.in-fisherman.com/editorial/perch/"}
    ]
  },
  flathead:{
    tagline:"The big-river apex catfish — a solitary, live-prey hunter that lurks in the timber by day, prowls the flats by night, and grows past 100 pounds.",
    sections:[
      { h:"Identification",
        body:"<i>Pylodictis olivaris</i> — the 'yellow cat', 'mud cat' or 'shovelhead'. Unmistakable: a broad, <b>flattened head</b> with a <b>protruding lower jaw</b>, small eyes, mottled yellow-to-olive-brown flanks, and a <b>squared (not deeply forked) tail</b>. Where channel and blue cats are sleek and fork-tailed, the flathead is blocky and predatory-looking. It's the second-largest North American catfish, reaching well over 100 lb." },
      { h:"Biology &amp; life history",
        body:"Flatheads are <b>cavity nesters</b> — in early summer (around 70–75°F) the male finds a hollow log, undercut bank or cavity, and guards the egg mass and fry. They're long-lived (20+ years) and slow-growing, maturing into a true <b>apex predator</b>. Critically, they are <b>solitary</b> — not the roaming schools of channels or blues — each big flathead holding its own piece of prime cover." },
      { h:"Behavior &amp; seasonal patterns",
        body:"A classic ambush predator: by day the flathead buries in <b>deep cover</b> — logjams, root wads, undercut banks, the deepest holes — and at night it moves out onto shallower flats, riffles and hole-mouths to hunt. It is strongly <b>nocturnal</b>. In winter flatheads pack into the deepest river holes and go nearly dormant, feeding little. Find the wood and the deep holes and you've found the fish." },
      { h:"Diet &amp; forage",
        body:"This is the key to flathead fishing: they eat almost exclusively <b>live fish and crayfish</b> — live bluegill, sunfish, shad, suckers and the like. Unlike the channel and blue cat, a flathead largely <b>ignores cut bait, stinkbait and prepared baits</b>. If you want a big flathead, you fish a lively baitfish on the bottom near its cover. A trophy flathead is a meat-eater, plain and simple." }
    ],
    regions:[
      { name:"Missouri &amp; the Mississippi/Missouri rivers (MO &amp; IL)",
        body:"Native and abundant in the big rivers — the <b>Missouri and Mississippi</b> and their major tributaries — where flatheads hold in the wing-dam wash, deep outside bends and logjams. The hand-grabbing tradition of <b>'noodling'</b> (where legal) targets nesting flatheads in cavities. Illinois shares the same big-river flathead fishery in the Mississippi, Illinois and Kaskaskia." },
      { name:"Arkansas (rivers, oxbows &amp; trophy potential)",
        body:"The <b>Arkansas, White and Mississippi</b> rivers and the Delta's bayous and oxbows grow big flatheads, and they're a celebrated trophy and noodling target. Anglers anchor or set lines with live sunfish near deep cover after dark for the biggest fish." },
      { name:"North Carolina (an introduced giant)",
        body:"Flatheads are <b>not native</b> to the Atlantic slope but were introduced to North Carolina rivers — the <b>Cape Fear, Neuse and Yadkin/Pee Dee</b> systems — where they now grow huge and are a popular trophy fishery. As a voracious predator they also impact native fish, so some states encourage harvest of introduced flatheads." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — live bait, after dark",
        body:`<p>Everything about flathead fishing follows their nocturnal, live-prey nature. Fish lively baitfish on the bottom near deep cover, focus on warm-weather nights, and don't bother with cut or prepared baits.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top approach</th></tr>
        <tr><td class="s">Winter</td><td>Packed into the deepest river holes; nearly dormant &amp; tough</td><td>A big live bait fished dead-slow right in the hole — patience game; few but possible</td></tr>
        <tr><td class="s">Spring</td><td>Pre-spawn feeding as water warms; below dams &amp; on hole edges</td><td>Live sunfish/shad on the bottom near cover; rising water helps</td></tr>
        <tr><td class="s">Summer</td><td><b>Prime</b> — by night they leave the logjams to hunt flats &amp; hole-mouths</td><td>Live bluegill/sunfish (where legal) on a slip-sinker rig at the edges of cover after dark</td></tr>
        <tr><td class="s">Fall</td><td>Heavy feed-up before winter — among the best trophy windows</td><td>Big live baitfish near deep cover at dusk &amp; into the night</td></tr></table>
        <h3>Weather &amp; water</h3>
        <p>Flatheads are <b>night hunters</b> first and foremost — warm summer and fall nights are the prime time, and a big flathead bite often comes after full dark. They're more sight/lateral-line predators than the scent-driven channel cat, so the rising-muddy-water trick matters less than simply presenting a <b>lively bait</b> at the right ambush spot. Stable, warm conditions beat a cold front.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🎣 Heavy — you fish stout on purpose</h3><p style="margin:4px 0">A 7'6"–8' heavy rod with backbone, a strong baitcaster/conventional reel with a bait-clicker, and <b>50–80 lb braid</b>. A simple slip-sinker (Carolina) rig with a stout circle hook and a <b>live bluegill, sunfish or large shiner</b> (check your state's live-bait and game-fish rules). You go heavy because a big flathead will instantly try to bury you in the logjam it lives in.</p><div class="pick"><b>Solid picks:</b> Ugly Stik Catfish / Tiger rods, Abu Garcia 6500/7000-class or Penn conventional reels; 8/0–10/0 circle hooks.</div></div>
        <div class="fightline"><span class="stars">★★★★★</span><b>Fight: 5/5 — a brutal slugfest.</b></div>
        <p>A hooked flathead is one of fresh water's strongest fish: it doesn't run far, it <b>dives straight back into the cover</b> it ambushes from and tries to break you off in the wood, throwing its enormous bulk against the rod in heavy, head-shaking surges. There's no finesse — you lean on heavy gear and try to turn the fish before it reaches the snag. Mind the spines and that bucket of a mouth when you land one.</p>` },
      { h:"Status &amp; relatives",
        body:`<p>The flathead is the only member of its genus (<i>Pylodictis</i>), so it has no subspecies — just a pile of regional nicknames (yellow cat, shovelhead, mud cat, Appaloosa cat). It rounds out the big-three catfish with the <b>channel</b> and <b>blue</b> cats, but stands apart as the live-prey specialist. Where it's been <b>introduced outside its native range</b> (Atlantic-slope rivers like North Carolina's), it's an effective and sometimes damaging predator on native fish — never move flatheads between waters. <span class="src">See the Species ID guide for the flat head, jaw and squared tail tells.</span></p>` }
    ],
    conservation:"Big flatheads are old, slow-growing apex predators and (within their native range) worth releasing to keep the fishery and the river's balance healthy — keep a smaller one for the table instead. Where flatheads are introduced and invasive, agencies may encourage harvest. Follow live-bait and game-fish regulations carefully, and never transport live catfish to a new water.",
    refs:[
      {t:"Flathead catfish — Wikipedia", u:"https://en.wikipedia.org/wiki/Flathead_catfish"},
      {t:"Catfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/catfish/"},
      {t:"Flathead catfish — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/flathead-catfish"},
      {t:"Flathead vs blue vs channel ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/catfish/"}
    ]
  },
  bluecat:{
    tagline:"The giant of North American catfish — a powerful, current-loving, shad-chasing predator that tops 100 pounds and pulls like a freight train.",
    sections:[
      { h:"Identification",
        body:"<i>Ictalurus furcatus</i>. Like the channel cat it has a <b>deeply forked tail</b>, but the blue is <b>slate-blue to gray with no spots</b>, heavier in the shoulders, and carries a <b>straight-edged anal fin with 30–36 rays</b> (the channel's anal fin is rounded with 24–29 rays). It's the <b>largest catfish in North America</b>, with state records ranging from roughly 100 to over 140 pounds." },
      { h:"Biology &amp; life history",
        body:"Blue cats are cavity nesters that spawn in early summer, and they're <b>long-lived</b> (commonly 20–30 years), reaching their giant sizes only over decades — so the true trophies are very old fish, mostly females. They need <b>big water with current or large reservoirs</b> and abundant shad to grow large, which is why they're a big-river and large-impoundment specialist." },
      { h:"Behavior &amp; seasonal patterns",
        body:"More than any other catfish, the blue is an <b>open-water, current-oriented predator</b> that roams river channels and reservoir flats <b>following shad schools</b>, suspending and chasing bait rather than just lying on the bottom. They feed in current seams, channel edges, holes and below dams. Unlike the flathead, blues stay active and feed well through <b>winter</b>, which is the prime trophy season in deep holes near wintering shad." },
      { h:"Diet &amp; forage",
        body:"Primarily <b>fish — especially shad</b> (live and fresh-dead), plus crayfish, mussels and whatever the river offers. The blue is more piscivorous than the channel cat, but, crucially and unlike the flathead, it <b>readily eats fresh cut bait</b>: a slab of fresh-cut shad or skipjack is the single best blue-cat bait there is. Freshness beats everything." }
    ],
    regions:[
      { name:"Missouri &amp; the Mississippi/Missouri rivers (MO &amp; IL)",
        body:"The native heartland. The <b>Missouri and Mississippi</b> rivers — and the famous waters around their confluence near St. Louis — produce true trophy blues, holding in the deep holes, wing-dam scour and channel edges near shad. Illinois shares this big-river fishery throughout the Mississippi and Ohio drainages." },
      { name:"Arkansas (big rivers &amp; lakes)",
        body:"The <b>Arkansas and Mississippi</b> rivers and several large reservoirs grow heavy blue cats, with drifting and anchoring fresh cut shad the standard approach in current and around shad concentrations." },
      { name:"North Carolina (introduced giants)",
        body:"Blue cats were <b>introduced</b> to North Carolina/Virginia waters and have exploded — the <b>Cape Fear, Roanoke and the Kerr/Badin</b> systems now give up 50–100 lb fish and host serious trophy fishing. As with the flathead, that success comes at a cost to native species, so they're considered invasive on the Atlantic slope and harvest is often encouraged." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — follow the shad",
        body:`<p>Blue-cat fishing is shad-and-current fishing. Locate the bait and the current breaks, present fresh cut shad, and you can catch blues day or night, all year — including the dead of winter.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top approach</th></tr>
        <tr><td class="s">Winter</td><td><b>Prime trophy time</b> — deep channel holes &amp; flats near wintering shad</td><td>Anchor or controlled-drift fresh-cut shad/skipjack through holes &amp; channel edges</td></tr>
        <tr><td class="s">Spring</td><td>Pre-spawn feeding in current — below dams, wing dams, channel swings</td><td>Cut shad on a slip-sinker or three-way rig in the current seams</td></tr>
        <tr><td class="s">Summer</td><td>Spawn, then post-spawn on ledges, holes &amp; flats; active at night too</td><td>Drift big flats &amp; ledges with cut bait; nights for shallower fish</td></tr>
        <tr><td class="s">Fall</td><td>Heavy shad feed — fish gorge ahead of winter</td><td>Drift or anchor on shad schools with fresh cut chunks</td></tr></table>
        <h3>Weather &amp; water</h3>
        <p>Blues are far less night-dependent than flatheads — they <b>feed actively in daylight</b>, especially in current and during the cold months, so winter and current are your allies, not obstacles. Position is dictated by <b>where the shad are</b> and by current breaks; fresh cut bait and a little scent in the flow do the rest. Rising river levels concentrate fish on the new current edges.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🎣 Heavy, with drift capability</h3><p style="margin:4px 0">A 7'6"–8' medium-heavy to heavy rod, a stout baitcaster/conventional reel (line-counters help when drifting), and <b>30–65 lb</b> braid or mono. Use a <b>slip-sinker or three-way rig</b> to anchor in current, or a <b>Santee/float rig</b> to keep bait just off bottom while drifting flats. Big circle hooks (7/0–10/0) and <b>fresh-cut shad or skipjack</b> are the standard.</p><div class="pick"><b>Solid picks:</b> Ugly Stik Catfish, B'n'M / Whisker Seeker rods; Abu Garcia 6500–7000 or Penn conventional reels.</div></div>
        <div class="fightline"><span class="stars">★★★★★</span><b>Fight: 5/5 — the strongest pull most anglers will feel.</b></div>
        <p>A big blue catfish is raw, sustained power — it uses its bulk and the current to make <b>long, unstoppable runs</b> and dogged deep battles that can last many minutes. Hooked in heavy current, a trophy blue feels like you've snagged a moving truck. This is exactly why blue-cat anglers run heavy rods, big reels and stout line; anything lighter simply gets spooled or broken.</p>` },
      { h:"Status &amp; relatives",
        body:`<p>The blue cat completes the big-three with the channel and flathead. Sometimes called the 'high-fin blue' (a deep-bodied form) or 'Mississippi white cat', it has no meaningful subspecies. Where <b>introduced outside its native range</b> — the Chesapeake tributaries and North Carolina's Atlantic-slope rivers — it has become a dominant, invasive predator, so those states encourage harvest and prohibit moving them. <span class="src">Tell a blue from a channel by the straight-edged anal fin (30–36 rays) and the spotless blue-gray body — see the Species ID guide.</span></p>` }
    ],
    conservation:"Trophy blues are decades old and predominantly large females — release the giants (handle them in the water, support the body) and keep a smaller fish if you want one to eat, since blues are excellent table fare at modest sizes. Within the native range that protects the trophy fishery; where blues are invasive, harvest is encouraged. Never transport live catfish between waters.",
    refs:[
      {t:"Blue catfish — Wikipedia", u:"https://en.wikipedia.org/wiki/Blue_catfish"},
      {t:"Catfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/catfish/"},
      {t:"Blue catfish — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/blue-catfish"},
      {t:"Channel vs blue catfish ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/telling-channel-catfish-and-blue-catfish-apart/"}
    ]
  },
  pike:{
    tagline:"A toothy freshwater ambush predator built for the explosive strike — long, lean and mean, and the apex hunter of cool northern waters.",
    sections:[
      { h:"Identification",
        body:"<i>Esox lucius</i>, the northern pike. A long, torpedo-shaped body with a flat, duck-bill snout full of teeth, and a single dorsal fin set far back near the tail. Greenish flanks marked with <b>rows of light, bean-shaped spots on a darker background</b> (the reverse of a muskie's dark-on-light marks). The <b>cheek is fully scaled and the gill cover is scaled only on its upper half</b> — the surest way to separate pike from muskie." },
      { h:"Biology &amp; life history",
        body:"Pike are among the earliest spawners, broadcasting eggs over flooded vegetation and marsh in cold water (about 40–52°F) right after ice-out, with no parental care. They grow fast and can reach 20–40+ inches, the big ones being old females. As a <b>cool-water fish</b> they're intolerant of warm summer water, which pushes the largest pike toward cooler, deeper haunts as the season heats up." },
      { h:"Behavior &amp; seasonal patterns",
        body:"The pike is a lie-in-wait <b>ambush predator</b>, hanging motionless along weed (cabbage) edges, points and drop-offs and exploding on anything that passes. After the spring spawn they feed aggressively in shallow weedy bays; through summer the big fish slide deep and cool while small 'hammer-handles' stay shallow; <b>fall</b> brings a heavy feed-up and the best trophy odds; and they stay active under the ice, a premier tip-up target." },
      { h:"Diet &amp; forage",
        body:"A voracious, opportunistic piscivore — perch, ciscoes, whitefish, suckers and smaller pike, plus frogs, crayfish and the occasional duckling or rodent. Pike are notably <b>cannibalistic</b> and eat large prey relative to their size. Match that with big, flashy baitfish imitations: large spoons, bucktails, swimbaits, jerk- and glidebaits." }
    ],
    regions:[
      { name:"Illinois &amp; the upper Midwest (our southern edge)",
        body:"Among FishDex's covered states, Illinois marks the southern fringe of good pike water: the <b>Fox Chain O'Lakes</b>, northern natural lakes, and the Mississippi River backwaters hold them. The species really hits its stride farther north." },
      { name:"The North (the heartland)",
        body:"The true pike country is the cold North — <b>Minnesota, Wisconsin, the Dakotas, the Northeast and across Canada</b>, where remote lakes grow giant 'gators' over 40 inches. It's a flagship species for both open-water casting and hard-water tip-up fishing." },
      { name:"The South (absent)",
        body:"Northern pike are a cool-water fish whose native range stops well north of the warm lowlands — they're essentially absent from Missouri's bootheel, Arkansas, Florida and lowland North Carolina. In the South their <b>Esox</b> relatives, the muskellunge (mountain reservoirs) and the chain pickerel, fill the toothy-predator niche." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — big baits for a big mood",
        body:`<p>Pike location tracks water temperature: cool means shallow and aggressive, warm means deep (for the big ones). Throw flashy, sizable baits and always use a bite-proof leader.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top lures &amp; baits</th></tr>
        <tr><td class="s">Winter (ice)</td><td>Weed edges &amp; drop-offs near the cool-season bait; active under ice</td><td>Tip-ups with big live shiners/suckers; jigging spoons &amp; large jigs</td></tr>
        <tr><td class="s">Spring</td><td>Shallow, weedy, warming bays after the spawn — aggressive &amp; eager</td><td>Spoons (Daredevle), inline spinners &amp; bucktails, spinnerbaits, jerkbaits, swimbaits</td></tr>
        <tr><td class="s">Summer</td><td>Big pike go deep &amp; cool (cabbage edges, main-lake structure); small fish stay shallow</td><td>Deeper presentations — large swimbaits, deep-running baits, big spoons; topwater &amp; bucktails in low light</td></tr>
        <tr><td class="s">Fall</td><td><b>Prime trophy season</b> — heavy feed-up shallow to mid-depth before winter</td><td>Big glidebaits, large soft swimbaits, live suckers, oversized spoons &amp; bucktails</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Cool water makes pike shallow and active; <b>overcast, wind and low light</b> embolden them and trigger reaction strikes, while bright, hot, calm conditions push the big fish deep and slow. A falling barometer ahead of a front can spark a vicious feed. Whatever the weather, a pike commits to the ambush — a confident, flashy retrieve past good cover draws the strike.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🎣 Medium-heavy + a bite leader (non-negotiable)</h3><p style="margin:4px 0">A 7'–7'6" medium-heavy rod with 30–50 lb braid, and <b>always a wire or heavy fluorocarbon (40–60 lb) leader</b> — a pike's teeth will shear straight mono or braid instantly. Throw large spoons (Daredevle), inline bucktails (Mepps Musky Killer), spinnerbaits, jerk/glidebaits and big soft swimbaits; topwater in summer.</p><div class="pick"><b>Handle with care:</b> long-nose pliers, jaw spreader and a cradle/net; support the fish horizontally and keep fingers clear of the teeth.</div></div>
        <div class="gearbox"><h3>🐟 Fly</h3><p style="margin:4px 0">An 8–9wt with big flashy baitfish flies and a wire/heavy bite tippet — pike are a blast on the fly in shallow weedy water.</p></div>
        <div class="fightline"><span class="stars">★★★★☆</span><b>Fight: 4/5 — a violent handful.</b></div>
        <p>The pike's strike is the show — a sudden, savage T-bone — followed by strong, head-shaking runs and thrashing, especially boatside where a green pike can be genuinely dangerous to handle. They have power and a temper but tire fairly quickly. Keep steady pressure, get a good landing tool ready, and respect the teeth.</p>` },
      { h:"Relatives &amp; hybrids — the Esox family",
        body:`<p>The pike belongs to the pike family, <b>Esocidae</b>, alongside the larger <b>muskellunge</b> (light body with dark or no marks; only the upper half of cheek and gill cover scaled) and the smaller, southern <b>chain pickerel</b> and grass/redfin pickerels. Pike and muskie cross to produce the <b>'tiger muskie'</b> — a strikingly barred, fast-growing, usually sterile hybrid that many states stock for trophy potential. <span class="src">The pike-vs-muskie scaling and marking tells are in the Species ID guide.</span></p>` }
    ],
    conservation:"Big pike are old females and the engine of the population — release the trophies, supporting them horizontally and keeping them wet, and never hang a big one vertically. A wire leader isn't just about landing fish; it prevents deep-cut, lost-leader mortality. In summer's warm water, land and release pike quickly so they don't exhaust. Keep a few small 'eaters' if you like — they're excellent — but let the big girls swim.",
    refs:[
      {t:"Northern pike — Wikipedia", u:"https://en.wikipedia.org/wiki/Northern_pike"},
      {t:"Northern pike fishing — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/northern-pike/"},
      {t:"Pike vs muskie ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/pike-musky/"},
      {t:"Northern pike — Illinois DNR", u:"https://dnr.illinois.gov/"}
    ]
  },
  redfish:{
    tagline:"The bulldog of the flats — a copper-bronze inshore brawler with a signature tail spot, equally at home tailing in inches of marsh grass or bruising the surf as a giant bull.",
    sections:[
      { h:"Identification",
        body:"<i>Sciaenops ocellatus</i>, the red drum. Coppery-bronze to reddish above, white-bellied, with a blunt nose and a down-turned, <b>inferior mouth</b> built for rooting the bottom. The hallmark is one (sometimes several) <b>black eyespot(s) at the base of the tail</b>. Young inshore fish are the 'slot' or 'rat' reds; mature fish become the huge nearshore <b>'bull reds'</b>. Known regionally as red drum, channel bass or spottail bass." },
      { h:"Biology &amp; life history",
        body:"Reds spawn in late summer and fall near passes and inlets — males produce the species' namesake <b>drumming</b> sound with their swim bladder. The young settle into estuaries and marshes and live <b>inshore for several years</b> as slot-size fish, then mature and move to nearshore waters as bulls. They are remarkably <b>long-lived</b>, reaching 30–40+ years, so the biggest bulls are very old, highly fecund spawners." },
      { h:"Behavior &amp; seasonal patterns",
        body:"Inshore reds root the bottom for crabs and shrimp over grass flats, oyster bars and marsh edges, and on a low tide they famously <b>'tail'</b> — head down, tail waving above the surface as they feed. They're strongly <b>tide-driven</b>, feeding hardest on moving water. In fall, big bulls stack up in the passes, beaches and surf to spawn; in winter, schools of slot reds pile into clear, shallow water and sun themselves on warm afternoons." },
      { h:"Diet &amp; forage",
        body:"Bottom-oriented opportunists — <b>shrimp, crabs, mullet and other baitfish</b>. That diet drives the classic lures: gold weedless spoons (mimicking a fleeing baitfish), soft-plastic shrimp and paddle-tails worked low, and natural baits like live shrimp and cut mullet fished on the bottom. Reds will also crush topwater in low light." }
    ],
    regions:[
      { name:"Florida (year-round sight-fishing)",
        body:"Among FishDex's covered states, Florida is the redfish jewel, on both coasts. The <b>Mosquito Lagoon and Indian River</b> on the Atlantic side are world-famous for sight-fishing big reds in clear, shallow water, while the Gulf grass flats and mangrove shorelines of <b>Tampa Bay, Charlotte Harbor</b> and the Everglades hold endless slot fish. A premier light-tackle and fly sight-fishery, fishable all year." },
      { name:"North Carolina (red drum is the state fish)",
        body:"North Carolina takes its 'old drum' seriously — it's the state saltwater fish. Trophy <b>bull reds</b> gather in <b>Pamlico Sound and around the Outer Banks</b> in fall (catch-and-release giants), while slot reds work the marshes, creeks and surf from spring through fall. The Atlantic's northern stronghold for the species." },
      { name:"The Gulf Coast at large",
        body:"Beyond Florida, the <b>Louisiana marsh</b> is the redfish mecca — vast, fertile estuaries loaded with slot and bull reds — with Texas, Mississippi and Alabama all strong. Across the Gulf, the redfish is <i>the</i> inshore gamefish." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — read the tide",
        body:`<p>Redfish are a tide-and-structure game. Fish moving water around grass, oysters and marsh edges; in fall, switch gears for the big bulls in the passes and surf.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Spring</td><td>Warming flats, oyster bars &amp; marsh edges; spreading out to feed</td><td>Gold weedless spoon, paddle-tail on a jighead, popping cork + shrimp, live shrimp</td></tr>
        <tr><td class="s">Summer</td><td>Flats early &amp; late; <b>tailing</b> on shallow low tides; mangrove edges</td><td>Sight-fishing soft plastics &amp; flies; topwater at dawn; live/cut bait on the bottom</td></tr>
        <tr><td class="s">Fall</td><td><b>Bull-red run</b> — giants stack in passes, inlets, beaches &amp; surf to spawn</td><td>Cut mullet/crab &amp; big soft plastics on heavier gear; circle hooks; release the bulls</td></tr>
        <tr><td class="s">Winter</td><td>Schools in clear, shallow backwater &amp; deeper holes; sunning on warm afternoons</td><td>Slow soft plastics &amp; live/dead shrimp; sight-fish the gin-clear schools on calm days</td></tr></table>
        <h3>Tide, weather &amp; light</h3>
        <p><b>Moving tides</b> are everything — a falling tide that pulls bait off the flats and concentrates fish (and exposes tailers) is prime, and reds set up to ambush on current edges, oyster bars and creek mouths. Wind and water clarity govern sight-fishing; a calm, clear morning is ideal for spotting tails and wakes. In winter, fish the warmest part of the day, when schools move onto shallow dark bottom to soak up heat.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Inshore spinning</h3><p style="margin:4px 0">A 7'–7'6" medium spinning rod with a 2500–4000 reel, <b>10–20 lb braid and a 20–30 lb fluorocarbon leader</b>. Throw gold weedless spoons, paddle-tail soft plastics on jigheads, a popping cork with shrimp or a soft plastic, topwater walkers, and live/cut bait on a knocker or fish-finder rig.</p><div class="pick"><b>Solid picks:</b> Penn Battle / Shimano Stradic reels on a St. Croix Mojo Inshore or similar rod.</div></div>
        <div class="gearbox"><h3>🎣 Bull reds &amp; 🐟 fly</h3><p style="margin:4px 0">For bulls in passes/surf, step up to 5000–6000 reels or surf gear, 30–50 lb braid, heavy leader and circle hooks with cut mullet or crab. On the fly, an <b>8–9wt</b> with crab, shrimp and baitfish patterns (Clouser, Merkin, spoon fly) is the tailing-redfish dream.</p></div>
        <div class="fightline"><span class="stars">★★★★★</span><b>Fight: 5/5 — updated. Pure bulldog.</b></div>
        <p>We bumped the redfish to 5/5: even a slot fish fights like something twice its size, boring down with broad shoulders and a relentless, drag-peeling pull, and a big bull red is a long, grinding battle that tests your gear and your arms. There aren't dramatic jumps — just dogged, powerful runs that keep coming. Few inshore fish are more satisfying to land.</p>` },
      { h:"Relatives &amp; variants — the drum family",
        body:`<p>The red drum belongs to the croaker and drum family <b>Sciaenidae</b>, alongside the black drum, the spotted seatrout (specked trout) and the croakers — many of which 'drum' with their swim bladders. The signature <b>tail eyespot</b> is thought to fool predators into striking the tail instead of the head, and the number of spots varies — some reds sport several ocelli down the flank. Its many regional names — red drum, redfish, channel bass, spottail bass — all describe the same fish. <span class="src">Don't confuse the inshore reds with the freshwater drum found in rivers and lakes — different fish, same family.</span></p>` }
    ],
    conservation:"Redfish are managed with tight <b>slot limits</b> (keep a mid-size fish, release everything above the slot) precisely to protect the big bull spawners — the population famously rebounded from 1980s overharvest after slot rules and gamefish status. Release bulls in the water when you can, support them horizontally, and revive them fully; they're old, irreplaceable breeders. Always check the current state slot and bag limits before keeping one.",
    refs:[
      {t:"Red drum — Wikipedia", u:"https://en.wikipedia.org/wiki/Red_drum"},
      {t:"Redfish (red drum) fishing — Take Me Fishing", u:"https://www.takemefishing.org/fish/saltwater-fish/red-drum/"},
      {t:"Red drum — Florida FWC", u:"https://myfwc.com/fishing/saltwater/recreational/red-drum/"},
      {t:"Red drum — NC Wildlife / Marine Fisheries", u:"https://www.deq.nc.gov/about/divisions/marine-fisheries"}
    ]
  },
  snook:{
    tagline:"Florida's explosive inshore gamefish — a structure-loving, line-burning ambush predator with a jutting jaw, a razor gill plate, and a famous sensitivity to cold.",
    sections:[
      { h:"Identification",
        body:"<i>Centropomus undecimalis</i>, the common snook. A sleek, silvery body with a distinctly <b>sloping forehead</b>, a protruding lower jaw, and the unmistakable mark: a bold <b>black lateral line</b> running the full length of the body. The rear gill-plate edge is <b>razor-sharp</b> — it will cut leader and fingers. Florida has several snook species, but the common snook is the large, primary gamefish, reaching 40+ pounds." },
      { h:"Biology &amp; life history",
        body:"Snook spawn in summer in aggregations near passes, inlets and beaches. Most striking is their biology: they are <b>protandric hermaphrodites</b> — most begin life as males, and some transform into females as they grow large, so the biggest snook are typically females (a key reason to protect them). They are <b>cold-intolerant</b>: hard freezes cause large snook kills, which is what confines them to subtropical Florida and the warm Gulf." },
      { h:"Behavior &amp; seasonal patterns",
        body:"Snook are ambush predators that relate <b>tightly to structure and current</b> — mangrove roots, dock pilings, bridge fenders, jetties, passes and beaches — using current edges and shadow lines to wait for bait. They make a clear seasonal migration: out to the <b>passes and beaches to spawn in summer</b>, then back into the sheltered <b>backcountry rivers, creeks and canals for warmth in winter</b>. The night bite around dock and bridge lights is legendary." },
      { h:"Diet &amp; forage",
        body:"A current-feeding predator that inhales <b>baitfish</b> (pilchards, mullet, pinfish, sardines), shrimp and crabs with a big bucket of a mouth, usually ambushing prey swept past its structure by the tide. Match the local bait: free-lined live pilchards or mullet, shrimp, and lures that imitate fleeing baitfish — jigs, paddle-tails, twitchbaits and topwater." }
    ],
    regions:[
      { name:"Florida (essentially the entire range)",
        body:"Within FishDex's covered states, snook are a <b>Florida fish</b>, flourishing on both coasts: the <b>Indian River Lagoon</b>, the <b>Ten Thousand Islands and Everglades</b> backcountry, <b>Tampa Bay</b>, the <b>Sanibel/Boca Grande passes</b>, and the beaches in summer. In winter they pile into rivers, canals, basins and warmwater refuges (power-plant outflows, springs). A flagship inshore gamefish with strict slot limits and closed seasons." },
      { name:"The subtropical edge (cold-limited)",
        body:"Snook range is policed by temperature — they're expanding slowly northward with warming trends but get knocked back by hard freezes, and they're <b>absent from the cooler states</b> (Missouri, Arkansas, Illinois, and the cooler waters of North Carolina). This is a tropical-to-subtropical fish, and cold is its boundary." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — current, structure &amp; lights",
        body:`<p>Snook fishing means fishing structure on a moving tide, and following the fish from winter rivers to summer passes and beaches. Fish ambush points and be ready to turn a fish out of the pilings instantly.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Spring</td><td>Staging &amp; feeding up, moving from winter haunts toward the passes</td><td>Live bait (pilchards, shrimp), jigs &amp; paddle-tails, twitchbaits around structure</td></tr>
        <tr><td class="s">Summer</td><td><b>Prime</b> — spawning at passes, inlets &amp; beaches; night bite at dock/bridge lights</td><td>Beach sight-fishing with flies &amp; jigs; free-lined live pilchards/mullet; topwater &amp; flies in the lights</td></tr>
        <tr><td class="s">Fall</td><td>Transition back to the backcountry, gorging on the <b>mullet run</b></td><td>Big topwater walkers, swimbaits &amp; live mullet along beaches &amp; inlets</td></tr>
        <tr><td class="s">Winter</td><td>Sluggish in warm refuges — rivers, canals, deep basins, springs &amp; outflows</td><td>Slow soft plastics &amp; live shrimp on warm afternoons; <b>don't fish them hard in a cold snap</b></td></tr></table>
        <h3>Tide, light &amp; weather</h3>
        <p>Snook ambush on <b>moving tides</b>, sitting in the current shadow of structure and picking off bait swept past — a falling tide that funnels bait through a pass or out of the mangroves is prime. The <b>night bite around dock and bridge lights</b> is a signature snook game, as fish stack in the shadow line and pick off illuminated bait. In winter, fish the warmest part of warm days and back off entirely during cold fronts — stressed snook in cold water die.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Inshore spinning + a heavy leader</h3><p style="margin:4px 0">A 7'–7'6" medium-heavy spinning rod, 3000–5000 reel, 15–30 lb braid, and a <b>heavy 30–50 lb fluorocarbon leader</b> — non-negotiable, because snook wrap structure and their gill plate slices light leader. Free-line live pilchards, mullet or shrimp; throw jigs/paddle-tails, twitchbaits (MirrOlure) and topwater walkers around structure and lights.</p><div class="pick"><b>Solid picks:</b> Shimano Stradic / Penn Battle reels on a St. Croix Mojo Inshore-class rod.</div></div>
        <div class="gearbox"><h3>🐟 Fly</h3><p style="margin:4px 0">An 8–9wt with baitfish and shrimp patterns shines around lights and on the beaches; keep that heavy bite leader.</p></div>
        <div class="fightline"><span class="stars">★★★★★</span><b>Fight: 5/5 — explosive and unforgiving.</b></div>
        <p>A snook eats with a violent thump and instantly bolts <b>back into the structure</b> it lives in — a piling, a dock, a mangrove root — with bulldogging head-shakes and slashing jumps. The fight is won or lost in the first two seconds: you must turn the fish and pull it away from the cover before it cuts you off on a barnacled piling or its own razor gill plate. Pound for pound, one of the most thrilling inshore fish to hook.</p>` },
      { h:"Relatives &amp; biology notes",
        body:`<p>Florida hosts several members of the snook genus <b>Centropomus</b> — the common snook (by far the largest and the primary target), plus the smaller fat snook, swordspine snook and tarpon snook. Their <b>protandric</b> sex change (male first, female later with size) means the trophy fish are usually females, which is exactly why slot limits and closed seasons that protect big fish matter so much for the population. <span class="src">Handle snook for release with wet hands, support them horizontally, and never touch the gills.</span></p>` }
    ],
    conservation:"Snook are tightly managed in Florida — <b>slot limits, closed seasons</b> (covering the summer spawn and the cold winter months), gamefish status (no commercial sale), and cold-kill harvest closures after major freezes. Release fish carefully: don't touch the gills or strip the slime, support the body horizontally, and revive fully. Protect the big females, and never stress or fish for snook during a hard cold snap, when they're already fighting to survive. Always check current FWC regulations before keeping one.",
    refs:[
      {t:"Common snook — Wikipedia", u:"https://en.wikipedia.org/wiki/Common_snook"},
      {t:"Snook fishing — Take Me Fishing", u:"https://www.takemefishing.org/fish/saltwater-fish/snook/"},
      {t:"Snook — Florida FWC", u:"https://myfwc.com/fishing/saltwater/recreational/snook/"},
      {t:"Snook biology &amp; tactics — Florida Sportsman", u:"https://www.floridasportsman.com/"}
    ]
  }
};

</script>
<script>
(function(){
  const TMETA={Freshwater:"--TFreshwater",Saltwater:"--TSaltwater",Coldwater:"--TColdwater",Warmwater:"--TWarmwater",Inshore:"--TInshore",Reef:"--TReef",Bluewater:"--TBluewater"};
  function fishTypes(f){const t=[];t.push(f.water.includes("saltwater")?"Saltwater":"Freshwater");
    if(["Trout","Char","Salmon"].includes(f.family))t.push("Coldwater");
    else if(!["Inshore","Nearshore","Offshore"].includes(f.family))t.push("Warmwater");
    if(f.family==="Inshore")t.push("Inshore");else if(f.family==="Nearshore")t.push("Reef");else if(f.family==="Offshore")t.push("Bluewater");
    return t.slice(0,3);}
  function badges(f){return fishTypes(f).map(t=>`<span class="tbadge" style="background:var(${TMETA[t]||'--accent'})">${t}</span>`).join("");}
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const params=new URLSearchParams(location.search);
  let id=params.get("id"); let f=FISH.find(x=>x.id===id); if(!f) f=FISH[0];
  id=f.id; document.title="FishDex — "+f.name;
  document.getElementById("mapbtn").href="app.html?fish="+id;

  // jump dropdown
  const jump=document.getElementById("jump");
  FISH.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(x=>{const o=document.createElement("option");o.value=x.id;o.textContent=x.name;if(x.id===id)o.selected=true;jump.appendChild(o);});
  jump.onchange=()=>{location.href="fish.html?id="+jump.value;};

  const P=(typeof PROFILE!=="undefined")?PROFILE[id]:null;
  const tac=(typeof TACTICS!=="undefined")?TACTICS[id]:null;
  const waters=(typeof WATERS!=="undefined"?WATERS:[]).filter(w=>w.species.includes(id));
  const months=f.bestMonths.map(m=>MONTHS[m-1]).join(", ");
  const tod=f.tod.map(t=>t[0].toUpperCase()+t.slice(1)).join(", ");

  let html=`
    <div class="hero">
      <div><img class="photo" id="photo" alt="${f.name}"><div style="font-size:10px;color:var(--muted);margin-top:4px" id="credit"></div></div>
      <div>
        <div class="eyebrow">${f.family}</div>
        <h1>${f.name}</h1>
        <div class="sci">${f.sci}</div>
        <div class="badges">${badges(f)}</div>
        ${P?`<div class="tagline">${P.tagline}</div>`:""}
        <div class="fielddata">
          <div class="fd"><b>Fight</b> ${"★".repeat(f.fight)}${"☆".repeat(5-f.fight)}</div>
          <div class="fd"><b>World record</b> ${f.record} lb</div>
          <div class="fd"><b>Water temp</b> ${f.tempF}</div>
          <div class="fd"><b>Diet</b> ${f.diet}</div>
          <div class="fd"><b>Best months</b> ${months}</div>
          <div class="fd"><b>Best time</b> ${tod}</div>
        </div>
      </div>
    </div>
    <section><h2>Overview</h2><p>${f.habitat} ${f.tip}</p></section>`;

  if(P&&P.sections) P.sections.forEach(s=>{ html+=`<section><h2>${s.h}</h2><div class="sbody">${s.body}</div></section>`; });

  if(P&&P.regions&&P.regions.length){
    html+=`<section><h2>Regional profiles — same fish, different worlds</h2>`;
    P.regions.forEach(r=>{ html+=`<div class="region"><h3>${r.name}</h3><p style="margin:0">${r.body}</p></div>`; });
    html+=`</section>`;
  }

  // Deep angling detail (seasonal/weather playbook, gear, flies, subspecies, fight)
  if(P&&P.extra) P.extra.forEach(s=>{ html+=`<section><h2>${s.h}</h2><div class="sbody">${s.body}</div></section>`; });

  // Angling (from tactics)
  if(tac){
    const row=(l,v)=>v?`<div class="howcard"><b>${l}</b> ${v}</div>`:"";
    html+=`<section><h2>How to catch it</h2><div class="howgrid">${row("🪱 Bait",tac.bait)+row("🎣 Gear",tac.gear)+row("🪶 Fly",tac.fly)+row("📅 Season",tac.season)}</div></section>`;
  } else {
    html+=`<section><h2>How to catch it</h2><p><b>Top producers:</b> ${f.baits.join(", ")}.</p></section>`;
  }

  // Where to catch it (waters grouped by region)
  if(waters.length){
    const byReg={}; waters.forEach(w=>{(byReg[w.region]=byReg[w.region]||[]).push(w);});
    html+=`<section><h2>Where to catch it</h2><p style="color:var(--muted);font-size:13px">Named destination waters in FishDex's covered states. Open the map for ranges, live flows & access.</p><div class="waters-by-region">`;
    Object.keys(byReg).sort().forEach(reg=>{ html+=`<div class="wreg">${reg}</div><div class="wlist">${byReg[reg].map(w=>`<span class="wpill">${w.name}</span>`).join("")}</div>`; });
    html+=`</div><div class="cta"><a class="btn" href="app.html?fish=${id}">🗺️ See its range & waters on the map →</a></div></section>`;
  } else {
    html+=`<section><h2>Where to catch it</h2><div class="note">No named waters in FishDex's covered states yet (Missouri, Florida, North Carolina, Arkansas, Illinois) — its range lies outside them. More regions coming.</div></section>`;
  }

  if(!P){ html+=`<section><div class="note">📋 A deep, fully-researched profile for ${f.name} (biology, behavior, regional differences, science & sources) is on the way. For now, this page shows the field guide, tactics and waters we have.</div></section>`; }

  if(P&&P.conservation) html+=`<section><h2>Conservation & handling</h2><p>${P.conservation}</p></section>`;
  if(P&&P.refs&&P.refs.length) html+=`<section><h2>References</h2><ul class="refs">${P.refs.map(r=>`<li><a href="${r.u}" target="_blank" rel="noopener">${r.t} ↗</a></li>`).join("")}</ul></section>`;

  document.getElementById("content").innerHTML=html;
  document.getElementById("disc").textContent="Educational species profile. Ranges, seasons and regional notes are general and vary year to year — confirm local regulations before fishing. © "+new Date().getFullYear()+" FishDex.";

  // photo via Wikipedia REST
  const title=(typeof WIKI!=="undefined")?WIKI[id]:null;
  if(title){ fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title))
    .then(r=>r.ok?r.json():Promise.reject()).then(d=>{ let src=(d.thumbnail&&d.thumbnail.source)||(d.originalimage&&d.originalimage.source); if(src){src=src.replace(/\/\d+px-/,"/640px-");const im=document.getElementById("photo");im.src=src;document.getElementById("credit").textContent="Photo: Wikipedia / "+(d.title||f.name);} }).catch(()=>{}); }
})();
</script>
</body>
</html>
