        body:"This is where 'a different animal' really shows. Northern-Illinois <b>rivers</b> — the Kankakee, Fox, Rock and Middle Fork Vermilion — hold strong stream smallmouth, but the longer, colder winters mean fish go deeper and more dormant, and the spring shallow run keys on water climbing into the 50s°F. The game-changer is <b>Lake Michigan</b>: the invasion of the round goby turned the lake and its harbors (Chicago, Waukegan) into a <b>trophy smallmouth</b> factory — fish gorge on protein-rich gobies and alewife and grow far larger than any Ozark stream fish, holding on rock, breakwalls and harbor structure and following water temperature in and out. Same species, wildly different size class, forage and seasonal rhythm than a southern Arkansas creek." }
    ],
    conservation:"Smallmouth need cool, clean, well-oxygenated water and are sensitive to siltation, warming and over-harvest — they grow slowly, so a big stream fish is old. Many premier rivers carry special regulations (length minimums, reduced creel, or catch-and-release-only stretches). Handle gently, keep them wet, and release the big females, especially during the spring spawn.",
    refs:[
      {t:"Smallmouth bass — Wikipedia (biology & spawning)", u:"https://en.wikipedia.org/wiki/Smallmouth_bass"},
      {t:"Seasonal Habits of the Smallmouth Bass — BassResource", u:"https://www.bassresource.com/fish_biology/smallmouth-seasonal-habits.html"},
      {t:"Ontogenetic & Seasonal Diet Shifts of Smallmouth Bass in an Ozark Stream — J. Freshwater Ecology", u:"https://www.tandfonline.com/doi/abs/10.1080/02705060.2008.9664562"},
      {t:"Stream Smallmouth Bass Management Plan — Arkansas Game & Fish Commission", u:"https://www.agfc.com/wp-content/uploads/2023/04/6-Smallmouth_Bass_Species_Management_Plan_2021-2029.pdf"},
      {t:"Smallmouth Bass — Missouri Department of Conservation field guide", u:"https://mdc.mo.gov/discover-nature/field-guide/smallmouth-bass"}
    ]
  },
  rainbow:{
    extra:[
      { h:"Season &amp; weather playbook — flies, lures &amp; bait",
        body:`<p>Rainbows feed subsurface most of the time, so nymphs and (on tailwaters) midges &amp; scuds do the heavy lifting; dries are the prize when fish are rising. Spin anglers do well with small flash and bait, especially on stocked fish.</p>
        <table class="pb"><tr><th>Season</th><th>What's happening</th><th>Flies → &nbsp;|&nbsp; Spin/bait</th></tr>
        <tr><td class="s">Winter</td><td>Slow, deep; tailwaters &amp; spring creeks stay prime while freestones sleep</td><td><b>Flies:</b> zebra midge, RS2, scuds, sowbugs, eggs (tiny, deep, slow). <b>Spin:</b> small spinner crawled slow; float + PowerBait/eggs for stockers</td></tr>
        <tr><td class="s">Spring</td><td>Spawn (rainbows are spring spawners) &amp; runoff — high, often off-color water</td><td><b>Flies:</b> eggs, San Juan worm, stonefly nymphs, BWO on cloudy days. <b>Spin:</b> inline spinner, spoon, drifted bait in the seams</td></tr>
        <tr><td class="s">Summer</td><td>Bug season — best hatches &amp; dry-fly fishing, early &amp; late; fish riffles &amp; oxygenated water</td><td><b>Flies:</b> caddis, PMD, terrestrials (hopper-dropper), midday nymph rig. <b>Spin:</b> small Rooster Tail / Panther Martin, Kastmaster</td></tr>
        <tr><td class="s">Fall</td><td>Pre-winter feed; big rainbows key on brown-trout eggs &amp; baitfish</td><td><b>Flies:</b> BWO, October caddis, egg patterns, streamers (Woolly Bugger, sculpins). <b>Spin:</b> spoon, spinner, streamer under a bubble</td></tr></table>
        <div class="callout2"><b>Stocked-trout reality:</b> most put-and-take rainbows are caught on <b>PowerBait, salmon eggs or nightcrawlers</b> under a float or on a slip-sinker rig, and on small inline spinners and spoons — they key on easy, bright, scented targets, not hatch-matching.</div>
        <h3>Weather &amp; water</h3>
        <p><b>Cloudy, cool days</b> bring the best BWO and emerger fishing and embolden fish into the open. <b>Bright sun &amp; low clear water</b> push trout to depth and shade — go small and natural, lengthen and lighten tippet, fish nymphs deep. <b>High or rising water</b> (rain, snowmelt, dam generation) favors eggs, worms and streamers swung through the color line. On tailwaters, the <b>generation schedule</b> matters more than the sky — read the flows before you go.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🐟 Fly — the classic approach</h3><p style="margin:4px 0">A <b>9' 5-weight</b> is the do-everything trout rod (dries, nymphs, small streamers). Drop to a 3–4wt for small creeks and delicate dries; step up to a 6wt for big rivers, wind and streamers. For nymphing, a 10'–11' 2–3wt <b>Euro-nymph</b> rod is deadly. Big lake-run rainbows and steelhead need a 7–8wt with a real sealed drag.</p><div class="pick"><b>Solid picks:</b> Orvis Clearwater, Echo Base, Redington Classic Trout (rods); Orvis Hydros / Lamson Liquid (reels). <b>Line:</b> weight-forward floating; 9' leader tapered to 4X–6X.</div></div>
        <div class="gearbox"><h3>🎣 Spin — light &amp; ultralight</h3><p style="margin:4px 0">A 6'–7' light or ultralight spinning rod with a 1000–2500 reel and <b>2–6 lb</b> mono or fluorocarbon. Throw 1/16–1/8 oz inline spinners (Mepps, Rooster Tail, Panther Martin) and small spoons (Kastmaster, Little Cleo), or fish bait under a float / on a light slip rig.</p></div>
        <div class="fightline"><span class="stars">★★★★☆</span><b>Fight: 4/5 — acrobatic speedster.</b></div>
        <p>Rainbows are the showmen of trout — fast runs and <b>repeated jumps</b>, often cartwheeling across the surface the instant they're hooked. Stream fish punch above their size; lake-run and steelhead-strain rainbows are in another class entirely, capable of long, reel-screaming runs. Keep the rod tip up, let a smooth drag do the work, and bow to jumps on light tippet.</p>` },
      { h:"Subspecies, strains &amp; the steelhead connection",
        body:`<p>Rainbow trout (<i>Oncorhynchus mykiss</i>) are wildly variable. The wide-ranging native forms are the <b>coastal rainbow</b> and the inland <b>redband</b> trout (Columbia Basin, Great Basin and McCloud River redbands), the latter often vividly colored with a brick-red stripe. The <b>sea-run form is the steelhead</b> — same species, but anadromous, growing huge and fighting ferociously after years at sea (Great Lakes "steelhead" are the lake-run equivalent). Two famous strains shape fisheries: <b>McCloud River</b> stock founded most of the world's hatchery rainbows, and the big-water <b>Kamloops</b> strain grows trophy lake rainbows. The hatchery rainbows stocked across the country are generally domesticated mixes selected for fast growth — which is why they behave so differently from a wild, hatch-keyed stream fish. <span class="src">Browns and brook trout are different species entirely — see their profiles and the Species ID guide.</span></p>` }
    ],
    tagline:"A native Pacific trout and the most widely stocked trout on earth — caught everywhere from a knee-deep Smoky Mountain creek to a giant tailwater from a jet boat.",
    sections:[
      { h:"Identification",
        body:"Oncorhynchus mykiss — silvery flanks with a <b>pink-to-red lateral band</b>, small black spots scattered over the back, sides and (importantly) the whole tail, and a <b>white mouth and gums</b> (a cutthroat shows a red-orange slash under the jaw). The sea-run / lake-run migratory form is the <b>steelhead</b> — chrome-bright, bigger, and built to roam to salt or big lakes and back to spawn." },
      { h:"Biology & life history",
        body:"A <b>spring spawner</b> — females cut gravel redds in cool, oxygen-rich riffles (often as water warms into the upper-40s–50s°F). Native only to Pacific drainages and (now) naturalized or stocked across the continent. They favor <b>50–62°F</b> water; warmer than that stresses them, colder slows them. Growth depends entirely on food and water: a wild headwater fish may top out at 8–10 inches, while a tailwater rainbow gorging on scuds and shad can push past 10 lb." },
      { h:"Wild vs. stocked — why it changes everything",
        body:"This is the rainbow's defining split. <b>Wild</b> (stream-born) rainbows are perfect-finned, jewel-bright, wary, and selective — they eat what the river serves and demand a drag-free drift and stealth. <b>Stocked</b> fish are hatchery-raised put-and-take trout — often worn fins, naive and aggressive at first, happy to chase a spinner or take dough bait, then quickly educated. The same species, but a wild Smoky Mountain rainbow and a freshly-stocked trout-park rainbow are completely different opponents — which is why local tactics matter more than any general rule." },
      { h:"Behavior & feeding",
        body:"Rainbows are <b>drift feeders</b>: they hold on current seams, riffle edges, and behind structure, letting the conveyor belt of food come to them — so dead-drift presentations rule. In lakes and tailwaters they cruise and sip scuds, sowbugs and midges. They feed through more of the day than wary browns and key on whatever's most available: nymphs and emergers most of the year, dries during a hatch, terrestrials in summer, and eggs behind spawning fish." }
    ],
    regions:[
      { name:"North Carolina — Great Smoky Mountains & southern Appalachians (the small-stream end)",
        body:"Here rainbows live in tight, tumbling <b>freestone creeks</b> — wild, stream-born fish (naturalized, not native) sharing the water with native brook trout up high. This is intimate fishing: hike-in, a <b>2–4 weight</b>, a dry or dry-dropper bow-cast into pocket water, and a premium on stealth and reading current. Delayed-Harvest stretches and the Cherokee tribal trophy waters add stocked fish, but the soul of it is wild trout in small water. <b>This is the polar opposite of the White River.</b>" },
      { name:"Arkansas — White River system tailwaters (the big-water end)",
        body:"The other extreme entirely: enormous, frigid <b>tailwaters</b> below Bull Shoals, Norfork and Greers Ferry dams, fished from <b>drift boats and jet boats</b>, holding tens of thousands of stocked and holdover rainbows that grow fat on scuds, sowbugs and sculpins. The food is crustaceans and midges, not mayfly hatches; the water level is dictated by dam <b>generation</b>, not weather. A Smoky Mountain angler stalking a 9-inch wild rainbow and a guide running a jet boat to drift sowbugs on the White are doing the same sport in different universes." },
      { name:"Missouri — trout parks, Taneycomo & a few wild gems",
        body:"Missouri is mostly <b>put-and-take</b>: the four trout parks (Bennett Spring, Roaring River, Montauk, Maramec Spring) stock daily and draw crowds, fished with flies, micro-jigs and dough bait under a daily tag. <b>Lake Taneycomo</b> (the Table Rock tailwater at Branson) grows bigger holdovers on scuds and midges. And there are rare treasures — <b>Crane Creek</b> holds wild, stream-bred McCloud-strain rainbows descended from the original 1880s stockings, and the blue-ribbon <b>North Fork of the White</b> has self-sustaining wild fish." },
      { name:"Illinois — Lake Michigan steelhead & stocked lakes",
        body:"No wild stream trout here. The headline is <b>Lake Michigan steelhead</b> — sea-run-style rainbows that run the harbors, piers and tributaries from fall through spring, caught on spawn sacs, spoons and flies. Away from the lake, IDNR runs a <b>catchable-trout put-and-take</b> program, stocking rainbows into dozens of lakes and ponds for spring and fall seasons — a fun, accessible bite, but a managed one, not a wild fishery." }
    ],
    conservation:"Wild and holdover trout are slow to replace — fish barbless, keep them wet, and release them, especially in wild and special-regulation water. Stocked put-and-take fish are meant for the table. East of the Rockies rainbows are non-native and can out-compete native brook trout, so high headwater brookie streams deserve extra care.",
    refs:[
      {t:"Rainbow trout — Wikipedia", u:"https://en.wikipedia.org/wiki/Rainbow_trout"},
      {t:"Rainbow Trout & Steelhead — National Wildlife Federation", u:"https://www.nwf.org/Educational-Resources/Wildlife-Guide/Fish/Rainbow-Trout-Steelhead"},
      {t:"Trout species of the Smokies — Fly Fishing the Smoky Mountains", u:"https://www.flyfishingsmokymountains.com/species/"},
      {t:"Lake Taneycomo flies & tactics — Missouri Trout Hunter", u:"https://www.missouritrouthunter.com/lake-taneycomo.html"}
    ]
  },
  brown:{
    extra:[
      { h:"Season &amp; weather playbook — flies, lures &amp; bait",
        body:`<p>Browns are the wariest, most predatory trout — the big ones turn nocturnal and eat other fish. Hatch-match like a rainbow for numbers, but to catch a <i>trophy</i> brown, think low light, big meals, and streamers.</p>
        <table class="pb"><tr><th>Season</th><th>What's happening</th><th>Flies → &nbsp;|&nbsp; Spin/bait</th></tr>
        <tr><td class="s">Winter</td><td>Slow &amp; deep; tailwaters fish best — browns hold in soft water</td><td><b>Flies:</b> midges, scuds, sowbugs, small streamers fished slow. <b>Spin:</b> slow minnow plug, drifted bait</td></tr>
        <tr><td class="s">Spring</td><td>Pre-runoff feeding then high water; good nymphing &amp; streamer fishing</td><td><b>Flies:</b> BWO, stoneflies, San Juan worm, streamers in the color line. <b>Spin:</b> inline spinner, jerkbait, minnow plug</td></tr>
        <tr><td class="s">Summer</td><td>Hatches plus the <b>terrestrial &amp; night game</b> — the biggest browns feed after dark</td><td><b>Flies:</b> caddis, PMD, hoppers/ants; after dark — mouse patterns, big dries, Hex. <b>Spin:</b> Rapala-style minnow, spinner, low-light topwater</td></tr>
        <tr><td class="s">Fall</td><td><b>Spawn season</b> — browns turn aggressive &amp; territorial; big males move and attack intruders</td><td><b>Flies:</b> big articulated streamers (Sex Dungeon, Sculpzilla), eggs, October caddis. <b>Spin:</b> large jerkbaits &amp; spoons — <b>don't fish over redds</b></td></tr></table>
        <h3>Weather &amp; light — fish the gloom</h3>
        <p>Browns are famously <b>light-shy</b>: overcast skies, dawn, dusk and night are when they let their guard down and the big fish hunt. <b>High or stained water</b> after rain is prime time to swing or strip big streamers — reduced visibility makes trophy browns bold. <b>Bright, low, clear conditions</b> make them maddeningly selective: long fine tippet, small natural flies, downstream drag-free presentations, and a careful, hidden approach. A falling barometer ahead of a front often triggers the streamer bite.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🐟 Fly — two outfits</h3><p style="margin:4px 0">For dries &amp; nymphs, the same <b>9' 5wt</b> (or a Euro-nymph 10' 3wt) as for rainbows. For trophy hunting, build a dedicated <b>streamer stick — a 6–7wt</b> with a sink-tip or full sinking line to chuck big articulated flies and move them fast; a stout 0X–3X (8–16 lb) leader. Night-fishing mouse patterns also wants the 6wt.</p><div class="pick"><b>Solid picks:</b> Orvis Clearwater / Recon, Sage Foundation (rods); WF floating for dries, a sink-tip (e.g., 200–300 gr) for streamers.</div></div>
        <div class="gearbox"><h3>🎣 Spin</h3><p style="margin:4px 0">A 6'6"–7' light/medium-light spinning rod, 4–8 lb line. Browns love a twitched <b>minnow plug</b> (floating/jerkbait Rapala), inline spinners and small spoons — fished on the swing and twitch-pause, especially in low light.</p></div>
        <div class="fightline"><span class="stars">★★★★☆</span><b>Fight: 4/5 — dogged bruiser.</b></div>
        <p>Where a rainbow jumps, a brown <b>bulldogs</b> — deep, heavy headshakes and a determined bolt for the nearest log, undercut bank or weed bed. Big browns are powerful and use cover ruthlessly, so don't give line you don't have to; turn the fish and keep it out of the wood. Hooked at night, they fight even harder and dirtier.</p>` },
      { h:"Strains &amp; variants — von Behr, Loch Leven &amp; sea trout",
        body:`<p>Brown trout (<i>Salmo trutta</i>) aren't split into formal subspecies in North America, but they trace to distinct European strains that still flavor our fisheries. The <b>German "von Behr"</b> strain is the classic riverine fish — golden-brown, heavily spotted with red and black, structure-loving. The Scottish <b>Loch Leven</b> strain runs more silvery and slender, adapted to lakes. The <b>sea trout</b> is the same species in its anadromous (sea-run) form, returning from salt to spawn — silver and large. Browns also famously produce the <b>"tiger trout"</b>, a striking, sterile, vermiculated hybrid with brook trout. Wherever they live, browns are the trout most likely to grow huge and predatory — which is exactly why the trophy game revolves around streamers and darkness. <span class="src">Brown spawning runs in fall make tailwaters like the White, Norfork and Little Red trophy destinations — see the regional profiles.</span></p>` }
    ],
    tagline:"The wily European import — the wariest fish in the river, the most nocturnal, and the species behind nearly every trophy-trout headline.",
    sections:[
      { h:"Identification",
        body:"Salmo trutta — buttery gold-to-brown flanks with <b>black AND red/orange spots, each often ringed by a pale halo</b>, fading to a creamy belly; the tail is squarish and largely unspotted. Big males develop a hooked lower jaw (kype) in fall. Unlike our other trout (Oncorhynchus and the brook-trout char), the brown is a true <i>Salmo</i> — a non-native, naturalized European transplant." },
      { h:"Biology & life history",
        body:"Browns are <b>fall spawners</b> (roughly October–December), cutting gravel redds as water cools — which is why fall is the trophy window and why wading anglers should avoid disturbing redds. They're long-lived and grow large where it's cold and food is rich: the biggest browns live in <b>dam tailwaters and big reservoirs</b> where cold, stable water meets abundant forage. Introduced from Europe in the 1880s, they're now a naturalized mainstay of cold water across the country." },
      { h:"Behavior — wary & nocturnal (the science)",
        body:"The brown has earned its reputation as the <b>wariest, wiliest</b> fish a river angler faces. Larger specimens go increasingly <b>nocturnal — many turn night-feeders once they pass ~20 inches</b> — hiding under cutbanks or hugging the bottom by day and emerging at dusk and after dark to hunt. Heavily-fished browns get even more cautious and selective. That's the whole key to big browns: low light, dusk-to-dark, and a presentation a suspicious old fish will trust." },
      { h:"Diet & forage",
        body:"Young browns eat insects like any trout, but past about <b>12 inches they turn predator</b> — crayfish, baitfish (sculpins, minnows, darters, even small trout), plus salamanders, frogs and the occasional mouse off the surface at night. In fall they gorge on drifting <b>trout and salmon eggs</b>. This piscivorous streak is why <b>streamers</b> (and big browns at dusk) are the trophy game, while scuds, sowbugs and midges fool the numbers on tailwaters." }
    ],
    regions:[
      { name:"Arkansas — White, Norfork & Little Red tailwaters (the trophy-brown capital)",
        body:"The mid-South's world-class trophy-brown water. The cold White River system below Bull Shoals, Norfork and Greers Ferry grows browns to staggering sizes — the <b>Little Red River gave up a former world record at 40 lb 4 oz</b>. The game is run from <b>drift and jet boats</b>: strip big streamers at low light and in fall pre-spawn for the giants, or dead-drift scuds, sowbugs and midges for numbers — always watching the dam <b>generation</b> schedule." },
      { name:"North Carolina — Great Smoky Mountains & mountain streams (the opposite world)",
        body:"In the southern Appalachians, browns are <b>wild stream fish</b> in tight, clear freestone water — and they are <i>spooky</i>. This is technical small-stream fishing: long light leaders, careful approaches, and the knowledge that the truly big browns in these creeks mostly feed at dusk and after dark. A wild Smoky Mountain brown taken on a size-16 dry at last light is a world away from a jet-boat 30-incher on the White — same fish, utterly different craft." },
      { name:"Missouri — Lake Taneycomo & big tailwaters",
        body:"<b>Lake Taneycomo</b>, the cold Table Rock tailwater at Branson, is Missouri's trophy-brown spot. The big-fish bite peaks in the cold months (Nov–Feb): drift scuds and micro-jigs on light line, strip sculpin streamers at first and last light, or soak a night crawler below the trophy area. Like all tailwaters, the browns key on crustaceans, not mayfly hatches." },
      { name:"Illinois — Lake Michigan & shoreline",
        body:"Illinois browns are largely a <b>Lake Michigan</b> story — lake-run fish that cruise the harbors, breakwalls and shoreline in the cold months (fall through spring), taken on spoons, crankbaits and flies close to shore. They're stocked into the lake rather than reproducing in streams, so it's a put-grow-and-chase fishery along the lakefront." }
    ],
    conservation:"Big browns are old, slow-growing trophies — release them, keep them wet, and use barbless hooks. Be especially careful in <b>fall</b>: don't wade through or fish over spawning redds (clean gravel depressions with bright, swept stones). Many trophy waters carry special length/gear regulations.",
    refs:[
      {t:"Brown trout — Wikipedia", u:"https://en.wikipedia.org/wiki/Brown_trout"},
      {t:"Classic Fish Facts: Brown Trout — Orvis News", u:"https://news.orvis.com/fly-fishing/classic-fish-facts-brown-trout-salmo-trutta"},
      {t:"Brown Trout 101: Biology, Habitat & Tactics — Field & Stream", u:"https://www.fieldandstream.com/stories/fishing/freshwater-fishing/trout-fishing/brown-trout-fishing-guide"},
      {t:"Lake Taneycomo (trophy browns) — Missouri Trout Hunter", u:"https://www.missouritrouthunter.com/lake-taneycomo.html"}
    ]
  },
  walleye:{
    extra:[
      { h:"Season &amp; weather playbook — what to throw, when",
        body:`<p>Walleye location follows water temperature and forage; the bite follows <b>light</b>. Three technique families cover the year: vertical jigging, live-bait rigging, and trolling.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep, stable basins &amp; structure; lethargic (a banner ice fishery up north)</td><td>Jigging spoon, jigging Rap, jig + minnow, dead-stick minnow — slow &amp; vertical</td></tr>
        <tr><td class="s">Spring (pre-spawn)</td><td>Stacked in rivers &amp; below dams, and on rock/gravel shoals at night — the classic run</td><td>Jig + minnow/plastic, blade bait, hair jig, slip-float minnow; fish current seams &amp; eddies</td></tr>
        <tr><td class="s">Summer</td><td>Deep main-lake structure — points, humps, flats, weed edges &amp; the thermocline</td><td>Trolling crankbaits &amp; spinner/crawler harnesses behind bottom bouncers; live-bait (Lindy) rigging leeches/crawlers; deep jigging</td></tr>
        <tr><td class="s">Fall</td><td>Big females feed up &amp; pull shallow again, often onto rock at night</td><td>Cast &amp; troll crankbaits, jig + big minnow, swimbaits; shallow night-casting</td></tr></table>
        <h3>Weather &amp; light — the walleye's edge</h3>
        <p>Those reflective, light-gathering eyes make walleye <b>low-light hunters</b>: dawn, dusk, night and overcast skies are the prime windows, and <b>wind</b> is your friend — a "walleye chop" breaking up the surface and pushing bait onto a windblown point or flat is one of the most reliable patterns in fishing. <b>Bright, calm bluebird days</b> push them deep and tight to structure — go deeper, slower, and to live bait. In <b>stained or dirty water</b> their eyes give them such an advantage that they'll feed all day, and color/vibration (firetiger, chartreuse, gold; bladed harnesses) outproduces subtlety.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Spinning — jigging &amp; rigging</h3><p style="margin:4px 0">A sensitive 6'6"–7' medium-light/medium spinning rod with a 2500–3000 reel for jigs (1/8–3/8 oz) and live-bait rigs — feel is everything for the light walleye "tick." Braid main line (8–10 lb) with a fluorocarbon leader maximizes sensitivity.</p><div class="pick"><b>Solid picks:</b> St. Croix Eyecon / Premier, Shimano Stradic; jigs, Lindy rigs, slip-bobbers.</div></div>
        <div class="gearbox"><h3>🎣 Trolling</h3><p style="margin:4px 0">For summer open water: 7'–8'6" medium trolling rods, line-counter reels, and <b>bottom bouncers</b> to run spinner/crawler harnesses, plus crankbaits (Shad Rap, Flicker Shad, Reef Runner). Planer boards spread lines and cover flats.</p></div>
        <div class="fightline"><span class="stars">★★★☆☆</span><b>Fight: 3/5 — modest, but who cares.</b></div>
        <p>Let's be honest: walleye don't fight especially hard — expect a few headshakes and a steady, dogged pull rather than runs or jumps. Big females give a heavier, throbbing resistance. Nobody chases walleye for the fight; they chase them because a walleye is widely considered the <b>best-eating fish in fresh water</b>. The sport is in finding and fooling them.</p>` },
      { h:"Relatives &amp; the saugeye",
        body:`<p>The walleye's close cousin the <b>sauger</b> shares many of its waters (especially big rivers) — smaller, blotchy, with spotted dorsal fins and no white tail tip. Where the two overlap, they hybridize into the <b>saugeye</b>, a fast-growing, hardy cross that many states (including parts of the Midwest and the user's region) stock heavily into reservoirs and tailwaters because it tolerates turbid, fluctuating water better than pure walleye. Saugeye fish much like walleye — jigs, blades and crankbaits in current and on structure — and often bite a touch more aggressively. The historic <b>"blue walleye"</b> of the Great Lakes, a bluish variant, is considered extinct. <span class="src">Tell walleye from sauger by the white tail-tip and clear dorsal — see the Species ID guide.</span></p>` }
    ],
    tagline:"The thinking angler's gamefish — a low-light predator built around a pair of glowing, light-gathering eyes, and the best-eating fish that swims in fresh water.",
    sections:[
      { h:"Identification",
        body:"Sander vitreus, the largest North American perch. Olive-and-gold flanks, a spiny front dorsal, sharp canine teeth, and the two dead giveaways: large, <b>glassy, marble-like eyes</b> that shine back at a light, and a <b>clean white tip on the lower lobe of the tail</b>. The eyes carry a reflective layer (the <i>tapetum lucidum</i>) that makes them deadly in dim light — and is exactly why the fish is named 'walleye.' The close cousin, the <b>sauger</b>, is smaller, blotchy/saddle-marked, has <b>dark spots on the spiny dorsal</b>, and lacks the white tail tip; where the two overlap they hybridize into 'saugeye.'" },
      { h:"Biology & life history",
        body:"Walleye are early-spring <b>broadcast spawners</b> — no nest, no parental care. As water climbs through roughly <b>42–50°F</b> they run up rivers or onto windswept rock/gravel shoals at night and scatter eggs over the bottom. Females are larger and longer-lived than males; a trophy 'marble-eye' over 10 lb is typically an old female of 8–12+ years. They grow fastest in cool, fertile waters with abundant baitfish and a long enough cool season — which is why the species reaches its peak abundance across the northern tier and thins out (becoming a stocked, structure-bound reservoir fish) toward the south." },
      { h:"Behavior & seasonal patterns",
        body:"Everything about a walleye revolves around its eyes. Those light-gathering eyes give it a feeding edge in <b>low light and stained water</b>, so the classic windows are dawn, dusk, night, overcast skies, and a stiff 'walleye chop' that breaks up the surface. They're structure-and-bottom oriented — points, humps, rock piles, drop-offs, river channel edges. Seasonally: a <b>spring spawning run</b> stacks fish below dams and in river current; summer pushes them onto deep main-lake structure and weed edges where trolling shines; fall is a heavy feed-up that pulls big females shallow again; winter slows them to a deliberate, vertical bite (and a banner ice fishery up north)." },
      { h:"Diet & forage",
        body:"A pursuit predator that keys on soft-rayed baitfish — <b>yellow perch and shad above all</b>, plus shiners, ciscoes and young-of-year panfish, with crayfish, leeches and nightcrawlers rounding out the menu. Because they feed by sight in dim light, the most consistent presentations either move slowly along the bottom (jig-and-minnow, live-bait/crawler-harness rigs) or cover water at a precise depth and speed (trolling crankbaits and spinner rigs). Match the local forage size and you've won most of the battle." },
      { h:"How to catch them",
        body:"Three families of technique cover almost everything. <b>Jigging</b> a 1/8–3/8 oz head tipped with a minnow, plastic or crawler is the bread-and-butter river and structure tactic. <b>Live-bait rigging</b> (a Lindy/slip-sinker rig with a leech, crawler or minnow) lets a wary fish eat without feeling weight. <b>Trolling</b> crankbaits or spinner-and-crawler harnesses behind bottom bouncers or planer boards is how you find and pick apart big summer flats and basins. Fish the edges of light — early, late, after dark — and slow down in cold water." }
    ],
    regions:[
      { name:"Missouri (river runs & big-reservoir trolling)",
        body:"A solid, sometimes overlooked walleye state that the MDC stocks widely. <b>Stockton Lake</b> is the marquee water — Missouri's best-known walleye fishery, with classic main-lake point-and-flat trolling. <b>Bull Shoals</b>, <b>Pomme de Terre</b>, <b>Mark Twain</b> and <b>Longview</b> all carry good numbers, and there's a strong <b>late-winter/early-spring run</b> up feeder rivers and below dams (the Niangua, Sac and Osage arms) where jig-and-minnow fishing peaks as the spawn nears." },
      { name:"Arkansas (highland lakes & the Little Red trophies)",
        body:"Arkansas's cold, clear Ozark reservoirs are genuine trophy walleye water. <b>Greers Ferry Lake</b> and its tailwater the <b>Little Red River</b> produced the longstanding state-record class fish and host a famous spring spawning run; <b>Norfork, Bull Shoals, Beaver</b> and <b>Lake Ouachita</b> all hold quality walleye that run up their feeder rivers (the <b>Kings, War Eagle</b> and others) in late winter. The AGFC stocks to sustain these populations near the southern edge of the walleye's natural range." },
      { name:"North Carolina (Appalachian walleye)",
        body:"The mountain reservoirs of the far west hold a long-established walleye fishery — <b>Lake James, Hiwassee, Santeetlah, Glenville</b> and <b>Fontana</b> among them — supported by NCWRC stocking. Fish run up the cold feeder rivers (the upper Little Tennessee and Tuckasegee systems) on a <b>March spawning push</b>, the prime window for bank and jig anglers, before settling onto deep summer structure." },
      { name:"Illinois (big-river walleye & sauger)",
        body:"Illinois is genuine walleye-and-sauger country thanks to its big rivers. The <b>Mississippi</b> and <b>Illinois</b> rivers — especially the tailwater pools below the lock-and-dams — give up walleye, sauger and saugeye through the cold months, while <b>Lake Shelbyville, Lake Mendota</b>-style natural lakes up north, and reservoirs like <b>Shelbyville and Carlyle</b> support stocked open-water fisheries. The river bite peaks in the late-winter pre-spawn stack below the dams." }
    ],
    conservation:"Walleye are slow-growing, and the big fish are old females — release the trophies and keep a few mid-size eaters instead. They're sensitive to spawning disturbance; respect closed seasons and below-dam regulations during the run. Toward the south the species lives near its thermal limit and leans on hatchery support, so harvest limits there matter more than in the walleye-rich north.",
    refs:[
      {t:"Walleye — Wikipedia", u:"https://en.wikipedia.org/wiki/Walleye"},
      {t:"Walleye fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/walleye/"},
      {t:"Walleye — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/walleye"},
      {t:"Greers Ferry & Little Red walleye — Arkansas Game & Fish Commission", u:"https://www.agfc.com/fishing/"}
    ]
  },
  blackcrappie:{
    extra:[
      { h:"Season &amp; weather playbook — finding the school",
        body:`<p>Crappie are roaming, suspending schoolfish, so the whole game is locating the school and its depth. The calendar is built around the spawn; the rest of the year they hang on brush and timber at a precise depth.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep &amp; tightly schooled — standing timber, brush piles, bridge pilings, channel edges</td><td>Small jig or spoon dropped vertically, live minnow on a tight line — slow &amp; precise</td></tr>
        <tr><td class="s">Pre-spawn</td><td>Staging in mid-depth brush, easing toward the spawning shallows</td><td>1/16 oz jig, minnow under a slip-float, slow swimming retrieves</td></tr>
        <tr><td class="s">Spawn<br><span style="font-weight:400;color:#90a8af">58–68°F</span></td><td>Shallow 1–6 ft on wood, grass &amp; docks — the famous bank bonanza</td><td>Jig or minnow under a float pitched to cover; <b>dock-shooting</b> jigs far back under docks</td></tr>
        <tr><td class="s">Summer</td><td>Suspended over deep brush, timber &amp; bridge pilings, often near the thermocline</td><td>Vertical jigging, <b>spider-rigging</b> (multiple long rods) &amp; trolling jigs/minnows; find the depth with electronics</td></tr>
        <tr><td class="s">Fall</td><td>Roaming flats chasing shad, then back to brush as it cools</td><td>Cast/troll small jigs &amp; tiny crankbaits, minnows over brush</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Crappie are low-light feeders — <b>overcast days and dawn/dusk</b> extend the bite and pull fish shallower and more aggressive. <b>Cold fronts</b> push them deeper, tighter and fussier: downsize the jig, slow down, and put it right on their nose. Black crappie prefer clearer water, so in clean lakes lean toward <b>natural/subtle jig colors</b>; when the water stains, switch to chartreuse, white or two-tone for visibility.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Spinning — light &amp; ultralight</h3><p style="margin:4px 0">A 6'–7' light or ultralight spinning rod with a 1000–2000 reel and <b>4–6 lb</b> line is the everyday crappie outfit for casting jigs, dock-shooting and float fishing. A sensitive tip plus a forgiving action protects the fish's papery mouth.</p><div class="pick"><b>Baits:</b> 1/16–1/32 oz jigheads with soft plastics (Bobby Garland Baby Shad, Crappie Magnet) or marabou; live minnows under a slip-float.</div></div>
        <div class="gearbox"><h3>🎣 Spider-rigging &amp; long rods</h3><p style="margin:4px 0">For covering water and presenting multiple depths at once, long <b>10'–16' crappie rods</b> spread on rod holders (spider-rigging), trolling jigs and minnows slowly. Forward-facing sonar (LiveScope-style) has transformed crappie fishing by letting anglers see and target individual suspended fish.</p><div class="pick"><b>Solid picks:</b> B'n'M, ACC Crappie Stix, Mr. Crappie rods.</div></div>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — but a blast on ultralight.</b></div>
        <p>Crappie aren't strong fighters — a slab gives a few thumping headshakes and a broadside "kite" against the rod. The catch is their nickname, <b>"papermouth"</b>: their thin, membranous mouth tears easily, so set the hook with a smooth lift, never a hard yank, and don't horse them on the way in. On ultralight gear they're genuinely fun, and they come in numbers.</p>` },
      { h:"Black vs. white — and hybrid variants",
        body:`<p>Black crappie (<i>Pomoxis nigromaculatus</i>) and <b>white crappie</b> (<i>P. annularis</i>) often share the same lake, splitting it by water clarity: blacks dominate the clearer, weedier sections, whites the stained, river-influenced water. Tell them apart by the dorsal spines — <b>blacks have 7–8, whites have 5–6</b> — and by the markings (blacks are randomly speckled, whites barred). Some states stock the <b>"Magnolia" / black-stripe crappie</b>, a hybrid bred to grow fast and not over-reproduce in small lakes. <span class="src">See the white crappie profile for its muddy-water playbook, and the Species ID guide for the spine count.</span></p>` }
    ],
    tagline:"The clear-water speck — a school-roaming panfish that's a springtime bonanza on the bank and one of the finest fillets in fresh water.",
    sections:[
      { h:"Identification",
        body:"Pomoxis nigromaculatus. A deep, slab-sided, silvery panfish covered in an <b>irregular scatter of dark speckles</b> with no clear pattern — hence 'black' or 'speckled' crappie. The reliable separator from white crappie is the <b>dorsal-fin spine count: black crappie have 7–8 spines</b> (white crappie have 5–6), and the black crappie's dorsal sits about as far forward as the distance from it to the eye. Blacks favor <b>clearer, weedier, more stable water</b> and are the dominant crappie of natural lakes and clean reservoirs." },
      { h:"Biology & life history",
        body:"Crappie spawn in spring as water reaches about <b>58–68°F</b>. Males sweep shallow nests in <b>colonies</b> over a firm or gravelly bottom near cover in 1–6 ft and guard the eggs and fry. They are fast-maturing, highly <b>fecund</b> schooling fish — which makes their numbers boom and bust, so a lake can be wall-to-wall slabs one year and full of stunted dinks the next. They grow quickly to a foot or so and most live 4–7 years; a true 2-lb-plus crappie is the fish of a season." },
      { h:"Behavior & seasonal patterns",
        body:"Crappie are <b>roaming, suspending schoolfish</b>, and finding the school is 90% of the game. The calendar is built around the spawn: a <b>pre-spawn</b> stage in mid-depth brush, the <b>spawn</b> itself in the shallows (the famous bank bonanza when fish move to 1–4 ft of wood and grass), then a <b>post-spawn</b> pull back to deeper structure. Through summer and winter they suspend over <b>brush piles, standing timber, bridge pilings and channel edges</b> at a specific depth — find that depth and you load the boat. They feed most actively in low light and bite light, so a sensitive setup matters." },
      { h:"Diet & forage",
        body:"As fry they eat zooplankton; adults switch to a diet dominated by <b>small baitfish (shad and minnows)</b> plus aquatic insects and larvae. That's why the two timeless crappie baits are a <b>live minnow under a bobber</b> and a <b>small jig (1/16–1/32 oz) with a soft-plastic or marabou body</b> — both imitate the minnows crappie are hunting. Match the hatch small; crappie key on bite-size forage." },
      { h:"How to catch them",
        body:"In spring, work the bank: a minnow or jig under a slip-bobber pitched to shallow wood and grass is hard to beat. The rest of the year, fish go vertical over structure — <b>spider-rigging</b> multiple long rods, <b>vertical jigging</b> brush piles, or 'dock-shooting' jigs far back under docks. Modern crappie anglers lean hard on <b>electronics</b> to find suspended schools and pin down the exact depth. Set the hook with a smooth lift, not a yank — the thin, papery mouth (hence 'papermouth') tears easily." }
    ],
    regions:[
      { name:"Missouri (one of the country's great crappie states)",
        body:"Missouri is a crappie heavyweight, and the MDC actively sinks <b>brush-pile attractors</b> and publishes their GPS coordinates. <b>Truman Lake</b> is the crown jewel — vast flooded timber that grows giant crappie — with <b>Stockton, Pomme de Terre, Mark Twain, Lake of the Ozarks</b> and countless MDC community lakes all excellent. Blacks dominate the clearer arms; whites the stained, riverine upper ends. The April spawn is a statewide event." },
      { name:"Arkansas (timber lakes & a deep crappie culture)",
        body:"Arkansas crappie fishing runs deep. <b>Lake Conway</b> (a shallow, stumpy, fertile state-built lake) is a legendary crappie factory, with <b>Greers Ferry, Beaver, Bull Shoals, Ouachita</b> and the Delta oxbows all strong. Spring brings a shallow-cover bonanza; summer and winter fish suspend over brush and standing timber. The state's mix of clear highland lakes and stained lowland waters supports both blacks and whites." },
      { name:"Florida (specks — a winter institution)",
        body:"In Florida the black crappie is the <b>'speck' (speckled perch)</b>, and chasing them is a beloved cool-season tradition. <b>Lake Okeechobee</b>, the <b>Kissimmee chain</b> (Lake Toho), <b>Lake Tarpon</b> and the St. Johns lakes give up huge numbers and big, deep-bodied fish from late fall through the early-spring spawn — anglers drift live missouri-minnows and troll jigs across the open shallows. The year-round warmth means specks grow fast and fishing peaks exactly when northern lakes are frozen." },
      { name:"North Carolina & Illinois",
        body:"In North Carolina, piedmont reservoirs like <b>High Rock, Jordan, Falls</b> and <b>Badin</b> hold strong crappie around brush and bridge pilings, with a classic March–April shallow spawn. Illinois is famous for <b>Rend Lake</b> — one of the Midwest's premier crappie destinations — along with <b>Lake Shelbyville, Carlyle</b> and the backwaters of the Mississippi and Illinois rivers, where white crappie share the stained water with blacks." }
    ],
    conservation:"Because crappie populations swing between boom and bust, many lakes use a <b>minimum length (often 9–10 in) and a generous creel</b> to thin out over-abundant year-classes and let the rest grow — so keeping a limit of eaters is often good management. Crappie are excellent table fare and handle harvest well, but in stunted lakes the kindest thing for the fishery is to take some home.",
    refs:[
      {t:"Black crappie — Wikipedia", u:"https://en.wikipedia.org/wiki/Black_crappie"},
      {t:"Crappie fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/crappie/"},
      {t:"Crappie & brush-pile attractors — Missouri Department of Conservation", u:"https://mdc.mo.gov/fishing"},
      {t:"Black vs. white crappie ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/black-crappies-vs-white-crappies/"}
    ]
  },
  whitecrappie:{
    extra:[
      { h:"Season &amp; weather playbook — the muddy-water crappie",
        body:`<p>White crappie school, suspend and spawn just like black crappie, but they thrive in the <b>stained, fertile, current-influenced water</b> — the muddy upper arms of reservoirs and river backwaters — where blacks struggle. Look for them dirtier and a little more up-current, and lean on color and vibration over finesse.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep timber, brush &amp; bridge pilings in the main lake &amp; lower river arms</td><td>Vertical jig/minnow on a tight line; bright/two-tone colors in stained water</td></tr>
        <tr><td class="s">Pre-spawn</td><td>Pushing up the muddy creek &amp; river arms toward shallow wood</td><td>Jig or minnow under a float; shad-pattern &amp; chartreuse plastics</td></tr>
        <tr><td class="s">Spawn<br><span style="font-weight:400;color:#90a8af">56–66°F</span></td><td>Shallow wood, laydowns &amp; standing timber in the off-color upper ends</td><td>Float-and-jig / minnow tight to visible cover; the classic spring bonanza</td></tr>
        <tr><td class="s">Summer–Fall</td><td>Suspended over deep brush &amp; standing timber; roaming flats after shad in fall</td><td>Spider-rig &amp; troll jigs/minnows; cast small jigs &amp; crankbaits on the fall feed</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Whites tolerate (even prefer) off-color water, so they're often the more catchable crappie after a rain. In their typical stained habitat, <b>bright and contrasting colors</b> — chartreuse, white, orange — and a little extra vibration earn more bites than natural finesse colors. Overcast and low light still extend the bite; cold fronts still push them deeper and slower. Their slightly larger average size in fertile, shad-rich impoundments makes them a favorite of crappie-meat anglers.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<p>Identical toolkit to black crappie: a 6'–7' light/ultralight spinning rod with 4–6 lb line for casting, dock-shooting and float fishing 1/16–1/32 oz jigs and minnows, or long 10'–16' rods for spider-rigging and trolling over brush. Because whites live in stained water, bias jig color toward <b>shad patterns and bright chartreuse/white</b>, and fish tight to visible wood. Forward-facing sonar helps locate the suspended schools.</p>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — papermouth, set the hook gently.</b></div>
        <p>Like all crappie, whites fight modestly — a few broadside thumps — and have the same thin, tear-prone "papermouth," so lift smoothly to set and don't horse them. Pound for pound they're a light scrap, but they school thick and grow heavy in rich water, and few fish are better on the table.</p>
        <div class="callout2"><b>The difference that matters:</b> 5–6 dorsal spines (vs. 7–8 on a black crappie) and faint vertical bars. On many lakes the same regulations cover both, but always check — see the Species ID guide and the black crappie profile for the full comparison.</div>` }
    ],
    tagline:"The crappie of muddy water and big rivers — more tolerant of current and turbidity than its speckled cousin, and just as good in the pan.",
    sections:[
      { h:"Identification",
        body:"Pomoxis annularis. Lighter and more silvery than the black crappie, marked with <b>faint dark vertical bars</b> down the sides rather than a random scatter of speckles. The clinching feature is the <b>dorsal-fin spine count: white crappie have just 5–6 spines</b> (blacks have 7–8), and the body is a touch more elongated. Where the two species share water, whites dominate the <b>more turbid, fertile, river-influenced</b> sections while blacks hold in the clearer, weedier areas." },
      { h:"Biology & life history",
        body:"White crappie spawn the same way blacks do — colonial nests swept by males in 1–6 ft of water as temperatures pass roughly <b>56–66°F</b> in spring — but they're better adapted to <b>stained water, silt and current</b>, which lets them thrive in rivers, oxbows and turbid flood-control reservoirs where black crappie struggle. They're prolific and fast-growing, and like all crappie their numbers boom and bust with each year-class. They tend to run slightly more elongated and can edge out blacks for sheer size in rich, muddy impoundments." },
      { h:"Behavior & seasonal patterns",
        body:"Behaviorally they mirror black crappie — <b>schooling, suspending, structure-oriented</b> — with the same spring shallow-spawn bonanza and the same summer/winter retreat to deep brush, timber and channel edges. The practical difference is <b>where</b> you find them: whites push farther up the muddy, current-fed arms of a reservoir and into river backwaters, and they tolerate the off-color water that follows a rain better than blacks do, so they're often the more catchable crappie in a stained system." },
      { h:"Diet & forage",
        body:"White crappie lean even more heavily on <b>small baitfish (especially young shad)</b> than blacks, with insects and larvae filling in. The implication for anglers: minnow imitations and shad-colored jigs shine, and in fertile river-run reservoirs whites can grow fat and large on dense shad populations. The same minnow-under-a-bobber and small-jig presentations work — just look for them in dirtier, more current-influenced water." },
      { h:"How to catch them",
        body:"Identical toolkit to black crappie — spring bank fishing with minnows and jigs around shallow wood, then vertical jigging, spider-rigging and dock-shooting over deeper brush the rest of the year. Because whites favor stained water, <b>color and vibration matter more than finesse</b>: bright or shad-pattern jigs, and minnows fished tight to visible cover (laydowns, standing timber, bridge pilings) in the muddy upper ends of reservoirs and in river backwaters." }
    ],
    regions:[
      { name:"Missouri & Illinois (river-run reservoirs)",
        body:"White crappie shine in Missouri's stained, fertile flood-control lakes and the muddy upper arms of <b>Truman, Mark Twain</b> and the big-river backwaters. In Illinois they're a staple of <b>Rend Lake, Carlyle, Shelbyville</b> and the Mississippi and Illinois river backwaters — turbid, shad-rich systems tailor-made for white crappie, which often outnumber blacks there." },
      { name:"Arkansas (the muddy-water specialist)",
        body:"In Arkansas's stained lowland lakes and Delta oxbows the white crappie is frequently the dominant crappie — <b>Lake Conway</b>, the Arkansas River pools, and the big-river backwaters grow heavy whites on dense shad. They run up the muddier creek arms in spring while blacks hold in the clearer water, giving anglers two species to chase in the same lake." },
      { name:"North Carolina & the South",
        body:"Across North Carolina's piedmont and coastal-plain reservoirs and the warm reservoirs throughout the South, white crappie fill the turbid, current-influenced niches — the muddy headwaters of <b>High Rock</b> and the Yadkin chain, river backwaters and shallow, fertile impoundments — where their tolerance for off-color water makes them the more reliable crappie after a rain." }
    ],
    conservation:"Manage them like black crappie: minimum-length and generous creel limits help thin booming year-classes so the survivors grow to slab size. Whites are superb eating and harvest-tolerant — in over-populated stained lakes, taking a limit of eaters is good for the fishery. Where blacks and whites share water, the same regulations typically cover both.",
    refs:[
      {t:"White crappie — Wikipedia", u:"https://en.wikipedia.org/wiki/White_crappie"},
      {t:"Black vs. white crappie ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/black-crappies-vs-white-crappies/"},
      {t:"Crappie fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/crappie/"},
      {t:"White crappie — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/white-crappie"}
    ]
  },
  channelcat:{
    extra:[
      { h:"Season &amp; weather playbook — feeding the nose",
        body:`<p>Channel cats hunt by scent, so the bite is driven by water temperature, current and smell more than by sight. Keep bait on or near the bottom, fish the warm months and low light hard, and chase rising, stained water.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>The deepest river holes &amp; lake basins; sluggish &amp; bunched</td><td>Fresh cut bait or liver on the bottom, dead slow; small baits, patient soaks</td></tr>
        <tr><td class="s">Spring</td><td>Pre-spawn feeding as water warms — flats, current breaks &amp; below dams</td><td>Cut bait, nightcrawlers, prepared dip baits; <b>rising muddy water turns them on</b></td></tr>
        <tr><td class="s">Summer<br><span style="font-weight:400;color:#90a8af">spawn 70–75°F</span></td><td>Prime time — current seams, holes, flats &amp; below cover, especially after dark</td><td>Cut shad/skipjack &amp; live bait for size; stinkbait/dip bait &amp; crawlers for numbers; drift flats</td></tr>
        <tr><td class="s">Fall</td><td>Heavy feed-up, increasingly shad-oriented</td><td>Big fresh cut-shad chunks for trophies; keep moving to find active fish</td></tr></table>
        <h3>Weather &amp; water — chase the mud</h3>
        <p>The single best trigger is <b>rising, stained water after a rain</b>: current washes food loose and carries scent, and catfish feed aggressively along the new current edges and inflows. <b>Summer nights</b> are prime — fish move shallow and feed under cover of darkness. On <b>bright, clear, low water</b> they pull back into the deeper holes and feed less, so fish deeper and slower or wait for dusk. The smellier and bloodier your bait in dirty water, the better.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🎣 The catfish outfit</h3><p style="margin:4px 0">A 7'–7'6" medium-heavy rod with backbone (spinning or casting) and 15–30 lb mono or 30–50 lb braid handles channel cats and lets you pull them from cover. Use <b>circle hooks</b> (they self-set in the corner of the mouth and reduce gut-hooking) on a <b>slip-sinker (Carolina) or three-way rig</b> to hold bottom in current.</p><div class="pick"><b>Solid picks:</b> Ugly Stik Catfish / Tiger, Abu Garcia 6500-class reels; sponge/dip-bait hooks for prepared baits, snelled circle hooks for cut bait.</div></div>
        <div class="fightline"><span class="stars">★★★★☆</span><b>Fight: 4/5 — updated. Dogged power.</b></div>
        <p>We bumped the channel cat to 4/5: they don't jump or make flashy runs, but a good one pulls <b>hard and sustained</b>, using current and diving for cover and the bottom with surprising strength for its size — a 5–10 lb channel in river current is a genuine handful. (Their giant cousins, the blue and flathead catfish, are the 5/5 brutes.) Mind the stiff <b>pectoral and dorsal spines</b> when you land one — those, not the harmless barbels, are the hazard.</p>` },
      { h:"Relatives &amp; stocking",
        body:`<p>The channel cat has no recognized subspecies, but it heads a trio of catfish anglers should keep straight. Its bigger cousins, the <b>blue catfish</b> (straight-edged anal fin, slate-blue, grows to 100+ lb) and the <b>flathead catfish</b> (flattened head, protruding lower jaw, eats live fish, also 100+ lb), share many of its rivers and now have their own FishDex profiles. The channel is by far the most widely <b>stocked</b> of the three — state agencies put them into thousands of community lakes, city ponds and farm ponds because they're hardy, fast-growing, and the perfect "anyone can catch one" fish. <span class="src">See the Species ID guide for the anal-fin and head shape tells.</span></p>` }
    ],
    tagline:"America's catfish — a sleek, hard-pulling, scent-hunting omnivore that lives in nearly every river, lake and farm pond on the continent and bites day or night.",
    sections:[
      { h:"Identification",
        body:"Ictalurus punctatus. A smooth, scaleless catfish with a <b>deeply forked tail</b>, a small rounded head, and (on younger fish) a scatter of <b>dark spots</b> along slate-blue-to-olive sides — fading on big adults, and breeding males turning dark and thick-headed. The forked tail separates it from the flat-tailed bullheads; the <b>rounded anal fin with 24–29 rays</b> separates it from the blue catfish (straight-edged anal fin, 30–36 rays). Eight whisker-like <b>barbels</b> ring the mouth — chemical sensors, not stingers. The pectoral and dorsal spines, however, can deliver a nasty jab, so handle with care." },
      { h:"Biology & life history",
        body:"Channel cats are <b>cavity nesters</b>: in early summer, as water passes about <b>70–75°F</b>, the male finds a dark, enclosed spot — an undercut bank, hollow log, muskrat hole or sunken can — and the female lays a gelatinous egg mass there, which the <b>male then guards and fans</b> until the fry disperse. They're long-lived (commonly 10–15+ years, occasionally much older) and grow large where forage and water allow; most rod-and-reel fish run 1–8 lb, but trophy 'channels' exceed 20 lb. They tolerate a huge range of temperature, current and water quality, which is why they're so nearly universal." },
      { h:"Behavior & seasonal patterns",
        body:"The channel cat is a <b>scent-and-taste hunter</b> — its whole body, and especially the barbels, is covered in taste buds, so it locates food by smell in dark or muddy water where sight feeders fail. They're most active in <b>warm water and low light</b>: summer nights are prime, and a rising, stained river after rain triggers a strong feed as the current carries scent. They roam, following food along channel edges, holes, current seams and the downstream side of cover. Cold winter water slows them to a deep, sluggish bite in the river's deepest holes." },
      { h:"Diet & forage",
        body:"A true <b>omnivore and opportunist</b> — fish (live and dead), crayfish, insects, mollusks, worms, and plenty of plant matter and decaying material. That broad, scent-driven diet is why catfish bites span the spectrum: <b>fresh cut bait and live baitfish</b> for the biggest fish, <b>nightcrawlers and chicken liver</b> for numbers, and pungent <b>'stinkbaits' / prepared dough and dip baits</b> that exploit their incredible sense of smell. The smellier and bloodier, the better in muddy water." },
      { h:"How to catch them",
        body:"Keep it on or near the bottom. A simple <b>slip-sinker (Carolina) rig or three-way rig</b> with cut shad, a gob of crawlers, liver or a dip bait, fished in current seams, holes and below dams, accounts for most channel cats. Fish <b>after dark in summer</b> and during rising, off-color water for the best action. They fight hard and dirty toward cover, so don't under-gun them — and watch those pectoral/dorsal spines when you unhook one." }
    ],
    regions:[
      { name:"Missouri (rivers, reservoirs & a stocked-pond staple)",
        body:"Channel cats are everywhere in Missouri — the <b>Missouri and Mississippi rivers</b> and their tributaries, every major reservoir, and thousands of MDC community lakes and farm ponds that the department <b>stocks specifically with channel catfish</b> for easy, family-friendly fishing. Summer nights below the big-river wing dams and in reservoir coves are prime; rising, muddy water after a rain turns the bite on." },
      { name:"Arkansas (catfish country, top to bottom)",
        body:"Arkansas is serious catfish water. The <b>Arkansas, White and Mississippi rivers</b> and the Delta's bayous and oxbows grow channel cats in huge numbers alongside trophy blues and flatheads, and the AGFC stocks channels into family and city ponds across the state. Drifting and bottom-fishing cut bait in river holes and below the navigation dams is the classic approach." },
      { name:"North Carolina (piedmont rivers & reservoirs)",
        body:"From the <b>Cape Fear, Neuse and Roanoke</b> rivers to piedmont reservoirs like <b>Jordan, Falls and High Rock</b>, channel catfish are abundant and widely stocked, including in NCWRC community fishing ponds. The coastal-plain rivers and their warm, fertile flows produce steady summer-night fishing on cut bait and crawlers." },
      { name:"Illinois & the heartland",
        body:"In Illinois the channel cat is arguably the most-caught sportfish — the <b>Mississippi, Illinois, Rock and Kaskaskia</b> rivers and their backwaters, plus reservoirs and a statewide network of stocked ponds, all teem with them. Tailwaters below the lock-and-dams concentrate fish in current, and the post-rain rising-water bite is a Midwest summer tradition." }
    ],
    conservation:"Channel cats are abundant, productive and stocked for harvest, so keeping a few for the table is well within good management — they're one of the best 'eat what you catch' fisheries in the country. Handle them carefully (the spines, not the barbels, are the hazard), and consider releasing the rare trophy-class fish, which are decades old. Never move live catfish between waters.",
    refs:[
      {t:"Channel catfish — Wikipedia", u:"https://en.wikipedia.org/wiki/Channel_catfish"},
      {t:"Catfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/catfish/"},
      {t:"Channel catfish — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/channel-catfish"},
      {t:"Channel vs. blue catfish ID — In-Fisherman", u:"https://www.in-fisherman.com/editorial/telling-channel-catfish-and-blue-catfish-apart/"}
    ]
  },
  bluegill:{
    extra:[
      { h:"Season &amp; weather playbook — small &amp; natural",
        body:`<p>Bluegill orient to cover and the warm shallows, and they eat small invertebrates — so the rule all year is <b>go small and natural</b>. The spawn is the headline, but they bite something nearly every day they're warm.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep, schooled near brush &amp; basins; the big bulls feed slowly (good ice fishing)</td><td>Tiny tungsten jig or teardrop with a waxworm/spike, fished slow &amp; vertical</td></tr>
        <tr><td class="s">Spring (pre-spawn)</td><td>Moving into warming shallows &amp; weed edges as water climbs</td><td>Small jig or a worm/cricket under a tiny float around cover</td></tr>
        <tr><td class="s">Spawn<br><span style="font-weight:400;color:#90a8af">67–80°F, all summer</span></td><td>Colonial beds in 1–4 ft (the visible "honeycomb"); they spawn repeatedly through the warm months</td><td>Worm or cricket under a bobber, 1/32 oz jig, small popper or wet fly — nonstop action on a bed</td></tr>
        <tr><td class="s">Summer–Fall</td><td>Big "bulls" slide to deeper weed lines &amp; brush; small fish stay shallow</td><td>Small jig or fly worked a little deeper on the outside weed edges for the bigger fish</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Bluegill feed best in the <b>warm hours of warm, stable, sunny days</b> — exactly when many gamefish slow down, which makes them the perfect midday and beginner fish. The bedding shallows fire on calm, warm afternoons. The one nuance: the genuine trophy <b>"bull" bluegill are wary</b> — they hold a little deeper, off the obvious beds, and spook in clear water, so catching the biggest ones takes finesse and a quiet approach rather than just dropping a worm on the colony.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Ultralight — the whole point</h3><p style="margin:4px 0">A 5'–6'6" ultralight spinning rod (or a simple cane/crappie pole) with a 500–1000 reel and <b>2–4 lb</b> line, small hooks (#6–#10) and tiny jigs (1/32–1/64 oz). A worm or cricket under a small float is the timeless rig; a micro tube or grub on a light jighead is deadlier on the bigger fish.</p></div>
        <div class="gearbox"><h3>🐟 Fly — pure fun</h3><p style="margin:4px 0">Bluegill may be the best fly-rod quarry there is: a 3–4wt with a small <b>foam popper</b>, sponge spider or wet fly draws explosive little takes, and it's how a lot of fly anglers learn. For the deep bulls, a small weighted nymph or micro-jig under an indicator.</p></div>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — but pound-for-pound a brawler.</b></div>
        <p>On the 1–5 scale a bluegill is a 2 by size alone, but few fish <b>punch above their weight</b> like a big bull: hooked, it turns its deep, flat body sideways to the line and uses it like a sail, fighting in stubborn circles that feel far bigger than the fish. On honest ultralight or a 3wt, a hand-sized 'gill is genuinely sporting — which is exactly why they're so beloved.</p>` },
      { h:"Variants — the coppernose &amp; hybrids",
        body:`<p>The wide-ranging northern bluegill has a distinct southern cousin, the <b>coppernose bluegill</b> (a Florida subspecies, <i>Lepomis macrochirus purpurescens</i>), recognizable by the coppery bar across the head of breeding males. Coppernose are popular for stocking warm southern ponds because they grow fast and large in a long season — a big reason Florida and the Deep South produce such heavy 'gills. Bluegill also <b>hybridize readily</b> with other sunfish; the "hybrid bluegill" (usually bluegill × green sunfish) is widely stocked in ponds because it grows quickly, fights hard, and reproduces less — reducing the stunting that plagues pure bluegill in small waters. <span class="src">Don't confuse bluegill with the redear ("shellcracker"), which has a red-edged ear flap and eats snails — see the Species ID guide.</span></p>` }
    ],
    tagline:"The fish that taught America to fish — a scrappy, beautiful, nearly universal sunfish that fits in a child's hand and a master angler's respect alike.",
    sections:[
      { h:"Identification",
        body:"Lepomis macrochirus. A deep, round, hand-sized sunfish with a tiny mouth, marked by a <b>solid black ear-flap</b> (no red or pale margin, unlike the redear/shellcracker), a <b>dark blotch at the rear base of the dorsal fin</b>, and 5–9 faint vertical bars. Breeding males blaze with orange-and-blue color and a coppery breast. The small mouth is the functional key — it tells you to fish <b>small</b>. Bluegill hybridize readily with other sunfish, which can muddy the field marks, but the black ear-flap and dorsal blotch are the anchors." },
      { h:"Biology & life history",
        body:"Bluegill are <b>colonial bed-spawners</b>: from late spring through summer, whenever water sits around <b>67–80°F</b>, males sweep clusters of saucer-shaped nests in 1–4 ft of water — the unmistakable 'honeycomb' of beds in the shallows — and the dominant 'bull' bluegills guard them. They spawn <b>repeatedly through the warm months</b>, which makes them astonishingly prolific and prone to <b>overpopulating and stunting</b> in waters without enough predators. They're short-lived (most 4–6 years) and slow to reach real size; a true 'bull' bluegill near a pound is a genuine trophy that took years to grow." },
      { h:"Behavior & seasonal patterns",
        body:"Bluegill orient to <b>cover and the warm shallows</b> — weed edges, docks, brush, laydowns. The spawn is the headline event: through the warm months waves of fish bed in the shallows, and a visible bed is nonstop action. In summer's heat and in winter the bigger fish slide to <b>deeper weed lines and brush</b>, suspending off structure, while the small ones stay shallow. They feed all day but best in the warm hours, and the <b>biggest, oldest bulls are surprisingly wary</b> — they hold a little deeper and spook easily, which is why monster bluegill are a specialist's quarry, not just a kid's." },
      { h:"Diet & forage",
        body:"Bluegill are <b>invertebrate feeders</b> — aquatic insects and larvae, tiny crustaceans, snails, worms, and the occasional small minnow or fish egg, sipped through that small mouth. They're a cornerstone of the food web, the primary forage that grows big largemouth bass. For anglers the lesson is to <b>go small and natural</b>: a piece of worm or a cricket, a tiny jig, a small popper or wet fly. Oversize baits just get pecked." },
      { h:"How to catch them",
        body:"The most welcoming fishing there is, and a real craft when you chase big ones. The timeless rig is a <b>worm or cricket under a small bobber</b>; a <b>1/32–1/64 oz jig or a tiny tube/grub</b> on light line is deadlier still. Fly anglers love them — a small <b>popping bug or wet fly</b> on a bedding colony is pure fun. For the wary 'bulls,' fish the deeper outside weed edges and brush with a slow, small presentation. Everything about bluegill rewards <b>light line, small hooks, and finesse</b>." }
    ],
    regions:[
      { name:"Florida (native giants & the coppernose)",
        body:"Florida is a <b>big-bluegill paradise</b> — the warm, year-round growing season and the native <b>coppernose</b> subspecies produce huge bream. <b>Lake Okeechobee</b>, the <b>Kissimmee chain</b> and countless lakes and canals give up plate-size bluegill and redear, and Floridians chase the bedding 'bream' on light tackle and flies through a long spring and summer. The same warmth that grows giant bass grows giant panfish." },
      { name:"Missouri & Illinois (the farm-pond heartland)",
        body:"In the Midwest the bluegill is the backbone of <b>farm-pond and community-lake fishing</b> — the MDC and IDNR stock the bluegill-bass combination into thousands of small waters precisely because bluegill feed the bass and provide easy, abundant fishing. Well-managed ponds and lakes like Missouri's MDC community lakes and Illinois' park and strip-mine lakes grow surprisingly big bulls; the trick is enough bass predation to keep the bluegill from stunting." },
      { name:"Arkansas & North Carolina (bream culture)",
        body:"Across Arkansas and North Carolina, 'bream' fishing is a deep tradition — farm ponds, oxbows, the fertile lowland lakes and slow rivers all teem with bluegill and their redear cousins. The warm southern summers stretch the bedding season for months, and light-tackle and fly anglers work the shallow beds and shaded banks from spring well into fall." }
    ],
    conservation:"Counter-intuitively, bluegill often need <b>harvest</b>: in small lakes and ponds they over-reproduce and stunt, so keeping plenty of the small-to-medium fish is good management and good eating. The one thing to protect is the <b>big bull bluegill</b> — they're old, rare, and the prime spawners; releasing the genuine 9-inch-plus fish helps keep a panfish fishery producing quality. A healthy bass population is the best bluegill-management tool there is.",
    refs:[
      {t:"Bluegill — Wikipedia", u:"https://en.wikipedia.org/wiki/Bluegill"},
      {t:"Bluegill / sunfish fishing basics — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/bluegill/"},
      {t:"Bluegill — Missouri Department of Conservation Field Guide", u:"https://mdc.mo.gov/discover-nature/field-guide/bluegill"},
      {t:"Managing bluegill in ponds — pond management extension guidance", u:"https://www.takemefishing.org/how-to-fish/fishing-fish-species/bluegill/"}
    ]
  },
yellowperch:{
    tagline:"A handsome, schooling cool-water panfish of the northern tier — modest on the rod, but a backbone of the Great Lakes fishery and one of the very best fish on the plate.",
    sections:[
      { h:"Identification",
        body:"<i>Perca flavescens</i>, a true perch and close cousin of the walleye and sauger. Golden-yellow flanks crossed by <b>6–8 dark vertical bars</b>, with orange-to-red lower fins that flare bright on spawning males. Two distinct dorsal fins — a spiny front and a soft rear — mark it as a perch, not a sunfish. No canine teeth (unlike its walleye cousin). Most fish run a modest 6–12 inches; a 'jumbo' perch over a pound is a prize." },
      { h:"Biology &amp; life history",
        body:"Yellow perch are very early spring spawners, dropping distinctive <b>gelatinous, accordion-folded egg strands</b> over weeds and brush as water warms past about 45–55°F, with no parental care afterward. They school tightly by size and year-class, grow slowly, and — like other panfish — can <b>overpopulate and stunt</b> in waters without enough predators. They're a cool-water fish, most abundant across the northern states and Canada and scarce in the warm South." },
      { h:"Behavior &amp; seasonal patterns",
        body:"Perch travel in roaming schools near the bottom over sand, gravel and weed edges, relating to drop-offs, humps and the first break. Unlike the night-feeding walleye, perch are <b>daytime feeders</b> that rest at night — a useful quirk. They follow bait and move constantly, so locating an active school is the whole game; once you catch one, more usually follow. They feed through the cold months and are a marquee <b>ice-fishing</b> target up north." },
      { h:"Diet &amp; forage",
        body:"Invertebrates dominate — insect larvae, small crustaceans, snails — alongside small minnows, fish eggs and young crayfish; juveniles start on zooplankton. The takeaway for anglers is to fish <b>small</b>: a minnow, a piece of crawler, a tiny jig or spoon tipped with a grub. Perch key on bite-size, bottom-oriented forage." }
    ],
    regions:[
      { name:"Illinois &amp; the Great Lakes (the heartland)",
        body:"Among FishDex's covered states, Illinois is perch country: <b>Lake Michigan</b> has a storied (and tightly regulated) yellow-perch fishery, and the northern natural lakes — the <b>Fox Chain O'Lakes</b> — plus the Mississippi River backwaters hold good numbers. The upper Midwest at large (Wisconsin, Minnesota, the Dakotas) is the perch capital, where 'perch jerking' through the ice and the summer fish-fry are institutions." },
      { name:"The South (uncommon)",
        body:"Yellow perch are a northern, cool-water fish, so they thin out fast heading south — only a few northern Missouri waters hold them, and they're essentially absent from the warm lowlands of Arkansas and Florida and uncommon in North Carolina. Southern anglers rarely encounter them; this is a fish of the cold-water tier." }
    ],
    extra:[
      { h:"Season &amp; weather playbook — find the school",
        body:`<p>Perch are schooling bottom feeders that bite in daylight, so cover water until you contact a school, then work it. Keep baits small and near the bottom.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top baits &amp; presentations</th></tr>
        <tr><td class="s">Winter</td><td>Deep, tightly schooled basins &amp; structure — a top ice-fishing species</td><td>Small tungsten jig or spoon tipped with a minnow head, spike or waxworm; drop-shot through the ice</td></tr>
        <tr><td class="s">Spring</td><td>Shallowing over weeds &amp; brush to spawn early; then weed edges</td><td>Small jig, minnow under a float, perch rig (two dropper hooks) with minnows</td></tr>
        <tr><td class="s">Summer</td><td>Weed edges, drop-offs &amp; humps, sliding a bit deeper as it warms</td><td>1/16–1/8 oz jig + plastic or minnow, drop-shot, worm on a bottom rig</td></tr>
        <tr><td class="s">Fall</td><td>Feeding up in schools — often the year's best jumbo-perch action</td><td>Jig + minnow, small blade bait, spoon — vertical over the school</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Because perch feed by sight in daylight, they often bite best in <b>bright midday conditions</b> — the opposite of walleye — though low light and stable weather help. Cold fronts push schools deeper and slow them. The cardinal rule is mobility: perch schools roam, so if the bites stop, the school has moved — go find them rather than waiting.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Ultralight spinning &amp; ice gear</h3><p style="margin:4px 0">A 5'–7' light or ultralight spinning rod with a 1000–2500 reel and <b>2–6 lb</b> line, small hooks and 1/16–1/8 oz jigs. A classic two-hook 'perch rig' (or crappie rig) tipped with minnows covers the bottom efficiently. In winter, a sensitive ice rod with tiny tungsten jigs and spoons.</p><div class="pick"><b>Baits:</b> minnows, pieces of crawler, small soft plastics, spikes/waxworms; spoons (Kastmaster, Swedish Pimple) for ice.</div></div>
        <div class="fightline"><span class="stars">★★☆☆☆</span><b>Fight: 2/5 — modest, but they come by the bucket.</b></div>
        <p>A yellow perch gives a light, tapping tug and a short pull — nobody hooks a perch for the battle. The appeal is two-fold: they school thick, so a good spot means fast, steady action that's perfect for kids and ice anglers, and the firm white fillets are widely rated <b>among the finest-eating freshwater fish there is</b>.</p>` },
      { h:"Relatives — the perch family",
        body:`<p>The yellow perch anchors the <b>Percidae</b> family alongside its larger predatory cousins the <b>walleye</b> and <b>sauger</b> (and their saugeye hybrid), plus the tiny darters. It's sometimes called the 'American', 'ringed' or 'lake' perch, and shouldn't be confused with the unrelated European perch or with 'white perch' (a temperate bass) or the 'silver/speckled perch' names southerners use for crappie. <span class="src">See the walleye profile for the predatory side of the perch family.</span></p>` }
    ],
    conservation:"Prolific schooling panfish that handle and often benefit from harvest of mid-size fish, which thins stunting year-classes. The exception is the big-water stocks — Great Lakes perch have seen sharp ups and downs and are regulated with bag limits and seasons to protect them; respect those. Few fish reward a full creel at the table like perch.",
    refs:[
      {t:"Yellow perch — Wikipedia", u:"https://en.wikipedia.org/wiki/Yellow_perch"},
      {t:"Yellow perch fishing — Take Me Fishing", u:"https://www.takemefishing.org/fish/freshwater-fish/yellow-perch/"},
      {t:"Yellow perch — Illinois DNR", u:"https://dnr.illinois.gov/"},
      {t:"Perch tactics — In-Fisherman", u:"https://www.in-fisherman.com/editorial/perch/"}
    ]
  },
  flathead:{
    tagline:"The big-river apex catfish — a solitary, live-prey hunter that lurks in the timber by day, prowls the flats by night, and grows past 100 pounds.",
    sections:[
      { h:"Identification",
        body:"<i>Pylodictis olivaris</i> — the 'yellow cat', 'mud cat' or 'shovelhead'. Unmistakable: a broad, <b>flattened head</b> with a <b>protruding lower jaw</b>, small eyes, mottled yellow-to-olive-brown flanks, and a <b>squared (not deeply forked) tail</b>. Where channel and blue cats are sleek and fork-tailed, the flathead is blocky and predatory-looking. It's the second-largest North American catfish, reaching well over 100 lb." },
      { h:"Biology &amp; life history",
        body:"Flatheads are <b>cavity nesters</b> — in early summer (around 70–75°F) the male finds a hollow log, undercut bank or cavity, and guards the egg mass and fry. They're long-lived (20+ years) and slow-growing, maturing into a true <b>apex predator</b>. Critically, they are <b>solitary</b> — not the roaming schools of channels or blues — each big flathead holding its own piece of prime cover." },
      { h:"Behavior &amp; seasonal patterns",
        body:"A classic ambush predator: by day the flathead buries in <b>deep cover</b> — logjams, root wads, undercut banks, the deepest holes — and at night it moves out onto shallower flats, riffles and hole-mouths to hunt. It is strongly <b>nocturnal</b>. In winter flatheads pack into the deepest river holes and go nearly dormant, feeding little. Find the wood and the deep holes and you've found the fish." },
      { h:"Diet &amp; forage",
