  /* ---- Arkansas trout waters ---- */
  "Spring River (Mammoth Spring)":[
    "Mammoth Spring — one of the largest springs in the world — gives Arkansas its only major spring river: ~58\u00b0F constant flow with no dam and no generation schedule, just dependable cold water sliding over bedrock ledges and falls for a dozen miles past Hardy. AGFC stocks 134,000+ rainbows a year at nine accesses; Dam 3 is the storied pool.",
    "Biology: constant temperature and flow make this the most ecologically stable trout water in the state — fish distribute along the ledge-pool drops and feed on a steady conveyor of scuds, sowbugs and drifting invertebrates year-round. No generation pulses means no forced feeding windows: light, current and canoe traffic set the rhythm instead. Browns hold over and grow; the falls oxygenate the summer water that would otherwise warm."
  ],
  "Little Red River (below Greers Ferry)":[
    "The tailwater that produced the 40 lb 4 oz world-record brown trout (Rip Collins, 1992): cold bottom-water from Greers Ferry Dam runs ~30 miles past Heber Springs, through the JFK catch-and-release area, Cow Shoals' walk-in water and a string of private-resort shoals.",
    "Biology: the Little Red is a sowbug factory — its weed beds and gravel carry one of the densest isopod populations of any Ozark tailwater, which is why a #14 gray sowbug is the river's whole food pyramid in one fly. Browns spawn on the shoals in fall (redd closures matter here) and grow enormous on the hatchery-effluent-enriched drift; rainbows are the stocked staple. Generation rules everything: low water = technical wading, high water = streamer drifting."
  ],
  "Beaver Tailwater":[
    "The shortest of the White River system tailwaters: ~7 cold miles below Beaver Dam near Eureka Springs, with an artificials-only special-regulation zone from the dam to Parker Bend and family-friendly stocker water below.",
    "Biology: a young, compact food web — midges and scuds dominate, so the fish feed small and often. Rainbows are the stocked majority; browns hold over and concentrate at the dam pool and the deeper bends. Because the tailwater is short, temperature rebounds quickly downstream in summer, compressing the trout water and concentrating fish (and anglers) in the upper miles. Winter generation patterns make it the region's most wade-friendly cold-season water."
  ],
  "Little Missouri River (below Greeson)":[
    "A small, seasonal jewel: Narrows Dam meters cold water through a boulder-and-gravel valley near Murfreesboro for about six wadeable miles. AGFC stocks trout through the cool months; summer hands the river back to smallmouth and sunfish.",
    "Biology: this is a put-and-take winter fishery by design — the tailwater warms past trout comfort by late spring, so November–April stockings ride the cold window. The river's Ouachita-mountain geology (tilted shale ledges, quartz gravel) builds plunge pools that hold fish tight; upstream of the lake, the same river at Albert Pike is a flashy, flood-prone wild smallmouth stream. Two rivers, one name, divided by a dam."
  ],
  "Sylamore Creek":[
    "North Sylamore Creek drains the sandstone bluff country of the Ozark National Forest, running past Blanchard Springs Caverns to meet the White River at Allison — swimming-hole clear, hemmed in white cliffs, with stocked trout in Mirror Lake and the cold lower reaches.",
    "Biology: the creek itself is a warmwater Ozark stream (smallmouth, sunfish) for most of its run; the trout story is local and spring-driven — Blanchard's cave-fed flow chills Mirror Lake and the short reach below it. Where the creek meets the White River's tailwater cold, trout from the big river push into the creek mouth. It's a boundary-water fishery: three thermal regimes inside two miles."
  ],
  /* ---- Arkansas smallmouth & float rivers ---- */
  "Buffalo National River":[
    "America's first National River (1972) — 135 undammed miles from the Boston Mountains' Hemmed-in-Hollow country to the White River, under some of the tallest bluffs in mid-America. The upper river floats in spring, the middle and lower hold summer pools at Tyler Bend and Buffalo Point.",
    "Biology: an intact, free-flowing river means natural flow ecology — smallmouth spawn on the spring rise, summer concentrates everything into the deep bluff pools as riffles thin, and fall turns the long gravel runs back on. The Buffalo's smallmouth are classic slow-growing Ozark Northerns; goggle-eye (Ozark bass) and longears fill the rock. No dams also means the river breathes with rain: levels can triple overnight, and the fish are conditioned to feed hard on the falling side of a rise."
  ],
  "Crooked Creek":[
    "Maybe the most famous smallmouth creek in mid-America: a spring-influenced Ozark stream winding from Harrison to the White River at Yellville-country, with AGFC's Fred Berry Conservation Education Center sitting on a horseshoe bend of it.",
    "Biology: Crooked Creek grows smallmouth faster than almost any Ozark stream — warmer than the trout rivers but cold enough to stay smallmouth water, with heavy crawfish density in its endless chert gravel. AGFC manages it as a Ribbon-class smallmouth fishery; 18\u201320\" fish are realistic. Drought years pinch the pools and concentrate fish; wet years redistribute them — scouting beats memory here."
  ],
  "Kings River":[
    "The quiet trophy river: rising in the Boston Mountains and flowing north to Table Rock Lake, the Kings drains remote Madison and Carroll county hill country past Trigger Gap toward Berryville — a float river with little development and a big-fish reputation.",
    "Biology: long, deep, bluff-walled pools separated by short riffles are big-smallmouth architecture — fewer, larger territories and abundant crayfish/shiner forage. The Kings' trophy reputation is also cultural: a strong local release ethic protects the slow-growing fish that take 8\u201310 years to reach 18 inches. White bass run up from Table Rock each spring; the lower river doubles as their highway."
  ],
  "Mulberry River":[
    "Arkansas' wild child: a National Wild & Scenic mountain river falling out of the Ozark NF through Class II\u2013III ledges in spring, then settling into emerald pools by June. Turner Bend's store has been the river's headquarters for a century.",
    "Biology: the Mulberry is flashy and infertile — a boom-bust hydrology that selects for opportunistic, aggressive smallmouth (small average size, outsized attitude). Spring floods rebuild the gravel and redistribute wood; summer pools stratify and push fish to the shaded heads where riffles feed in oxygen and crawfish. Goggle-eye and longears stack the ledges. Fish the transitions: the first deep pool below every rapid."
  ],
  "War Eagle Creek":[
    "A pastoral Ozark creek looping past the 1873 War Eagle Mill to the Beaver Lake arm that bears its name — half smallmouth stream, half lake-run highway, all northwest-Arkansas charm.",
    "Biology: the creek's lower miles live a double life — resident smallmouth and goggle-eye hold the rocky runs year-round, while spring sends Beaver Lake's white bass (and some walleye) surging upstream to spawn in the creek mouth and lower shoals. That seasonal injection of lake biomass is the creek's defining pulse; locals time it by the dogwoods blooming."
  ],
  "Strawberry River":[
    "A low-pressure Ozark-foothills river sliding southeast toward the Black River — pastureland bluffs, gravel bottoms, and one of the healthiest unsung smallmouth populations in the state.",
    "Biology: the Strawberry sits on the Ozark margin where gradient softens — its smallmouth share water with spotted bass and (lower down) largemouth as the river warms and slows. The stream supports notable freshwater-mussel diversity, a marker of clean, stable substrate — the same gravel quality that makes its smallmouth spawning so consistent. AGFC's smallmouth-stream management nudges anglers toward release."
  ],
  "Saline River":[
    "The last free-flowing major river of the Ouachita drainage: three mountain forks gather above Benton and run undammed to the coastal plain — smallmouth water up top, largemouth-flathead water below, with Peeler Bend and the Benton parks as the access spine.",
    "Biology: undammed means intact longitudinal ecology — Ouachita-strain smallmouth (a distinct lineage from Ozark fish) in the rocky upper forks grade into spotted bass mid-river and largemouth/flathead in the lowland reaches. The river is also a mussel and crayfish stronghold, which underwrites the bass forage. Flow is rain-driven: summer pools shrink and the upper forks become wade-only pocket water."
  ],
  "Cossatot River":[
    "The 'skull crusher' (its Indian-trader name) — a National Wild & Scenic Ouachita river whose Cossatot Falls ledges are Arkansas' most famous whitewater. Between the rapids: clear plunge pools in tilted sandstone, holding bass that earn their living in current.",
    "Biology: the Cossatot's smallmouth and spotted bass live in a high-energy, low-fertility system — small home pools, fast metabolic seasons, crawfish-and-hellgrammite diets. Summer low flow disconnects the pools, making each one a closed arena (catch rates feel binary: the pool's on or it's empty). The state park-natural area protects the corridor; wade studs and a dry bag are gear, not suggestions."
  ],
  "Eleven Point River (AR)":[
    "The Eleven Point's gentler second act: after its spring-fed Missouri run it crosses into Arkansas, warms by degrees, and floats quietly past farmland bluffs to meet the Spring River near Pocahontas.",
    "Biology: a thermal gradient river — the upper Arkansas miles keep enough spring influence for the odd holdover trout, but the river belongs to smallmouth, goggle-eye and channel cats that thrive in the warming flow. It's an ecotone fishery: Ozark species upstream blend toward lowland species (spotted bass, more catfish) as the gradient flattens toward the Black River system."
  ],
  "Illinois River (NW Arkansas)":[
    "Northwest Arkansas' home river, gathering Osage and Clear creeks off the Springfield Plateau and heading for Oklahoma's Lake Tenkiller — pastoral gravel-and-wood smallmouth water with the Siloam Springs Kayak Park as its modern front door.",
    "Biology: nutrient enrichment from the watershed's poultry-and-pasture economy makes this one of the fastest-growing smallmouth fisheries in the Ozarks — chunky fish on abundant forage — while the same nutrients drive summer algae and interstate water-quality politics. The river is the Neosho smallmouth's eastern edge; conservation groups treat its genetics as a priority. Dawn beats the heat, the paddlers and the algae bloom all at once."
  ],
  /* ---- Missouri reservoirs & big rivers ---- */
  "Pomme de Terre Lake":[
    "A 7,800-acre Corps lake at Hermitage where Missouri decided, back in 1966, to grow muskies — and never stopped. It's the state's flagship muskellunge program, complete with its own Muskies Inc. chapter, alongside ordinary-excellent Ozark-margin crappie and bass fishing.",
    "Biology: muskies are a coolwater apex predator stocked at the southern edge of what they can tolerate — Pomme works because of depth, gizzard shad abundance and decades of program refinement. Summer surface temps push them onto deep weedlines and thermocline edges (and make August catch-and-release genuinely risky for the fish — fight fast or fish other months). Growth is excellent: low-40s fish exist. The 'fish of 10,000 casts' math improves dramatically in June and Sep–Oct feeding windows. Everything else in the lake — crappie on brush, largemouth on points — lives one tier down from the toothy headliner."
  ],
  "Mark Twain Lake":[
    "Northeast Missouri's only big reservoir: 18,600 acres of flooded Salt River timber and stained prairie water near Monroe City — the region's crappie-and-catfish pantry and a five-species generalist lake without the Ozark crowds.",
    "Biology: turbid, nutrient-rich prairie watersheds grow plankton, plankton grows shad, and shad grow everything else — Mark Twain's crappie fatten faster than their clear-water Ozark cousins and stack predictably on the abundant standing timber (sight-feeding range is short in stained water, so fish hold tight to objects). Channel cats thrive in the warm coves; blues use the old river channel. White bass and stocked walleye/hybrids patrol the windblown flats. Visibility rules everything: bright colors, vibration, and tighter-to-cover presentations than you'd use at Stockton or Table Rock."
  ],
  "Smithville Lake":[
    "Kansas City's 7,200-acre backyard reservoir, ringed by parkland north of the metro. Decades of MDC brush-pile work plus a protective crappie regulation rebuilt it into one of the best slab fisheries in western Missouri, with a credible walleye program on top.",
    "Biology: the crappie story is a management story — length/creel limits let fish reach the fast-growth years instead of being cropped at 8 inches, and the size structure responded. The lake's flooded-timber arms and ~200 marked piles concentrate them seasonally (shallow wood at spawn, channel-edge piles in summer/winter). Walleye are stocked annually; they behave like reservoir walleye anywhere — riprap and wind in spring, deep flats and bottom-bouncer country by summer. One myth to retire: the muskies from a long-dead stocking experiment are gone. No muskie here."
  ],
  "Bull Shoals Lake (MO arm)":[
    "The quiet upper end of a 45,000-acre White River monster shared with Arkansas — the Missouri arms (Theodosia, Pontiac) are steep, clear, mostly undeveloped Corps shoreline where the crowds thin and the water is pure highland-reservoir glass.",
    "Biology: ultra-clear, infertile White River water means slower growth but exceptional condition — Bull Shoals bass (all three black bass species) are deep-bodied fish that live in a vertical world: 45° rock banks, bluff ends, and a thermocline that dictates summer life at 25–35 ft. Threadfin shad die-offs in cold winters periodically reset the forage clock and turn late-winter jerkbait fishing absurd. Walleye (a native White River fish, reinforced by stocking) run the river arms in Feb–Mar. Light line isn't a tip here, it's a requirement — these fish inspect everything."
  ],
  "Lake Wappapello":[
    "An 8,400-acre, deliberately scruffy flood-control lake on the St. Francis River at the edge of the Bootheel — shallow, stained, stump-filled, and beloved for exactly that: it might be the most generous crappie-numbers lake in southern Missouri, with a famous spillway fishery below the dam.",
    "Biology: shallow + fertile + warm = production. Wappapello grows crappie fast and lots of them; the trade-off is size (the lake is managed liberally because growth is quick and natural mortality high). Stumps and laydowns substitute for depth as cover. The spillway works on river-fish logic: Corps releases create current, current concentrates shad and disoriented bait, and crappie/cats/white bass queue up in the outflow — it's the lake's biology compressed into 200 yards of bank fishing. Hot summers push everything to the channel edge and the shaded timber."
  ],
  "Clearwater Lake":[
    "A small (1,630-acre), deep, genuinely clear Corps lake on the upper Black River at Piedmont — an Ozark pocket reservoir that flies under the radar between the giant lakes, with mountain-valley scenery and a cool tailwater below.",
    "Biology: the Black River's clean, spring-influenced inflow keeps Clearwater oligotrophic by Missouri standards — less plankton, fewer but healthier fish, and water clear enough for largemouth to feed by sight at depth. Bass relate to steep rock and the flooded river channel; crappie need the man-made brush because natural cover is sparse. The Corps' flood-control mission swings the pool hard after big rains (this lake exists to protect the lower Black), and every multi-foot rise/fall reshuffles fish — locals fish the rise, tourists fish the memory."
  ],
  "Thomas Hill Reservoir":[
    "A 4,950-acre power-plant cooling lake in the north-Missouri prairie near Macon — the state's premier 'winter bass' destination, where the generating station's warm discharge keeps part of the lake at springtime temperatures all year.",
    "Biology: thermal effluent rewrites the seasonal playbook. The warm plume holds shad and keeps largemouth metabolisms elevated through winter — fish feed, chase and even stage pre-spawn behavior months early near the discharge, while the far end of the lake behaves like a normal iced-over prairie reservoir. In summer the gradient flips: the discharge arm exceeds comfortable temps and fish slide toward cooler, deeper water. Crappie, white bass and channel cats ride the same thermal edges. It's a living experiment in temperature ecology — fish the gradient, not the spot."
  ],
  "Long Branch Lake":[
    "A 2,400-acre Corps lake on the East Fork Little Chariton near Macon — the low-key neighbor to Mark Twain, with a state park ramp, stained prairie water, and fish that see a fraction of the pressure.",
    "Biology: standard north-Missouri prairie-reservoir ecology — turbidity-driven, object-oriented fish. Crappie and largemouth hold tight to the marked brush, bridge pilings and riprap because visual range is short; minnow-scent matters more here than in clear water (a reason live bait outfishes plastics on tough days). White bass cruise wind-pushed plankton lines in late spring. Nothing exotic, everything honest: it's a numbers fishery where a quiet Tuesday and a bucket of minnows reliably beats technology."
  ],
  "Fellows Lake":[
    "Springfield's 820-acre water-supply reservoir on the Little Sac — no-wake, kayak-friendly, and pound-for-pound one of Missouri's most interesting fisheries: a serious walleye lake AND the state's second muskie program in less than a thousand acres.",
    "Biology: deep, cool, clear water (it's drinking water) gives both coolwater predators what they need at Ozark latitude. Recent MDC surveys make the case — ~44% of muskie over the 36\" minimum, fish to 48\" and 34 lb, and a third of walleye over 20\". Small water concentrates the food web: shad and stocked-forage schools are never far from a predator, which is why trolling the old creek channel works disproportionately well. The no-wake rule is an ecological gift — low disturbance keeps fish shallower and calmer than at powerboat lakes."
  ],
  "Lake Jacomo":[
    "A 970-acre county-park lake in Fleming Park, Blue Springs — Kansas City's everyman fishery, horsepower-limited and infrastructure-rich (jetties, piers, sunken cedar program, rental boats), with surprisingly legitimate crappie, bass and stocked-walleye fishing.",
    "Biology: urban park-lake management done right — the county sinks cedars annually and the fish community organizes around that artificial habitat grid. Crappie are the keystone species; largemouth use the same wood plus the riprap crayfish belt; stocked walleye and channel cats fill the open-water and bottom niches. Pressure is the dominant ecological force here: fish are conditioned to standard presentations by June, so the anglers who keep catching are the ones who downsize, fish dusk-dark, or hit the cold months when the crowds (not the fish) disappear."
  ],
  "Montrose Lake":[
    "A 1,500-acre cooling lake on Deepwater Creek in west-central Missouri, paired with the surrounding Montrose Conservation Area wetlands — half power-plant bass lake, half waterfowl marsh, all weird and wonderful in winter.",
    "Biology: like Thomas Hill, Montrose runs on thermal subsidy — the discharge keeps water open and largemouth active through the coldest months, creating Missouri's strangest sight: steam on the water, ice in the guides, and bass chasing lipless cranks in January. The warm water also super-charges the growing season, so fish here are heavy for their length. The CA's waterfowl mission means seasonal access closures and crowds of a different feather in fall — check area regs. Channel cats and crappie work the same thermal edges all winter."
  ],
  "Missouri River (Boonville reach)":[
    "Mid-Missouri's stretch of the Big Muddy: channelized, dike-lined and powerful, sliding past Boonville, Rocheport bluffs and the mouths of the Lamine and Moniteau. No structure is natural, but the engineered structure — wing dikes, notches, revetment — is a catfish housing project.",
    "Biology: blue catfish are the river's apex generalist — migratory, long-lived (40+ years), and tied to current: they rest in dike-tip scour holes and feed on flats and bar edges when light drops. The Asian carp invasion accidentally built the best trophy-cat forage base in a century (fresh-cut silver carp is now THE bait). Flatheads are the opposite personality — sedentary cavity ambushers in log jams and revetment holes, strictly live-bait fish. Sauger, the turbid-water specialist (better low-light vision than walleye), winter below dike tips. Everything in this river organizes around current seams."
  ],
  "Missouri River (Kansas City)":[
    "The urban Big Muddy: from Parkville past the Kaw mouth and downtown KC's bridges to La Benite — dike fields and deep outside bends fished within sight of skyscrapers. MDC consistently rates this among the state's best trophy blue-cat water.",
    "Biology: the Kansas River confluence is the biological engine — merging flows concentrate drifting shad and carp, and the mixing zone's scour holes hold the reach's biggest blues. Urban warmth (effluent, runoff) keeps winter water a touch warmer and the cats a touch more active than in rural reaches. Flatheads dominate the riprap and bridge-pile cavities. The same channelized-river rules apply: fish move seasonally along the river (telemetry shows blues ranging dozens of miles), but they always position on the same kinds of current breaks — learn one dike field deeply and you've learned them all."
  ],
  "Mississippi River (Cape Girardeau)":[
    "The open Middle Mississippi — no locks, no dams, just barge traffic and brute current below the Ohio-bound grain fleet, running past Cape Girardeau's floodwall toward the Ohio confluence. This is Missouri's heavyweight division: 100-pound blue catfish water.",
    "Biology: the middle river's unimpounded current sorts fish by power — only large-bodied species hold the main channel (blues, flatheads, big drum), while everything else lives in dike-field slack and side channels. Winter is the trophy season because cold water gangs blues into a few massive scour holes, turning a 50-mile river into a dozen spots. Skipjack herring — an oily, current-loving shad relative — is the premium forage/bait, itself a migratory fish that stacks below obstructions. Sauger and white bass use tributary mouths as thermal/feeding refuges. Respect notes are biology too: barge wakes and 38°F water are the reach's apex predators."
  ],
  "Mississippi River (St. Louis area)":[
    "The confluence reach: the Missouri pours in at Columbia Bottom, the Chain of Rocks rapids (the only whitewater on the lower Mississippi) bends the river, and the Melvin Price dam tailwater churns just upstream at Alton. More concentrated fish-holding water than any other big-river reach in the state.",
    "Biology: confluences and tailwaters are big-river buffets — mixing currents disorient and concentrate shad, and predators queue on the seams in rank order: blues and flatheads in the deep slots, white bass and hybrids flashing through the upper column, drum everywhere. The Alton tailwater functions as a fish dam: spring spawners (white bass, walleye/sauger, skipjack) pile against it. Asian carp dominate the biomass — an ecological problem that doubles as an endless bait supply. The Chain of Rocks low-water dam is genuinely lethal to boats; the fish below it in the rapids' scour are best reached from the bank."
  ],
  "Osage River (below Bagnell Dam)":[
    "Missouri's classic hydro tailwater: Bagnell Dam holds back Lake of the Ozarks and meters the Osage out through its turbines toward the Missouri River. Bank-accessible, current-driven, and home to spring runs that feel more like the Great Lakes than the Ozarks — plus Missouri's signature paddlefish water.",
    "Biology: dams turn rivers into pulse fisheries. Generation creates current; current moves shad through the turbines (stunned and easy) and switches every predator on within minutes — white bass and hybrids in the fast seams, crappie on the eddy edges, blues and flatheads in the scour holes. Spring white-bass runs stack against the dam exactly like the Sac below Stockton. Paddlefish — plankton-straining river giants that can't be caught on lures — gather here too, supporting a dedicated snagging season with its own regs. Learn the generation schedule and you've learned the river's heartbeat."
  ],
  /* ---- Missouri smallmouth rivers ---- */
  "Jacks Fork River":[
    "The wilder half of the Ozark National Scenic Riverways: a narrow, spring-fed canyon river that joins the Current at Two Rivers. The upper river (Prongs to Alley Spring) is floatable only in spring and runs through some of the most remote country in the Ozarks; Alley Spring's 81 million gallons a day reset the river's flow and clarity for the lower half.",
    "Biology: Northern-strain smallmouth living lean in infertile, gin-clear water — they grow slowly, fight absurdly, and a 15\" Jacks Fork fish may be 7–8 years old, which is exactly why the one-fish/15\" SMA rule matters. Forage is crayfish, hellgrammites and minnows in the gravel; the biggest fish own the deepest bluff pools and feed at light change. Goggle-eye here are Ozark bass (Ambloplites constellatus) — a White River-drainage endemic found almost nowhere else on Earth — plump, copper-eyed, and happy to eat a small crank along the rock."
  ],
  "Big River":[
    "The St. Louis area's home smallmouth river: a slower, warmer Meramec tributary winding out of the old Lead Belt through Washington and St. Francois state parks toward De Soto. Special-management water (15\"/one daily) gives the metro a real trophy stream less than an hour from the Arch.",
    "Biology: warmer water and richer forage than the spring-fed rivers mean Big River smallmouth grow faster and thicker, and largemouth share the slack water and wood. The catch: legacy mining means elevated lead in sediment and fish tissue along stretches — heed MDC's consumption advisories and treat it as a catch-and-release river (the regs nudge you there anyway). Northern rock bass, longear sunfish and channel cats round out the system. Smallmouth key on crayfish hard here — crawfish-pattern anything, fished on the rock transitions, is the river in one sentence."
  ],
  "Gasconade River":[
    "Missouri's longest river entirely in-state (~280 winding miles), corkscrewing through the northern Ozarks from Hartville to the Missouri River at Gasconade. The Phelps/Pulaski SMA reach around Jerome is the famous water, with massive bluff pools, long gravel races and far less float traffic than the Riverways streams.",
    "Biology: the Gasconade is a transition river — cool enough up top for quality smallmouth, big and warm enough downstream for walleye, flatheads and serious channel cats. Its smallmouth pod up in winter in the deep bluff holes (40+ fish in one hole is real), which is why MDC's own prospects call winter the best smallmouth window. The spring walleye run out of the lower river is an old native-riverine-strain fishery — fish push to hole tails and tributary mouths in March. Goggle-eye here are true northern rock bass; they stack on root wads year-round."
  ],
  "Big Piney River":[
    "The Gasconade's quieter sibling, rising in the Big Piney backcountry and joining the Gasconade near Fort Leonard Wood. The Slabtown-to-Ross SMA float (15 miles, one gravel-bar night) is a Missouri rite of passage: limestone bluffs, zero towns, and smallmouth water the whole way.",
    "Biology: classic infertile-Ozark trophic math — slow-growing, long-lived Northern smallmouth that defend the best crayfish water (rock gardens, riffle heads, root wads) and get measurably bigger in the protected SMA reach. Hellgrammites are a signature forage here; when fish snub crankbaits, a black soft-plastic crawled on bottom imitates them. The river runs a few degrees warmer than the Current system (fewer big springs), so the dawn/dusk topwater window is wider and the midday bite deeper. Ozark bass-style goggle-eye fishing is excellent throughout."
  ],
  "Elk River":[
    "Southwest Missouri's border river, formed by Big Sugar and Little Sugar creeks at Pineville and running west past Noel into Oklahoma's Grand Lake arm. Summer floating is huge business here — but beneath the tubes, it's arguably the best trophy-smallmouth water in that corner of the state, protected by a 15\" minimum.",
    "Biology: this is Neosho smallmouth country — a genetically distinct native lineage of the western Ozark drainages (Elk, Spring, Illinois river systems), slimmer-bodied and adapted to these warmer, flashier prairie-margin streams. MDC manages them as a conservation priority; keeping the big ones wet protects a native genome, not just a fishery. The river's forage (crayfish, shiners, sculpin) plus longer growing season makes Elk fish heavier at length than Riverways smallmouth. Goggle-eye are abundant; spotted bass sneak in from the lake end."
  ],
  "St. Francis River":[
    "The Ozarks' only whitewater: through the St. Francois Mountains the river slots between billion-year-old igneous shut-ins (Millstream Gardens, Silver Mines) before settling down past Sam A. Baker State Park. No dams, no springs of consequence — it's a warm, rain-driven river with boulder structure no other Missouri stream has.",
    "Biology: smallmouth here live in pocket water like mountain trout — the igneous boulders create depth, shade and crayfish crevices, and fish hold tight to them. The system marks a faunal boundary: its goggle-eye are shadow bass (Ambloplites ariommus), not the Ozark bass of the White drainage or the rock bass of the Meramec — three lookalike species split neatly by drainage, a tidy lesson in Ozark biogeography. Big Creek at Sam A. Baker adds a cool, clear tributary fishery. Summer low water turns the shut-ins into a wade-and-stalk game; spring runoff turns them into Class IV whitewater. Time it right."
  ],
  "Black River":[
    "Three forks fall off the Taum Sauk highlands and meet near Lesterville to form one of the clearest floatable rivers in Missouri, running down to Clearwater Lake. The Mill Creek–to–lake reach is the fishery; Johnson's Shut-Ins and Taum Sauk Mountain bracket the upper valley.",
    "Biology: spring-influenced but not spring-dominated, the Black runs a middle thermal path — warm enough for fast smallmouth growth, clear enough that the fish are line-shy and light-sensitive. Shadow bass fill the goggle-eye niche (St. Francis drainage relatives). The river's exceptional clarity concentrates daytime fish under wood and bluff shade and pushes real feeding to dawn/dusk; after summer cold fronts the deep pools near the lake fish best. Walleye from Clearwater Lake push upriver in late winter — the first deep holes above the lake hold them."
  ],
  "Huzzah Creek":[
    "The Meramec's twin spring creeks — Huzzah and Courtois — drain the Courtois Hills west of Steelville, the Ozarks' float-camp heartland. The Huzzah is the slightly bigger, slightly busier of the pair: pea-gravel bottoms, root-wad banks, and water clear enough to count the smallmouth that just refused you.",
    "Biology: small water, small home ranges — a Huzzah smallmouth may live its whole life in a few hundred yards of creek, which is why pressure shows so fast and why the creek fishes 'fished-out' on Sunday and fine again Thursday. Crayfish and hellgrammites drive the diet; northern rock bass and longear sunfish fill every secondary lie. Summer thermal refuges (spring seeps, deep shaded pools) concentrate everything when the riffles hit the high 70s — find one cold seep and you've found the creek's fish."
  ],
  "Courtois Creek":[
    "Pronounced 'Codaway' by anyone local, the Courtois is the Huzzah's quieter mirror: a touch smaller, rockier and twistier, joining the Huzzah just before the Meramec. Berryman-area headwaters wade; the lower creek floats in normal spring flows.",
    "Biology: same Meramec-basin biology as the Huzzah — northern rock bass, longear sunfish, crayfish-driven smallmouth — but the Courtois's tighter valley keeps it cooler and clearer a few extra weeks each summer, and its fish hold even tighter to wood. The creek's smallmouth skew slightly smaller but more numerous; the genuinely good fish live where a bluff pool adds depth to the pattern. It's a teaching stream: every Ozark creek skill (upstream presentation, reading gravel seams, fishing shade lines) scales up from here to the big rivers."
  ],
  "Bourbeuse River":[
    "The Meramec's slow sibling: a muddy-banked, wood-choked lowland-feeling river meandering ~150 miles to cover 50 as the crow flies, joining the Meramec near Union. No springs, no bluffs to speak of — just laydowns, long pools and fish that never see a Ned rig.",
    "Biology: the warmest major stream in the Meramec basin grows the basin's heaviest smallmouth alongside legitimate largemouth — the slow, fertile water and abundant shiner/crayfish forage produce football-shaped fish that fight like river bass but feed like lake bass (ambush, wood, shade). Flatheads are the apex fish: cavity-spawners that own the log jams and eat live sunfish at night. Below Union the river turns catfish-first. Turbidity is the river's personality — fish vibration and profile (spinnerbaits, chatterbaits, black/blue) and don't bother waiting for it to 'clear.'"
  ],
  "Sac River":[
    "A prairie-Ozark hybrid flowing north out of the Springfield Plain into Stockton Lake, then on (as the dam-controlled lower Sac) toward the Osage. The river is really two fisheries split by the reservoir: modest creek-smallmouth water above, and a busy tailwater below Stockton Dam.",
    "Biology: above the lake, smallmouth share thin prairie-stream water with largemouth — it's edge-of-range habitat, decent fish, light pressure. Below the dam, the biology is migration: every spring, white bass (and walleye) that live in Truman's system and the lower Sac run upstream until the dam stops them, stacking in the tailwater in classic river-spawner fashion — current, gravel, and a wall. That's why April below Stockton Dam looks like a parking lot. Hybrids and channel cats ride the same generation-driven food conveyor all summer."
  ],
  "Big Sugar Creek":[
    "An upper fork of the Elk River system east of Pineville, running through Big Sugar Creek State Park country: skinny, swift, gravel-bottomed wade water in the state's far southwest corner.",
    "Biology: like the Elk it feeds, Big Sugar holds native Neosho-lineage smallmouth — the small-stream expression of them: compact, aggressive fish defending pocket lies in fast, warm, flashy water that can triple overnight with a thunderstorm and shrink to a trickle by September. Rapid flow swings select for opportunists, which is why Big Sugar fish hit topwater so recklessly at dawn. Shadow/Ozark-type goggle-eye, longears and green sunfish fill out the creek. It's also a swimming-hole creek in July — biology includes Homo sapiens displacement; fish around them, early."
  ],
  /* ---- Missouri trout parks & wild trout streams ---- */
  "Roaring River (State Park)":[
    "Deep in the far-southwest Ozarks near Cassville, Roaring River Spring pours ~20 million gallons a day out of a dramatic bluff-bottom pool and runs cold (a constant ~57–58°F) through a narrow, fast valley — the steepest and most pocket-watery of Missouri's four trout parks. The hatchery sits at the spring; below the park, a 4-mile White Ribbon stretch continues toward Table Rock Lake.",
    "Biology: these are hatchery rainbows stocked nightly in season, but the constant spring temperature means fish that dodge the stringer 'naturalize' fast — within weeks holdovers stop chasing dough bait and key on what the stream actually grows: scuds, sowbugs, midges and small mayflies. That's why the fly zone fishes technical by June. The occasional brown trout (15\" minimum) is a holdover that's learned the game; the biggest live under the undercut bluff banks and eat after the crowds leave."
  ],
  "Bennett Spring (State Park)":[
    "Missouri's busiest trout park, west of Lebanon, where Bennett Spring delivers ~100 million gallons a day into a broad, gentle spring branch that runs about a mile and a half to the Niangua River. Wide, even gravel runs make it the most wadeable and beginner-friendly of the parks — and the most crowded: opening day (March 1) is a shoulder-to-shoulder Missouri institution.",
    "Biology: constant ~56–58°F water and heavy daily stocking create a two-tier fishery — fresh stockers that eat anything bright for their first days, and educated holdovers that behave like wild fish, sipping scuds and midges in the slick water. The spring's stable flow grows dense weed beds that hold Gammarus scuds (the protein engine of the fishery — hence the local cracklebacks and scud patterns). Fish that drop into the Niangua hold around the confluence in a cool-water plume all summer."
  ],
  "Montauk (State Park)":[
    "The birthplace of the Current River: Montauk's springs (~43 million gallons/day) join Pigeon Creek in a wooded valley near Salem to start one of America's great spring rivers. The park water mixes meadow runs, mill-pond flats and faster gravel; below the park boundary the river immediately becomes the Blue Ribbon wild section toward Cedargrove and Akers.",
    "Biology: stocked rainbows rule the park, but Montauk's real story is what happens downstream — escapees and wild-spawned rainbows establish in the cold upper Current, where constant spring flow, pteronarcys-free but scud/sowbug-rich forage and abundant woody cover produce genuinely stream-bred fish. Browns stocked in the system grow big on sculpins and crayfish and turn nocturnal with size. The transition zone right at the park boundary — stocker density meets wild-fish wariness — is some of the most interesting water in the state."
  ],
  "Maramec Spring Park":[
    "A privately run park (The James Foundation) outside St. James, built around Missouri's fifth-largest spring: ~96 million gallons a day welling out of a 100-ft-deep azure basin and running a short, rich spring branch to the Meramec River. The setting — old ironworks, tame deer, the spring pool itself — makes it the most scenic quick stop in the trout-park system.",
    "Biology: the branch is short and food-dense (scuds, sowbugs, cress bugs in the watercress and elodea), so stockers fatten fast; MDC's hatchery on-site raises many of the fish stocked statewide. The serious biology is at the confluence: the spring's cold plume refrigerates several miles of the Meramec, creating the Red Ribbon zone where holdover rainbows and browns live wild. Those Meramec browns grow on crayfish and minnows to sizes the park water never sees — the 15\"+ browns caught each winter are river fish, not park fish."
  ],
  "Crane Creek":[
    "A brushy, jump-across spring creek in the Springfield Plain southwest of Springfield, holding what biologists believe are the purest remaining McCloud River (California) strain rainbow trout anywhere — including California. Stocked in the late 1800s from the famous Wytheville/McCloud shipments and untouched by hatchery fish since 1967, Crane's rainbows are a living genetic museum.",
    "Biology: a century-plus of natural selection in a tiny, clear, predator-rich creek built a fish that is small (8–12\" is typical, anything bigger is exceptional), brilliantly colored, and explosively wary — survival here selected for the spook reflex. They spawn on the limited gravel in winter, eat midges, micro-mayflies, scuds and terrestrials, and hold under root wads and watercress edges. MDC manages it as Blue Ribbon water and as a genetic reservoir: if disease ever wiped Missouri's hatchery system, Crane Creek is the backup drive. Fish it like it matters — because it does."
  ],
  "Little Piney Creek":[
    "A spring-fed Ozark creek south of Rolla where Lane, Piney and Yancy Mill springs keep ~10 miles cold enough for one of Missouri's densest wild rainbow populations — over 1,000 fish per mile in the Lane Spring reach. Blue Ribbon regs protect the upper creek; a White Ribbon stocked stretch runs below Milldam Hollow.",
    "Biology: the rainbows here are naturalized wild fish — descendants of early stockings that found the spring-fed riffle-pool structure, winter spawning gravel and scud/sculpin forage they needed to self-sustain. High density + modest food = lots of eager 7–11\" fish and a few surprises in the deeper bluff pools. Summer base flows drop hard, concentrating fish (and stressing them — handle fast in August). The creek drains to the Gasconade, and the lower White Ribbon water picks up smallmouth and goggle-eye as it warms."
  ],
  "Blue Springs Creek":[
    "An hour from St. Louis off I-44 at Bourbon, Blue Spring feeds a 5-to-20-foot-wide ribbon of cold water that runs ~4 miles through Blue Springs Creek Conservation Area to the Meramec. It's the metro area's wild-trout backyard: tight, brushy, technical, and managed Blue Ribbon (artificials only, one fish 18\"+ — effectively all catch-and-release).",
    "Biology: the wild rainbows descend from fish raised at a small private hatchery by the spring in the early 1900s — they established naturally and have reproduced on their own for a century. In a creek this small the carrying capacity is low: expect 6–10\" jewels, with the rare double-digit fish living in the few true pools. They winter-spawn on pea gravel (watch your boots Nov–Feb), eat midges, scuds and whatever terrestrials the brush drops, and bolt at the first heavy footstep. The creek also seeds the Meramec below — trout occasionally show up in the big river near the mouth."
  ],
  "Roubidoux Creek":[
    "Waynesville's town fishery: Roubidoux Spring (a major conduit spring loved by cave divers) boils up at the edge of downtown and chills the creek's final ~3 miles to the Gasconade. The reach through the city park is among the most heavily stocked White Ribbon water in Missouri — urban-easy access, picnic-table bank fishing, and a surprising winter fishery.",
    "Biology: this is a put-grow-and-take fishery with a thermal twist. The spring plume keeps the immediate town water trout-cold year-round, but the creek warms quickly downstream in summer — so stocked rainbows concentrate near the spring in hot months and redistribute downstream toward the Gasconade in fall/winter. Holdovers learn the drift fast: by midwinter the survivors eat like wild fish (scuds, midges, sowbugs) and the C&R winter season fishes genuinely technical. The Gasconade confluence adds smallmouth, goggle-eye and the odd walleye to the lower creek."
  ],
  "Eleven Point River (MO)":[
    "A National Wild & Scenic River in the remote southern Ozarks, transformed mid-river by Greer Spring — one of the largest springs on the continent (~220 million gallons/day) — which doubles the flow and drops the temperature into trout range in a single bend. Blue Ribbon water runs 5.5 miles from Greer to Turner Mill; White Ribbon continues 14 miles to Riverton. Below that, it's a first-class smallmouth float.",
    "Biology: the Eleven Point is Missouri's best example of a 'two-river' system — warm Ozark stream above Greer, cold tailwater-like spring river below. Stocked rainbows in the Blue Ribbon reach naturalize quickly and reproduce in the spring-branch gravel; the emerald, nutrient-rich water grows scuds, sowbugs and sculpins that put shoulders on fish. Limited road access means low pressure: fish that see few anglers eat confidently but the river's depth and pace make boat-assisted fishing the high-percentage play. Smallmouth below Riverton are classic Ozark Northern-strain fish on crayfish forage."
  ],
  "Lake of the Ozarks":[
    "A sprawling 50,000+-acre Osage River impoundment with over 1,100 miles of shoreline — and that shoreline is the story: mile after mile of boat docks, brush and seawalls. It fishes like a giant cover-and-structure puzzle, with largemouth, spotted bass and a strong crappie population relating to docks, points and timber.",
    "Spring pre-spawn and the fall shad migration into the creek arms are the prime windows; summer pushes bass deep and turns the lake into an early-morning and night fishery to dodge heavy recreational boat traffic. Dock-shooting jigs for crappie and pitching the endless docks for bass are the signature techniques."
  ],
  "Table Rock Lake":[
    "A clear, deep, rocky White River highland reservoir straddling the Missouri–Arkansas line, widely regarded as one of the country's premier bass lakes. Its clarity and structure favor smallmouth and spotted bass alongside largemouth, and it's famous for finesse fishing.",
    "Because the water is clear, light line and finesse presentations — the Ned rig, drop-shot, shaky head and jerkbaits — dominate, especially the cold-water months. Bass relate to chunk-rock banks, bluff ends, points and submerged timber; the many creek arms (James, Kings, Long Creek) each fish a little differently."
  ],
  "Lake Taneycomo":[
    "Not a warmwater lake at all but a cold tailwater: the water released from the bottom of Table Rock Dam keeps Taneycomo cold year-round, creating one of the Midwest's best trout fisheries right in Branson. The upper end below the dam is prime trout water; it warms and broadens downstream.",
    "Flow is dictated by power generation at the dam — when turbines run, the river rises and current picks up, changing everything. Anglers fish scuds, midges, eggs and small jigs; the upper trophy area carries special regulations. Check generation schedules before you go: low water wades, high water is a boat/drift game."
  ],
  "Truman Lake":[
    "A large, often-stained flood-control reservoir above Lake of the Ozarks, defined by vast amounts of standing flooded timber. That timber makes Truman one of Missouri's elite crappie lakes and a strong largemouth and white bass fishery.",
    "The flooded timber and creek arms concentrate crappie on cover you can fish vertically or pick apart with jigs and minnows. Spring brings shallow crappie and a white-bass run up the rivers; the lake's stain means reaction baits and contrast colors often outproduce finesse."
  ],
  "Stockton Lake":[
    "A clear, wind-swept Sac River reservoir best known as Missouri's top walleye lake, with a strong smallmouth population that thrives on its rocky structure — plus largemouth, spotted bass and white bass.",
    "Open main-lake points, flats and humps set up classic walleye trolling and jigging, while the rocky banks and bluffs hold smallmouth. The lake is famous (and sometimes infamous) for wind, which positions fish on windblown structure but can make boat control a challenge."
  ],
  "Current River (lower)":[
    "A spring-fed Ozark float stream within the Ozark National Scenic Riverways — cold, clear and powerful, fed by some of Missouri's largest springs. The upper reaches near Montauk and the big springs stay cold enough for trout, while the river transitions to a premier smallmouth and goggle-eye (rock bass) stream downstream.",
    "This is a wade-and-float fishery: gravel bars, bluff pools, root wads and current seams hold smallmouth that fight well above their weight. Cold spring inflows keep summer fishable. It's a destination float as much as a fishery — plan around canoe/kayak access points and water levels."
  ],
  "Meramec River":[
    "A classic eastern-Ozark float stream and one of the longest free-flowing rivers in Missouri, draining to the Mississippi near St. Louis. It's a strong smallmouth river with rock bass, sunfish and catfish, popular for both wading and canoe floats within easy reach of the metro area.",
    "Fish the current seams, bluff pools, gravel riffles and wood. Spring and fall are prime for smallmouth; summer floats are as much recreation as fishing. Like all Ozark streams it clears and drops after rains stabilize — clarity and flow drive the bite."
  ],
  "North Fork of the White River":[
    "One of Missouri's finest wild-trout streams: spring-fed and cold, the North Fork supports naturally reproducing rainbow trout in its blue-ribbon water — a rarity in the state — alongside smallmouth lower down. Big springs (Rainbow Spring) feed the cold flow.",
    "A wading and float fly-fishery built around scuds, sowbugs, midges and seasonal hatches, with special-regulation trophy water. Cold, clear and technical — light tippet and a careful approach matter. Levels swing with rain, so check flows before committing to a float."
  ],
  "Bull Shoals Lake":[
    "A huge, deep, exceptionally clear White River highland reservoir on the Missouri–Arkansas border, known for quality bass fishing (largemouth, smallmouth and spotted) over rock and timber, plus walleye, white bass, crappie and stripers in the open water.",
    "Clarity and depth make it a finesse and structure lake — points, bluffs, brush and channel swings. Spring is the shallow window; summer and winter fish set up deep. The lake's many remote creek arms reward anglers who learn to read its rocky structure."
  ],
  "Beaver Lake":[
    "The uppermost White River reservoir in northwest Arkansas — clear, deep and rocky, with bluffs, timber and standing structure. It holds largemouth, smallmouth and spotted bass, plus a notable striped bass fishery and good crappie and walleye.",
    "Clear water again means finesse: drop-shot, Ned rig, jerkbaits and shaky heads around the rock and brush. Stripers roam the open lake chasing shad and are chased with live bait and trolling. The Beaver tailwater below the dam is cold-enough trout water."
  ],
  "Greers Ferry Lake":[
    "A clear, deep Little Red River highland reservoir in central Arkansas, famous for walleye and a strong smallmouth and spotted-bass fishery alongside largemouth, hybrid/white bass and crappie. Its spring walleye run is a regional tradition.",
    "Rocky points, bluffs, brush and the open main lake set up finesse bass fishing and walleye trolling/jigging. The tailwater below the dam — the Little Red — is a celebrated trophy trout stream. Clear water rewards light line and a stealthy approach."
  ],
  "White River (below Bull Shoals Dam)":[
    "The legendary Arkansas tailwater: cold, nutrient-rich water released from the bottom of Bull Shoals Dam creates a world-class trophy trout fishery for rainbow and brown trout running many miles downstream. This is one of America's premier trout rivers.",
    "Everything revolves around dam generation. Low water is a wade-and-drift game (scuds, sowbugs, midges, small jigs, drifted bait); high generation turns it into a boat fishery where guides back-troll and drift big browns to streamers and bait. Always check the generation schedule and never get caught wading on a rising river."
  ],
  "Norfork Tailwater":[
    "A short but mighty cold tailwater below Norfork Dam where the North Fork River meets the White system — small, intimate and famously rich, producing outsized brown and rainbow trout for its size. A fly-fishing favorite.",
    "Like the White, it lives and dies by generation: a wadeable spring-creek-like fishery at low water (sowbugs, midges, scuds on light tippet) that transforms when the turbines run. The catch-and-release trophy area is renowned. Confirm generation timing before wading."
  ],
  "Little Red River (below Greers Ferry)":[
    "The cold tailwater below Greers Ferry Dam in central Arkansas — a quality brown and rainbow trout river that has historically produced exceptionally large browns, including world-record-class fish, thanks to cold, fertile dam releases.",
    "A generation-driven tailwater: low flows let anglers wade and drift small flies (sowbugs, midges, eggs) and light tackle; high water is a drift-boat game for big browns. Check the dam schedule and watch for fast-rising water."
  ],
  "Lake Okeechobee":[
    "Florida's vast, shallow, grass-filled inland sea — 'the Big O' — and one of the most famous big-largemouth fisheries in the world. Native Florida-strain bass, year-round growth and endless aquatic vegetation make it a shallow-water bass factory; it's also a premier black-crappie ('speck') lake.",
    "The game is shallow and visual: flipping and punching matted grass, throwing swimbaits, lipless cranks and frogs over and around the vegetation, and drifting wild shiners for the biggest fish. Winter and the pre-spawn (roughly December–March) are the peak trophy windows. Water levels and vegetation shift the productive zones year to year."
  ],
  "Lake Tohopekaliga (Toho)":[
    "A premier central-Florida trophy-bass lake in the Kissimmee chain near Orlando, managed intensively for big Florida-strain largemouth and dotted with hydrilla, bulrush and lily pads. It also gives up huge numbers of black crappie in the cool season.",
    "Shallow grass fishing rules — flipping, frogging, swimbaits and wild shiners on the vegetation lines and the famous shell beds. The pre-spawn and spawn (winter into early spring) draw anglers chasing double-digit bass. Periodic habitat drawdowns reshape the lake's hot zones."
  ],
  "Rend Lake":[
    "A large, shallow, fertile flood-control reservoir in southern Illinois long famous as one of the Midwest's top crappie destinations, with both black and white crappie, plus strong largemouth, bluegill, channel catfish and white bass.",
    "Stained, shad-rich water favors reaction baits and contrast colors; crappie stack on the lake's abundant brush, standing timber and rip-rap. Spring brings a shallow crappie bonanza around cover, while summer and winter fish hold on deeper structure and the man-made attractors."
  ],
  "Lake of Egypt":[
    "A clear, warm power-plant cooling lake in southern Illinois that stays fishable year-round thanks to the heated discharge. It's a quality largemouth lake with good bluegill, redear, crappie and catfish, and the warm water keeps bass growing and feeding through winter.",
    "Clear water and abundant docks, weed lines and brush call for a mix of finesse and cover fishing. The warm discharge areas concentrate baitfish and gamefish in the cold months, making winter one of the more productive times — unusual for a northern-state lake."
  ],
  "Jordan Lake":[
    "A large piedmont reservoir near Raleigh, North Carolina, known as a solid largemouth fishery with good crappie, catfish and white perch, set among standing timber, creek arms and points. It's also nationally notable for its wintering bald eagles.",
    "Often stained, it rewards reaction baits — spinnerbaits, crankbaits and ChatterBaits — around wood, points and bridge structure, with finesse plastics for pressured fish. Spring pre-spawn in the creek arms and the fall shad feed are the prime windows."
  ],
  "High Rock Lake":[
    "A large, fertile, often-stained Yadkin River reservoir in central North Carolina with an enormous shoreline and abundant cover — a well-known tournament-bass lake with strong largemouth plus crappie, catfish and white perch.",
    "The stained, shallow, cover-rich water suits power fishing: spinnerbaits, squarebills, ChatterBaits and jigs around docks, laydowns and rip-rap, with the muddy upper river arms holding fish year-round. Spring and fall are prime; the lake's many creek arms spread the fish out."
  ],
  "Lake James":[
    "A clear, cool reservoir in the North Carolina mountains at the foot of the Blue Ridge, notable for both smallmouth and largemouth bass (a relatively rare smallmouth fishery for the state) plus a walleye population and good panfish.",
    "Clear, rocky highland-style water favors finesse presentations and structure fishing — points, rock, brush and timber — much like the Ozark highland lakes. Smallmouth relate to the rock; largemouth tuck into the bushier coves. Cooler mountain temperatures stretch the spring and fall windows."
  ]

      { h:"Season &amp; weather playbook — what to throw, when",
        body:`<p>Largemouth are governed by water temperature and the position it puts them in. Find the stage, then match the bait to the mood — aggressive fish want speed and reaction, neutral fish want slow and natural.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top lures &amp; baits</th></tr>
        <tr><td class="s">Winter<br><span style="font-weight:400;color:#90a8af">&lt;50°F</span></td><td>Deep — channel edges, steep bluff banks, main-lake structure, the deepest cover</td><td>Jigging spoon, blade bait, hair/finesse jig, suspending jerkbait (long pauses), drop-shot</td></tr>
        <tr><td class="s">Pre-spawn<br><span style="font-weight:400;color:#90a8af">48–58°F</span></td><td>Staging on secondary points &amp; creek-channel bends on the way to the spawning flats — <b>the best big-fish window of the year</b></td><td>Lipless crankbait, jerkbait, ChatterBait, 1/2 oz jig, spinnerbait, big swimbait</td></tr>

        <tr><td class="s">Summer<br><span style="font-weight:400;color:#90a8af">75–88°F</span></td><td>Split shift: shallow grass/wood at dawn–dusk &amp; night; deep ledges, points &amp; humps midday</td><td>Frog &amp; walking topwater (low light), deep crankbait, big worm / Carolina rig, football jig; <b>black jig or spinnerbait after dark</b></td></tr>
        <tr><td class="s">Fall</td><td>Following shad to the backs of creeks &amp; flats — chase the bait and you find the bass</td><td>Squarebill, lipless, spinnerbait, swimbait, walking topwater — <b>match the shad size</b></td></tr></table>
        <h3>Reading the weather &amp; light</h3>
        <p><b>Bluebird &amp; clear after a cold front:</b> the toughest day — fish bury in cover; downsize, slow down, go natural (drop-shot, shaky head, jig flipped into the thickest cover). <b>Overcast, wind or light rain:</b> the best moving-bait conditions — cover water with spinnerbaits, ChatterBaits, squarebills and topwater; wind on a point or bank is a green light. <b>Falling pressure ahead of a front:</b> often a feeding frenzy — pick up the pace. <b>Stained/muddy water:</b> dark or bright, bigger profiles, rattles &amp; thumping blades (they hunt by vibration); tight to visible cover. <b>Clear water:</b> natural colors, longer casts, finesse, fluorocarbon.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🎣 Baitcasting — the bass workhorse</h3><p style="margin:4px 0">A 7'–7'6" medium-heavy, fast-action casting rod with a 7:1-ish reel covers most of bass fishing: jigs, Texas rigs, spinnerbaits, ChatterBaits, lipless and squarebill cranks. Go heavier (heavy power, 50–65 lb braid) for frogs and flipping/punching matted grass; a separate moderate-action "cranking" rod (often glass/composite) helps deep crankbaits and treble baits.</p><div class="pick"><b>Solid picks:</b> Lew's Speed Spool / KVD, Shimano SLX &amp; Curado, Daiwa Tatula reels; Dobyns Fury/Colt or St. Croix Bass X / Mojo Bass rods.</div></div>
        <div class="gearbox"><h3>🪶 Spinning — finesse</h3><p style="margin:4px 0">A 7' medium or medium-light spinning rod with a 2500–3000 reel for drop-shot, Ned rig, shaky head, wacky worm and small swimbaits — the clear-water and pressured-fish answer.</p><div class="pick"><b>Solid picks:</b> Shimano Stradic, Daiwa Fuego/BG; 10–15 lb braid main line with a 6–10 lb fluorocarbon leader.</div></div>
        <div class="gearbox"><h3>🐟 Fly</h3><p style="margin:4px 0">Bass are excellent on the fly: a 7–8wt with a bass-taper floating line throws poppers, divers, Game Changers and Clousers. Add a short heavy leader (0X–2X, ~12–20 lb).</p></div>
        <h3>Line cheat-sheet</h3>
        <p><b>Fluorocarbon</b> (12–20 lb) for most casting — sinks, low-stretch, less visible; the bottom-contact &amp; clear-water choice. <b>Monofilament</b> (15–20 lb) floats — for topwater &amp; squarebills. <b>Braid</b> (30–65 lb) for frogs, flipping heavy grass, and as a finesse main line behind a fluoro leader.</p>
        <div class="fightline"><span class="stars">★★★★☆</span><b>Fight: 4/5 — power, not endurance.</b></div>
        <p>A largemouth's strike and first surge are violent, with hard head-shakes and an immediate bolt for cover — but they're sprinters, not distance runners, and tire fast. The challenge is winning the first three seconds: stop the run and turn the fish before it buries you in a dock, brush pile or grass mat. Use enough rod and line to horse them out; a big female's headshake throws hooks, so keep steady pressure and a sticky hookset.</p>` },
      { h:"Subspecies, strains &amp; the size ceiling",
        body:`<p>Two subspecies drive everything about largemouth size. The <b>Northern largemouth</b> (<i>M. salmoides salmoides</i>) ranges across most of the country — more aggressive, relates to structure, tolerates cold winters, but tops out smaller (a 6–8 lb fish is excellent, double-digits rare). The <b>Florida largemouth</b> (<i>M. s. floridanus</i>) is genetically built to grow far larger (10–20+ lb) but only expresses that potential in warm water with a long growing season, and tends to be warier and harder to fool. Across the transition belt (Texas to the Carolinas) the two interbreed into <b>"intergrade" or F1 bass</b> that managers stock for fast-growing trophies. The practical takeaway: the same species is a 6-lb trophy in Missouri and an average fish in Florida — and stocking Florida genes only pays off where the water stays warm. <span class="src">See the regional profiles below for how this plays out state by state.</span></p>` }
    ],
    tagline:"North America's most popular gamefish — an ambush predator of weedy lakes, ponds and slow rivers, and the species most shaped by where it lives.",
    sections:[
      { h:"Identification",
        body:"Micropterus salmoides — the largest black bass. Olive-green with a bold, blotchy <b>dark horizontal stripe</b> down the side. The giveaways versus smallmouth and spotted bass: the <b>jaw (maxillary) extends well past the back of the eye</b>, and the spiny front dorsal and soft rear dorsal fins look <b>nearly separated</b> by a deep notch. No tooth patch on the tongue (spotted bass have one). Big fish develop a fat, bucket-mouthed profile — hence 'bucketmouth.'" },
      { h:"Biology & life history",
        body:"Largemouth spawn in spring as water climbs past about <b>60–65°F</b> — warmer than smallmouth, and earlier in the south. The male sweeps a nest on a soft-to-firm bottom near cover in 1–4 ft and guards eggs and fry. They're a cover-oriented ambush predator (not a structure/current fish like the smallmouth). Lifespan and ultimate size depend heavily on genetics and climate: a northern fish may live ~10–12 years and top out near 10 lb, while a warm-climate Florida-strain fish can live longer and exceed 15–20 lb." },
      { h:"Behavior & seasonal patterns",
        body:"Think <b>cover and ambush</b>: grass, pads, laydowns, docks, brush. Spring <b>pre-spawn</b> (fish staging shallow) and the fall <b>shad feed-up</b> are the two best windows. Summer means topwater frogs and walking baits at dawn/dusk over vegetation, with fish pulling to deeper cover and ledges in the heat. Winter slows them to a deep, lethargic bite on slow jigs, jerkbaits and blade baits. A largemouth's whole year is organized around where the warmest comfortable water and the densest ambush cover overlap." },
      { h:"Diet & forage",
        body:"A true opportunist — shad and other baitfish, bluegill and small sunfish, crayfish, frogs, even ducklings and snakes for the biggest fish. Match the dominant forage: shad-imitating crankbaits & swimbaits on open reservoirs, bluegill-pattern baits around bedding panfish, frogs over the pads, and live wild shiners where giant, wary fish demand them." },
      { h:"The strain story — why a Florida bass dwarfs a Missouri bass",
        body:"This is the key to largemouth: there are two genetic strains. <b>Northern-strain</b> largemouth (most of the country) average 6–8 lb at their best, rarely top 10, are more <i>aggressive</i> — chasing prey and relating to rock/structure — and tolerate cold winters but live shorter and stay smaller. <b>Florida-strain</b> bass (native to Florida) are genetically built to grow far larger (commonly 10+, potentially 20+ lb), evolved in warm, shallow, grass-filled lakes where they <i>ambush</i>, and tend to be more <b>cautious and selective</b> — tougher to fool in clear, pressured water (why wild shiners reign). Crucially, Florida genes only express their size potential in <b>warm water with a long (or year-round) growing season</b>. That's why states from Texas to the Carolinas stock Florida-strain bass for trophies — and why a Missouri 6-pounder is a fish of a lifetime while in Florida that's just average." }
    ],
    regions:[
      { name:"Florida (the giant-bass capital)",
        body:"Native <b>Florida-strain</b> water, year-round growing season, endless grass — the trophy epicenter. <b>Lake Okeechobee</b> ('the Big O'), the <b>Kissimmee chain</b> (Lake Toho), and trophy factories like <b>Rodman Reservoir</b> regularly give up double-digit bass; January–March pre-spawn is the magic window. The game is shallow and visual: wild shiners, flipping/punching matted grass, swimbaits and big worms. A 10-lb bass here is a realistic goal — the ceiling Missouri simply can't reach." },
      { name:"Arkansas (a strain crossroads — real trophy potential)",
        body:"Arkansas straddles the line, and the AGFC leans in: its <b>Florida-bass / Legacy Lunker program</b> stocks Florida-strain fish across the warm bottom two-thirds of the state. <b>Millwood Lake</b> in the southwest is the standout — ~175,000 Florida fingerlings a year for decades over shallow, fertile habitat, producing bass to 12 lb and beyond — with <b>Lake Hamilton, Ouachita and DeGray</b> also boosted, and the Delta oxbows (<b>Lake Chicot</b>) and shallow, stumpy <b>Lake Conway</b> classic largemouth water. The cold, clear highland lakes (Bull Shoals, Beaver, Norfork) stay northern-strain, where bass share the stage with smallmouth, spotted bass and walleye." },
      { name:"Missouri (northern-strain — a numbers & quality state)",
        body:"Cold winters keep Missouri almost entirely <b>northern-strain</b>, so it's a fantastic <i>numbers and solid-quality</i> fishery rather than a giant-bass state — true double-digits are rare. <b>Lake of the Ozarks</b> (mile after mile of docks and brush), <b>Truman Lake</b> (flooded timber), <b>Mark Twain</b>, and thousands of MDC community lakes and farm ponds carry the load. The clear highland lakes (<b>Table Rock</b>, <b>Bull Shoals</b>) actually favor spotted and smallmouth, with largemouth tucked in the bushier, stained creek arms. The plain contrast you'll feel: a 6-lb Missouri largemouth is a trophy; that's an average Okeechobee fish." },
      { name:"North Carolina (Florida-strain stockings take hold)",
        body:"Warm enough that <b>Florida-strain stockings</b> express — <b>Shearon Harris</b>, a power-plant cooling lake near Raleigh, stays warm year-round and is the state's premier <b>trophy-bass</b> water (double-digits show up), with <b>Jordan</b> and <b>Falls</b> lakes strong piedmont options and the coastal blackwater (Currituck Sound, the lower Cape Fear) offering classic grass-and-cypress largemouth. NC sits squarely between Missouri's numbers game and Florida's giant game." },
      { name:"Illinois (cold state, warm-water wildcards)",
        body:"Northern-strain and cold-wintered — but Illinois' secret is its <b>power-plant cooling lakes</b>: <b>Braidwood, Heidecke, Clinton, Newton, Coffeen and Sangchris</b> stay warm year-round, so bass feed and grow through winter and get unusually fat and fast for a northern climate — these are the state's trophy spots, often fishable in January. The natural <b>Fox Chain O'Lakes</b> and the southern reservoirs (<b>Rend, Kinkaid, Lake of Egypt</b>) fish like textbook warmwater largemouth water." }
    ],
    conservation:"Largemouth handle catch-and-release well; release the big females, which are old and slow-replaced (especially up north). Many waters run length or slot limits to protect quality. Remember the genetics ceiling — Florida giants need warm water; stocking Florida-strain in a cold northern lake just produces winter die-offs, not lunkers.",
    refs:[
      {t:"Northern vs Florida-strain largemouth — BassResource", u:"https://www.bassresource.com/fish_biology/northern-largemouth-florida-strain.html"},
      {t:"Millwood & Arkansas's Florida-bass boost — Arkansas Game & Fish Commission", u:"https://www.agfc.com/news/millwood-one-of-many-arkansas-lakes-seeing-florida-bass-boost/"},
      {t:"Arkansas Legacy Lunker / trophy-bass program — Wired2Fish", u:"https://www.wired2fish.com/news/arkansas-legacy-lunker-program-building-a-trophy-bass-population"},
      {t:"AGFC Black Bass Program", u:"https://www.agfc.com/fishing/black-bass/black-bass-program/"},
      {t:"Largemouth bass — Wikipedia", u:"https://en.wikipedia.org/wiki/Largemouth_bass"}
    ]
  },
  smallmouth:{
    extra:[
      { h:"Season &amp; weather playbook — what to throw, when",
        body:`<p>Smallmouth are temperature- and current-driven. In rivers, think current seams, rock and depth changes; in lakes, think main-lake rock, points and humps. They feed hard in cool water and pull off the shallows as it warms.</p>
        <table class="pb"><tr><th>Season</th><th>Where they hold</th><th>Top lures &amp; baits</th></tr>
        <tr><td class="s">Winter<br><span style="font-weight:400;color:#90a8af">&lt;48°F</span></td><td>The deepest, slowest water — river wintering pools, lake channels &amp; deep rock; nearly dormant</td><td>Hair jig, blade bait, jigging spoon, suspending jerkbait (very long pauses), drop-shot — <b>slow</b></td></tr>
        <tr><td class="s">Pre-spawn</td><td>Staging on transition banks &amp; flats near gravel spawning areas — a peak big-fish window</td><td>Jerkbait, tube, Ned rig, blade bait, hair jig, small swimbait</td></tr>
        <tr><td class="s">Spawn<br><span style="font-weight:400;color:#90a8af">59–64°F</span></td><td>Clean gravel/rock in 2–8 ft; males guard nests aggressively</td><td>Tube, Ned, drop-shot, soft jerkbait — sight-fishing (release them quickly)</td></tr>
        <tr><td class="s">Summer</td><td>Rivers: oxygen-rich riffles, runs &amp; current seams (deeper pools midday). Lakes: main-lake rock, points, humps</td><td>Tube, Ned, drop-shot, crayfish crankbait, walking topwater &amp; Whopper Plopper (low light), swimbait</td></tr>
        <tr><td class="s">Fall</td><td>Heavy feed-up chasing baitfish &amp; crayfish into the fall — often the year's best numbers of big fish</td><td>Jerkbait, crankbait, swimbait, blade bait, topwater, hair jig</td></tr></table>
        <h3>Weather &amp; light</h3>
        <p>Smallmouth water is often clear, so they're sight feeders that spook easily — <b>clear &amp; calm:</b> natural colors (green-pumpkin, brown, smoke), light fluoro, long casts, finesse. <b>Wind &amp; chop, or clouds:</b> the great equalizer — they roam and crush moving baits and topwater; fish windblown rock. <b>Cold front:</b> drop-shot or Ned, deep and dead-slow. In rivers, <b>flow is everything</b>: a little extra current after a rain positions fish on seams and turns on the crayfish bite, but high muddy water shuts it down.</p>` },
      { h:"Tackle &amp; gear — what to actually use",
        body:`<div class="gearbox"><h3>🪶 Spinning — the smallmouth standard</h3><p style="margin:4px 0">Finesse rules: a 7'–7'2" medium or medium-light spinning rod with a 2500–3000 reel handles tubes, the Ned rig, drop-shot, hair jigs and small swimbaits. This is the outfit you'll use most.</p><div class="pick"><b>Solid picks:</b> Shimano Stradic / Daiwa BG reels; St. Croix Mojo Bass, Dobyns Fury, or G. Loomis spinning rods. <b>Line:</b> 10–15 lb braid main + 6–8 lb fluorocarbon leader.</div></div>
        <div class="gearbox"><h3>🎣 Baitcasting</h3><p style="margin:4px 0">A 6'10"–7' medium casting rod for jerkbaits, crankbaits, bladed baits and mid-size swimbaits; 10–12 lb fluorocarbon.</p></div>
        <div class="gearbox"><h3>🐟 Fly — rivers shine</h3><p style="margin:4px 0">A 6–7wt with floating &amp; intermediate lines is a joy on river smallmouth: Clouser Minnows, crayfish patterns, Murdich Minnows, poppers and small Game Changers on a short 0X–3X leader.</p></div>
        <div class="fightline"><span class="stars">★★★★★</span><b>Fight: 5/5 — the benchmark.</b></div>
        <p>Pound for pound the hardest-fighting freshwater fish in North America, and our 5/5 reference point. A hooked smallmouth runs, bulldogs deep, and <b>jumps repeatedly</b>, using current to its advantage — a 3-pounder fights like a largemouth twice its size. Keep the rod loaded and let a good drag absorb the jumps; bow slightly to a leaping fish so it can't snap a light leader.</p>` },
      { h:"Subspecies &amp; variants — the Ozark Neosho",
        body:`<p>Beyond the wide-ranging <b>Northern smallmouth</b> (<i>M. dolomieu dolomieu</i>), the Ozarks hold a special native subspecies: the <b>Neosho smallmouth</b> (<i>M. d. velox</i>), found in the clear Ozark-border streams of southwest Missouri, northwest Arkansas and northeast Oklahoma (the Neosho, Elk, Illinois and upper White drainages). Neosho fish tend to run a bit more bronze-to-brownish with subtle marking and jaw differences, and they're prized by stream anglers; because their range is limited and they hybridize with introduced northern-strain fish, they're a conservation focus — several Ozark streams carry special black-bass regulations to protect them. There's also a celebrated lake variant phenomenon: fertile reservoirs (Dale Hollow, and historically the Ozark highland lakes) grow giant "football" smallmouth far larger than any stream fish. <span class="src">If you fish the SW-Missouri / NW-Arkansas streams, you're very likely catching Neosho smallmouth — handle and release them with care.</span></p>` }
    ],
    tagline:"Pound for pound the hardest-fighting freshwater gamefish in North America — a cool-water predator of clear rivers and rocky lakes.",
    sections:[
      { h:"Identification",
        body:"Micropterus dolomieu — a black bass, not a true bass. Bronze-to-olive flanks (the 'bronzeback') with dark vertical bars that come and go with mood and habitat; red-tinged eyes; and the key field marks that separate it from largemouth: the <b>upper jaw stops below the eye</b> (it extends past the eye on largemouth), and the spiny and soft dorsal fins are connected with only a shallow notch. Spotted bass overlap in range but show horizontal rows of spots below the lateral line and a tooth patch on the tongue. River fish run darker and more barred; lake fish are often paler and more uniformly bronze." },
      { h:"Biology & life history",
        body:"Smallmouth spawn in spring/early summer when water reaches roughly <b>59–64°F (15–18°C)</b>, later the farther north you go. Males fan a saucer-shaped nest on clean gravel, rock or cobble in 1–6 ft of water, often returning to the same spawning areas year after year (strong site fidelity). The male guards the eggs and fry aggressively for days to weeks — which is why post-spawn fish are catchable but also why C&R during the spawn matters. They are slow-growing and long-lived for a bass (commonly 6–10+ years, more up north), and need cooler, cleaner, better-oxygenated water than largemouth — a reliable indicator species for stream health." },
      { h:"Behavior & seasonal movements",
        body:"Smallmouth are temperature-driven nomads. Their preferred range centers around the low-70s°F (~22°C optimal). In rivers they hold on current seams, rock, wood and depth changes, and they <b>move — a lot</b>: a stream smallmouth can travel 12 miles in a single day, and seasonal migrations can exceed 60 miles. As water drops below ~60°F in fall they shift toward deeper, slower pools; through winter they enter a near-dormant state in the deepest, most stable water (sometimes very deep in lakes), moving sluggishly and feeding little until spring. Spring pre-spawn and the fall feed-up are the two windows when big fish are most catchable; midsummer heat can actually <i>reduce</i> body condition in shallow streams." },
      { h:"Diet & forage (the science)",
        body:"Diet shifts with size: age-0 fish eat zooplankton and aquatic insects, then switch to fish and crayfish at about <b>125 mm (~5 in)</b>. In Ozark streams, adult diets are dominated by <b>crayfish</b>, supplemented by minnows, sculpins and darters; in summer they take more fish, and in late fall/winter many stomachs are empty. The move to crayfish and baitfish — larger, more energy-rich prey — drives faster growth and better over-winter survival, which is exactly why a smallmouth's preferred forage in a given water dictates the best lure size, color and profile (crawfish browns/greens on the rivers; baitfish/goby patterns on the lakes)." }
    ],
    regions:[
      { name:"Missouri Ozarks (streams)",
        body:"Classic stream smallmouth country — cool, clear, gravel-and-chert rivers like the Current, Jacks Fork, Meramec, Gasconade, Big, Big Piney and Elk. These fish are <b>crayfish specialists</b>, darker and heavily barred, and typically run smaller on average than northern lake fish but live at high density in long bluff pools. The bite switches on around <b>55°F</b> (often March) and stays good into late October. Missouri designates <b>Smallmouth Bass Special Management Areas</b> with a 15-inch minimum and a one-fish limit to protect quality — float-and-wade with tubes, Ned rigs, suspending jerkbaits in cool water, and walk-the-dog/poppers at first light. Approach pools from downstream and cast up-current; the water is gin-clear." },
      { name:"Arkansas (Ozark streams + highland reservoirs)",
        body:"Arkansas splits into two smallmouth worlds. The <b>streams</b> — Crooked Creek (a nationally ranked smallmouth fishery), the Buffalo National River, Kings, War Eagle and the Mulberry — fish much like the Missouri Ozarks: crayfish-driven, wadeable, March–October. The <b>White River chain highland reservoirs</b> — Bull Shoals, Beaver, Norfork, Table Rock — grow noticeably <b>larger smallmouth</b> because deep, clear lakes with shad and threadfin let fish pack on weight; finesse tactics (drop-shot, Ned, jerkbaits) on bluffs and points produce. AGFC manages stream smallmouth under a dedicated species plan emphasizing catch-and-release and special regulations on premier streams." },
      { name:"North Carolina (southern Appalachian rivers + foothill lakes)",
        body:"In the Carolinas, smallmouth are a <b>mountain and foothill</b> fish — they thrive in the cool, oxygen-rich freestone rivers of the southern Appalachians (the New River, French Broad and Catawba) and in the clear foothill reservoirs below them (Lake James). The ancient, gentle New River is a standout float; the French Broad through Asheville mixes smallmouth with a sleeper muskie fishery. Compared with the Ozarks the season skews a touch later at elevation, but the playbook rhymes: crayfish-colored tubes and Ned rigs in the shoals, jerkbaits in cool water, topwater at first light. Lake James fish, like the Arkansas highland reservoirs, grow larger on open-water forage than the river fish do." },
      { name:"Northern Illinois (rivers + Lake Michigan)",
